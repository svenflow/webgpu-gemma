<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebGPU FunctionGemma — 270M Function Calling at 100 t/s</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; max-width: 1200px; margin: 0 auto; }
    pre { background: #2a2a2a; padding: 15px; overflow: auto; white-space: pre-wrap; max-height: 400px; }
    .success { color: #4caf50; }
    .error { color: #f44336; }
    .info { color: #2196f3; }
    #status { margin: 20px 0; padding: 15px; background: #333; border-radius: 5px; font-size: 20px; }
    #prompt-area { margin: 20px 0; display: flex; gap: 10px; align-items: center; }
    #prompt-input {
      flex: 1; padding: 12px; font-size: 16px; font-family: monospace;
      background: #2a2a2a; color: #fff; border: 1px solid #555; border-radius: 5px;
    }
    #prompt-input:focus { outline: none; border-color: #4caf50; }
    #generate-btn {
      padding: 12px 24px; font-size: 16px; font-family: monospace; cursor: pointer;
      background: #4caf50; color: #fff; border: none; border-radius: 5px;
    }
    #generate-btn:hover { background: #45a049; }
    #generate-btn:disabled { background: #555; cursor: not-allowed; }
    #output-area {
      margin: 20px 0; padding: 20px; background: #2a2a2a; border-radius: 5px;

    }
    #output-area .prompt-text { color: #888; }
    #output-area .generated-text { color: #4caf50; }
    #output-area .function-call { color: #ff9800; font-weight: bold; }
    #output-area .function-name { color: #2196f3; }
    #output-area .function-params { color: #e0e0e0; }
    #timing { margin: 10px 0; padding: 10px; background: #333; border-radius: 5px; color: #aaa; }
    #controls { display: flex; gap: 10px; align-items: center; margin: 10px 0; }
    #controls label { color: #aaa; }
    #max-tokens { width: 60px; padding: 5px; font-family: monospace; background: #2a2a2a; color: #fff; border: 1px solid #555; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>WebGPU FunctionGemma — 270M Function Calling</h1>
  <p>Function calling at ~100 t/s on Apple Silicon. Runs entirely in your browser — no server needed.</p>

  <div id="status">Loading model...</div>

  <div id="prompt-area">
    <input type="text" id="prompt-input" value="What's the weather like in Tokyo?" placeholder="Enter a prompt..." disabled>
    <button id="generate-btn" disabled onclick="onGenerate()">Generate</button>
    <button id="debug-btn" disabled onclick="onDebugNaN()" style="padding:12px 24px;font-size:16px;font-family:monospace;cursor:pointer;background:#f44336;color:#fff;border:none;border-radius:5px;">Debug NaN</button>
  </div>
  <div id="controls">
    <label>Max tokens: <input type="number" id="max-tokens" value="2048" min="1" max="2048"></label>
    <label>Temperature: <input type="number" id="temperature" value="0.0" min="0" max="2" step="0.1" style="width:60px;padding:5px;font-family:monospace;background:#2a2a2a;color:#fff;border:1px solid #555;border-radius:3px;"></label>
    <label>Top-p: <input type="number" id="top-p" value="0.9" min="0" max="1" step="0.05" style="width:60px;padding:5px;font-family:monospace;background:#2a2a2a;color:#fff;border:1px solid #555;border-radius:3px;"></label>
    <label>Rep. penalty: <input type="number" id="rep-penalty" value="1.0" min="1" max="2" step="0.05" style="width:60px;padding:5px;font-family:monospace;background:#2a2a2a;color:#fff;border:1px solid #555;border-radius:3px;"></label>
  </div>
  <div id="tools-area" style="margin:10px 0;padding:10px;background:#333;border-radius:5px;">
    <label style="color:#aaa;">Tools (JSON function declarations):</label>
    <textarea id="tools-input" style="width:100%;height:80px;margin-top:5px;padding:8px;font-family:monospace;font-size:12px;background:#2a2a2a;color:#fff;border:1px solid #555;border-radius:3px;resize:vertical;" disabled>[{"name":"get_current_weather","description":"Gets the current weather in a given location.","parameters":{"properties":{"location":{"description":"The city and state","type":"STRING"},"unit":{"description":"Temperature unit","enum":["celsius","fahrenheit"],"type":"STRING"}},"required":["location"],"type":"OBJECT"}},{"name":"search_web","description":"Searches the web for information.","parameters":{"properties":{"query":{"description":"The search query","type":"STRING"}},"required":["query"],"type":"OBJECT"}}]</textarea>
  </div>

  <div id="output-area"></div>
  <div id="timing"></div>

  <pre id="log"></pre>

  <script type="module">
    const log = (msg, cls = '') => {
      const el = document.getElementById('log');
      el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
      el.scrollTop = el.scrollHeight;
      console.log(msg);
    };

    const setStatus = (msg) => {
      document.getElementById('status').textContent = msg;
    };

    // =========================================================================
    // Model Configuration - CORRECT Gemma 3 270M architecture
    // =========================================================================
    const CONFIG = {
      hidden_size: 640,
      q_dim: 1024,           // Q projection output (attn_q: [640, 1024])
      kv_dim: 256,           // K, V projection output (attn_k/v: [640, 256])
      num_q_heads: 4,        // 1024 / 256 = 4
      num_kv_heads: 1,       // MQA (Multi-Query Attention)
      head_dim: 256,         // from norm weight shapes [256]
      intermediate_size: 2048,
      vocab_size: 262144,
      num_layers: 18,
      context_length: 2048,
      rms_norm_eps: 1e-6,
      rope_theta_global: 1000000.0,  // For global attention layers (5, 11, 17)
      rope_theta_swa: 1000000.0,     // Gemma 3 uses same theta=1M for ALL layers (unlike Gemma 2 which used 10k for SWA)
      swa_period: 6,                 // Every 6th layer is global attention
    };

    // Determine which layers use global vs SWA attention
    // SWA pattern: il % period < (period - 1) → SWA, otherwise → global
    function isSwaLayer(il) {
      return (il % CONFIG.swa_period) < (CONFIG.swa_period - 1);
    }

    function getRopeTheta(il) {
      return isSwaLayer(il) ? CONFIG.rope_theta_swa : CONFIG.rope_theta_global;
    }

    // =========================================================================
    // GGUF Parser
    // =========================================================================
    class GGUFParser {
      constructor(buffer) {
        // Accept either ArrayBuffer or Uint8Array
        this.buffer = buffer instanceof ArrayBuffer ? buffer : buffer.buffer;
        this.view = new DataView(this.buffer);
        this.offset = 0;
        this.textDecoder = new TextDecoder('utf-8');
      }

      readUint32() {
        const val = this.view.getUint32(this.offset, true);
        this.offset += 4;
        return val;
      }

      readUint64() {
        const val = this.view.getBigUint64(this.offset, true);
        this.offset += 8;
        return val;
      }

      readString() {
        const length = Number(this.readUint64());
        const bytes = new Uint8Array(this.buffer, this.offset, length);
        this.offset += length;
        return this.textDecoder.decode(bytes);
      }

      readValue(type) {
        switch (type) {
          case 0: { const val = this.view.getUint8(this.offset); this.offset += 1; return { type: 'uint8', value: val }; }
          case 1: { const val = this.view.getInt8(this.offset); this.offset += 1; return { type: 'int8', value: val }; }
          case 2: { const val = this.view.getUint16(this.offset, true); this.offset += 2; return { type: 'uint16', value: val }; }
          case 3: { const val = this.view.getInt16(this.offset, true); this.offset += 2; return { type: 'int16', value: val }; }
          case 4: return { type: 'uint32', value: this.readUint32() };
          case 5: { const val = this.view.getInt32(this.offset, true); this.offset += 4; return { type: 'int32', value: val }; }
          case 6: { const val = this.view.getFloat32(this.offset, true); this.offset += 4; return { type: 'float32', value: val }; }
          case 7: { const val = this.view.getUint8(this.offset); this.offset += 1; return { type: 'bool', value: val !== 0 }; }
          case 8: return { type: 'string', value: this.readString() };
          case 9: {
            const elemType = this.readUint32();
            const count = Number(this.readUint64());
            const arr = [];
            for (let i = 0; i < count; i++) arr.push(this.readValue(elemType));
            return { type: 'array', value: arr };
          }
          case 10: return { type: 'uint64', value: this.readUint64() };
          case 11: { const val = this.view.getBigInt64(this.offset, true); this.offset += 8; return { type: 'int64', value: val }; }
          case 12: { const val = this.view.getFloat64(this.offset, true); this.offset += 8; return { type: 'float64', value: val }; }
          default: return { type: 'unknown', value: null };
        }
      }

      parse() {
        const magic = this.readUint32();
        if (magic !== 0x46554747) throw new Error(`Invalid GGUF magic: 0x${magic.toString(16)}`);

        const version = this.readUint32();
        const tensor_count = this.readUint64();
        const kv_count = this.readUint64();

        const kv = new Map();
        for (let i = 0n; i < kv_count; i++) {
          const key = this.readString();
          const valueType = this.readUint32();
          const value = this.readValue(valueType);
          kv.set(key, value);
        }

        const tensors = [];
        for (let i = 0n; i < tensor_count; i++) {
          const name = this.readString();
          const n_dims = this.readUint32();
          const dims = [];
          for (let d = 0; d < n_dims; d++) dims.push(this.readUint64());
          const type = this.readUint32();
          const offset = this.readUint64();
          tensors.push({ name, dims, type, offset });
        }

        const alignment = 32;
        const dataOffset = Math.ceil(this.offset / alignment) * alignment;

        return { version, tensor_count, kv_count, kv, tensors, dataOffset };
      }

      f16ToF32(h) {
        const sign = (h >> 15) & 0x1;
        const exp = (h >> 10) & 0x1f;
        const mant = h & 0x3ff;
        if (exp === 0) {
          // Subnormal f16: value = (-1)^sign * 2^(-14) * (mant/1024)
          if (mant === 0) return sign ? -0 : 0;
          return (sign ? -1 : 1) * Math.pow(2, -14) * (mant / 1024);
        }
        if (exp === 31) return mant === 0 ? (sign ? -Infinity : Infinity) : NaN;
        return (sign ? -1 : 1) * Math.pow(2, exp - 15) * (1 + mant / 1024);
      }

      dequantizeQ8_0(offset, count) {
        const blockSize = 32;
        const result = new Float32Array(count);
        let resultIdx = 0;
        let blockOffset = offset;

        while (resultIdx < count) {
          const scaleBits = this.view.getUint16(blockOffset, true);
          const scale = this.f16ToF32(scaleBits);
          blockOffset += 2;

          const elemsInBlock = Math.min(blockSize, count - resultIdx);
          for (let i = 0; i < elemsInBlock; i++) {
            const q = this.view.getInt8(blockOffset + i);
            result[resultIdx++] = q * scale;
          }
          blockOffset += blockSize;
        }
        return result;
      }

      // Pack Q8_0 data into GPU-friendly format: 9 u32 per block of 32 elements
      // u32[0] = f32 scale (from f16), u32[1..8] = packed int8 values (4 per u32)
      packQ8_0ForGPU(offset, totalElements) {
        const blockSize = 32;
        const numBlocks = totalElements / blockSize;
        const result = new ArrayBuffer(numBlocks * 36); // 9 u32 * 4 bytes = 36 bytes per block
        const resultU32 = new Uint32Array(result);
        const resultF32 = new Float32Array(result);

        let srcOff = offset;
        for (let b = 0; b < numBlocks; b++) {
          // Read f16 scale, convert to f32, store as f32 bits
          const scaleBits = this.view.getUint16(srcOff, true);
          const scale = this.f16ToF32(scaleBits);
          resultF32[b * 9] = scale;
          srcOff += 2;

          // Pack 32 int8 values as 8 x u32 (4 bytes each, little-endian)
          for (let j = 0; j < 8; j++) {
            let packed = 0;
            for (let k = 0; k < 4; k++) {
              const val = this.view.getUint8(srcOff + j * 4 + k);
              packed |= val << (k * 8);
            }
            resultU32[b * 9 + 1 + j] = packed;
          }
          srcOff += 32;
        }
        return new Uint32Array(result);
      }

      dequantizeF16(offset, count) {
        const result = new Float32Array(count);
        for (let i = 0; i < count; i++) {
          const bits = this.view.getUint16(offset + i * 2, true);
          result[i] = this.f16ToF32(bits);
        }
        return result;
      }

      getTensorData(tensor, dataOffset) {
        const absOffset = dataOffset + Number(tensor.offset);
        const count = Number(tensor.dims.reduce((a, b) => a * b, 1n));

        if (tensor.type === 0) {
          return new Float32Array(this.buffer, absOffset, count);
        } else if (tensor.type === 1) {  // F16
          return this.dequantizeF16(absOffset, count);
        } else if (tensor.type === 8) {
          return this.dequantizeQ8_0(absOffset, count);
        }
        throw new Error(`Unsupported type: ${tensor.type}`);
      }

      // Get Q8_0 tensor as packed GPU format (for quantized compute)
      getTensorDataQ8Packed(tensor, dataOffset) {
        const absOffset = dataOffset + Number(tensor.offset);
        const count = Number(tensor.dims.reduce((a, b) => a * b, 1n));
        return this.packQ8_0ForGPU(absOffset, count);
      }
    }

    // =========================================================================
    // Shaders
    // =========================================================================
    const SHADERS = {
      // Q8_0 embedding lookup: dequantize one row from packed Q8_0 embedding
      // Gemma scales embeddings by sqrt(hidden_size) before transformer layers
      // Q8_0 packed format: 9 u32 per 32-element block (u32[0]=f32 scale, u32[1..8]=packed int8s)
      embeddingLookup: `
struct Params { hidden_size: u32, token_id: u32 }
@group(0) @binding(0) var<storage, read> embedding_q8: array<u32>;
@group(0) @binding(1) var<storage, read_write> output: array<f32>;
@group(0) @binding(2) var<uniform> params: Params;

@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let i = gid.x;
  if (i >= params.hidden_size) { return; }

  let blocks_per_row = params.hidden_size / 32u;
  let row_offset = params.token_id * blocks_per_row * 9u;

  let block_idx = i / 32u;
  let elem_in_block = i % 32u;

  let block_off = row_offset + block_idx * 9u;
  let scale = bitcast<f32>(embedding_q8[block_off]);

  let packed_idx = elem_in_block / 4u;
  let byte_idx = elem_in_block % 4u;
  let packed = embedding_q8[block_off + 1u + packed_idx];
  let q = f32(extractBits(bitcast<i32>(packed), byte_idx * 8u, 8u));

  output[i] = q * scale * sqrt(f32(params.hidden_size));
}`,

      rmsNorm: `
struct Params { hidden_size: u32, eps: f32 }
@group(0) @binding(0) var<storage, read> input: array<f32>;
@group(0) @binding(1) var<storage, read> weight: array<f32>;
@group(0) @binding(2) var<storage, read_write> output: array<f32>;
@group(0) @binding(3) var<uniform> params: Params;
var<workgroup> shared_sum: array<f32, 256>;

@compute @workgroup_size(256)
fn main(@builtin(local_invocation_id) lid: vec3<u32>) {
  let tid = lid.x;
  let hidden_size = params.hidden_size;

  var partial_sum: f32 = 0.0;
  var i = tid;
  while (i < hidden_size) {
    let val = input[i];
    partial_sum += val * val;
    i += 256u;
  }
  shared_sum[tid] = partial_sum;
  workgroupBarrier();

  for (var stride: u32 = 128u; stride > 0u; stride >>= 1u) {
    if (tid < stride) { shared_sum[tid] += shared_sum[tid + stride]; }
    workgroupBarrier();
  }

  let rms = sqrt(shared_sum[0] / f32(hidden_size) + params.eps);
  i = tid;
  while (i < hidden_size) {
    output[i] = input[i] * weight[i] / rms;
    i += 256u;
  }
}`,

      // Per-head RMS norm: applies [head_dim] weight independently to each head
      // data is read_write (in-place), one workgroup per head
      perHeadRmsNorm: `
struct Params { num_heads: u32, head_dim: u32, eps: f32, pad: u32 }
@group(0) @binding(0) var<storage, read_write> data: array<f32>;
@group(0) @binding(1) var<storage, read> weight: array<f32>;
@group(0) @binding(2) var<uniform> params: Params;
var<workgroup> shared_sum: array<f32, 256>;

@compute @workgroup_size(256)
fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(workgroup_id) wid: vec3<u32>) {
  let tid = lid.x;
  let head = wid.x;
  if (head >= params.num_heads) { return; }

  let base = head * params.head_dim;

  // Partial sum of squares
  var partial: f32 = 0.0;
  var i = tid;
  while (i < params.head_dim) {
    let val = data[base + i];
    partial += val * val;
    i += 256u;
  }
  shared_sum[tid] = partial;
  workgroupBarrier();

  for (var stride: u32 = 128u; stride > 0u; stride >>= 1u) {
    if (tid < stride) { shared_sum[tid] += shared_sum[tid + stride]; }
    workgroupBarrier();
  }

  let rms = sqrt(shared_sum[0] / f32(params.head_dim) + params.eps);

  i = tid;
  while (i < params.head_dim) {
    data[base + i] = data[base + i] * weight[i] / rms;
    i += 256u;
  }
}`,

      // Q8_0 quantized linear: uses shared memory for input vector
      // Loads input once per workgroup into shared memory, then each thread
      // computes its output row from the shared input. This reduces global memory
      // reads by the workgroup size factor (256x).
      linearQ8: `
struct Params { M: u32, N: u32 }
@group(0) @binding(0) var<storage, read> input: array<f32>;
@group(0) @binding(1) var<storage, read> weight_q8: array<u32>;
@group(0) @binding(2) var<storage, read_write> output: array<f32>;
@group(0) @binding(3) var<uniform> params: Params;

// Shared memory for input vector (max 2048 floats = 8KB)
var<workgroup> shared_input: array<f32, 2048>;

@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) gid: vec3<u32>,
        @builtin(local_invocation_id) lid: vec3<u32>) {
  let m = gid.x;
  let tid = lid.x;

  // Cooperatively load input vector into shared memory
  let N = params.N;
  var i = tid;
  while (i < N) {
    shared_input[i] = input[i];
    i += 256u;
  }
  workgroupBarrier();

  if (m >= params.M) { return; }

  let blocks_per_row = N / 32u;
  let row_offset = m * blocks_per_row * 9u;

  var total_sum: f32 = 0.0;

  for (var b: u32 = 0u; b < blocks_per_row; b++) {
    let block_off = row_offset + b * 9u;
    let scale = bitcast<f32>(weight_q8[block_off]);
    let input_base = b * 32u;

    var block_sum: f32 = 0.0;

    for (var chunk: u32 = 0u; chunk < 4u; chunk++) {
      let chunk_base = input_base + chunk * 8u;
      let qs_base = block_off + 1u + chunk * 2u;

      let packed0 = weight_q8[qs_base];
      let packed1 = weight_q8[qs_base + 1u];

      block_sum += f32(extractBits(bitcast<i32>(packed0), 0u, 8u))  * shared_input[chunk_base + 0u];
      block_sum += f32(extractBits(bitcast<i32>(packed0), 8u, 8u))  * shared_input[chunk_base + 1u];
      block_sum += f32(extractBits(bitcast<i32>(packed0), 16u, 8u)) * shared_input[chunk_base + 2u];
      block_sum += f32(extractBits(bitcast<i32>(packed0), 24u, 8u)) * shared_input[chunk_base + 3u];
      block_sum += f32(extractBits(bitcast<i32>(packed1), 0u, 8u))  * shared_input[chunk_base + 4u];
      block_sum += f32(extractBits(bitcast<i32>(packed1), 8u, 8u))  * shared_input[chunk_base + 5u];
      block_sum += f32(extractBits(bitcast<i32>(packed1), 16u, 8u)) * shared_input[chunk_base + 6u];
      block_sum += f32(extractBits(bitcast<i32>(packed1), 24u, 8u)) * shared_input[chunk_base + 7u];
    }

    total_sum += block_sum * scale;
  }

  output[m] = total_sum;
}`,

      // F32 linear: matrix-vector multiply with shared memory for input vector
      // Used when Q8_0 weights are dequantized to f32 at load time
      linearF32: `
struct Params { M: u32, N: u32 }
@group(0) @binding(0) var<storage, read> input: array<f32>;
@group(0) @binding(1) var<storage, read> weight: array<f32>;
@group(0) @binding(2) var<storage, read_write> output: array<f32>;
@group(0) @binding(3) var<uniform> params: Params;

var<workgroup> shared_input: array<f32, 2048>;

@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) gid: vec3<u32>,
        @builtin(local_invocation_id) lid: vec3<u32>) {
  let m = gid.x;
  let tid = lid.x;
  let N = params.N;

  var i = tid;
  while (i < N) {
    shared_input[i] = input[i];
    i += 256u;
  }
  workgroupBarrier();

  if (m >= params.M) { return; }

  let row_offset = m * N;
  var sum0: f32 = 0.0;
  var sum1: f32 = 0.0;
  var sum2: f32 = 0.0;
  var sum3: f32 = 0.0;

  var j: u32 = 0u;
  let end4 = (N / 4u) * 4u;
  while (j < end4) {
    sum0 += weight[row_offset + j] * shared_input[j];
    sum1 += weight[row_offset + j + 1u] * shared_input[j + 1u];
    sum2 += weight[row_offset + j + 2u] * shared_input[j + 2u];
    sum3 += weight[row_offset + j + 3u] * shared_input[j + 3u];
    j += 4u;
  }
  while (j < N) {
    sum0 += weight[row_offset + j] * shared_input[j];
    j += 1u;
  }
  output[m] = sum0 + sum1 + sum2 + sum3;
}`,

      // Fused GeGLU activation: GELU(gate) * up
      // Gemma 3 uses GeGLU, NOT SiGLU/SwiGLU
      // GELU(x) = 0.5 * x * (1 + tanh(sqrt(2/π) * x * (1 + 0.044715 * x²)))
      siluMul: `
const SQRT_2_OVER_PI: f32 = 0.7978845608028654;
const GELU_COEF_A: f32 = 0.044715;

@group(0) @binding(0) var<storage, read> gate: array<f32>;
@group(0) @binding(1) var<storage, read> up: array<f32>;
@group(0) @binding(2) var<storage, read_write> output: array<f32>;
@group(0) @binding(3) var<uniform> size: u32;

@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let i = gid.x;
  if (i >= size) { return; }
  let x = gate[i];
  // Clamp tanh argument to prevent NaN on some GPU tanh implementations
  // (Metal/WebGPU can return NaN for |arg| > ~44 instead of saturating to ±1)
  let tanh_arg = clamp(SQRT_2_OVER_PI * x * (1.0 + GELU_COEF_A * x * x), -15.0, 15.0);
  let gelu = 0.5 * x * (1.0 + tanh(tanh_arg));
  output[i] = gelu * up[i];
}`,

      // Fused RMS norm + Q8 linear: compute norm, write normed to global AND shared,
      // then compute Q8 linear from shared memory. Also outputs normed for K/V.
      // Saves 1 dispatch boundary per use.
      fusedNormLinearQ8: `
struct Params { M: u32, N: u32, eps: f32, pad: u32 }
@group(0) @binding(0) var<storage, read> input: array<f32>;
@group(0) @binding(1) var<storage, read> norm_weight: array<f32>;
@group(0) @binding(2) var<storage, read> weight_q8: array<u32>;
@group(0) @binding(3) var<storage, read_write> output: array<f32>;
@group(0) @binding(4) var<storage, read_write> normed_out: array<f32>;
@group(0) @binding(5) var<uniform> params: Params;

var<workgroup> shared_normed: array<f32, 2048>;
var<workgroup> shared_rms: f32;
var<workgroup> shared_sum: array<f32, 256>;

@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) gid: vec3<u32>,
        @builtin(local_invocation_id) lid: vec3<u32>) {
  let m = gid.x;
  let tid = lid.x;
  let N = params.N;

  // Step 1: Cooperatively compute RMS of input
  var partial: f32 = 0.0;
  var i = tid;
  while (i < N) {
    let val = input[i];
    partial += val * val;
    i += 256u;
  }
  shared_sum[tid] = partial;
  workgroupBarrier();

  for (var stride: u32 = 128u; stride > 0u; stride >>= 1u) {
    if (tid < stride) { shared_sum[tid] += shared_sum[tid + stride]; }
    workgroupBarrier();
  }

  if (tid == 0u) {
    shared_rms = sqrt(shared_sum[0] / f32(N) + params.eps);
  }
  workgroupBarrier();

  let rms = shared_rms;

  // Step 2: Normalize into shared memory AND global normed_out (for K/V to use)
  i = tid;
  while (i < N) {
    let val = input[i] * norm_weight[i] / rms;
    shared_normed[i] = val;
    normed_out[i] = val;
    i += 256u;
  }
  workgroupBarrier();

  // Step 3: Q8 linear from shared normed input
  if (m >= params.M) { return; }

  let blocks_per_row = N / 32u;
  let row_offset = m * blocks_per_row * 9u;
  var total_sum: f32 = 0.0;

  for (var b: u32 = 0u; b < blocks_per_row; b++) {
    let block_off = row_offset + b * 9u;
    let scale = bitcast<f32>(weight_q8[block_off]);
    let input_base = b * 32u;
    var block_sum: f32 = 0.0;

    for (var chunk: u32 = 0u; chunk < 4u; chunk++) {
      let chunk_base = input_base + chunk * 8u;
      let qs_base = block_off + 1u + chunk * 2u;
      let packed0 = weight_q8[qs_base];
      let packed1 = weight_q8[qs_base + 1u];

      block_sum += f32(extractBits(bitcast<i32>(packed0), 0u, 8u))  * shared_normed[chunk_base + 0u];
      block_sum += f32(extractBits(bitcast<i32>(packed0), 8u, 8u))  * shared_normed[chunk_base + 1u];
      block_sum += f32(extractBits(bitcast<i32>(packed0), 16u, 8u)) * shared_normed[chunk_base + 2u];
      block_sum += f32(extractBits(bitcast<i32>(packed0), 24u, 8u)) * shared_normed[chunk_base + 3u];
      block_sum += f32(extractBits(bitcast<i32>(packed1), 0u, 8u))  * shared_normed[chunk_base + 4u];
      block_sum += f32(extractBits(bitcast<i32>(packed1), 8u, 8u))  * shared_normed[chunk_base + 5u];
      block_sum += f32(extractBits(bitcast<i32>(packed1), 16u, 8u)) * shared_normed[chunk_base + 6u];
      block_sum += f32(extractBits(bitcast<i32>(packed1), 24u, 8u)) * shared_normed[chunk_base + 7u];
    }
    total_sum += block_sum * scale;
  }

  output[m] = total_sum;
}`,

      // RoPE: Apply rotary position embedding to Q or K
      // Uses NEOX/half-split pairing: pairs are (data[i], data[i + half_dim])
      // This matches llama.cpp's LLAMA_ROPE_TYPE_NEOX used by Gemma 3
      rope: `
struct Params { num_heads: u32, head_dim: u32, position: u32, theta: f32 }
@group(0) @binding(0) var<storage, read_write> data: array<f32>;
@group(0) @binding(1) var<uniform> params: Params;

@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let idx = gid.x;
  let half_dim = params.head_dim / 2u;
  let total_pairs = params.num_heads * half_dim;
  if (idx >= total_pairs) { return; }

  let head = idx / half_dim;
  let i = idx % half_dim;

  let base = head * params.head_dim;
  let freq = 1.0 / pow(params.theta, f32(i * 2u) / f32(params.head_dim));
  let angle = f32(params.position) * freq;
  let cos_a = cos(angle);
  let sin_a = sin(angle);

  let x0 = data[base + i];
  let x1 = data[base + i + half_dim];
  data[base + i] = x0 * cos_a - x1 * sin_a;
  data[base + i + half_dim] = x0 * sin_a + x1 * cos_a;
}`,

struct Params { num_kv_heads: u32, head_dim: u32, position: u32, max_seq_len: u32 }
@group(0) @binding(0) var<storage, read> k_in: array<f32>;
@group(0) @binding(1) var<storage, read> v_in: array<f32>;
@group(0) @binding(2) var<storage, read_write> k_cache: array<f32>;
@group(0) @binding(3) var<storage, read_write> v_cache: array<f32>;
@group(0) @binding(4) var<uniform> params: Params;

@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let i = gid.x;
  let total = params.num_kv_heads * params.head_dim;
  if (i >= total) { return; }

  let head = i / params.head_dim;
  let d = i % params.head_dim;

  // Cache layout: [max_seq, num_kv_heads, head_dim]
  let cache_idx = params.position * total + head * params.head_dim + d;
  k_cache[cache_idx] = k_in[i];
  v_cache[cache_idx] = v_in[i];

      // Attention score with GQA
      attnScore: `
struct Params { num_q_heads: u32, num_kv_heads: u32, head_dim: u32, seq_len: u32, scale: f32, pad0: u32 }
@group(0) @binding(0) var<storage, read> q: array<f32>;
@group(0) @binding(1) var<storage, read> k_cache: array<f32>;
@group(0) @binding(2) var<storage, read_write> scores: array<f32>;
@group(0) @binding(3) var<uniform> params: Params;

@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let idx = gid.x;
  let total = params.num_q_heads * params.seq_len;
  if (idx >= total) { return; }

  let head = idx / params.seq_len;
  let pos = idx % params.seq_len;

  // GQA: map Q head to KV head
  let kv_head = head * params.num_kv_heads / params.num_q_heads;

  let q_offset = head * params.head_dim;
  // K cache layout: [max_seq, num_kv_heads, head_dim]
  let kv_stride = params.num_kv_heads * params.head_dim;
  let k_offset = pos * kv_stride + kv_head * params.head_dim;

  var dot: f32 = 0.0;
  for (var d: u32 = 0u; d < params.head_dim; d++) {
    dot += q[q_offset + d] * k_cache[k_offset + d];
  }

  scores[head * params.seq_len + pos] = dot * params.scale;
}`,

      // Softmax over scores[num_heads, seq_len] - one workgroup per head
      softmax: `
struct Params { num_heads: u32, seq_len: u32 }
@group(0) @binding(0) var<storage, read_write> scores: array<f32>;
@group(0) @binding(1) var<uniform> params: Params;
var<workgroup> shared_max: array<f32, 256>;
var<workgroup> shared_sum: array<f32, 256>;

@compute @workgroup_size(256)
fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(workgroup_id) wid: vec3<u32>) {
  let tid = lid.x;
  let head = wid.x;
  if (head >= params.num_heads) { return; }

  let base = head * params.seq_len;

  // Find max
  var local_max: f32 = -1e30;
  var i = tid;
  while (i < params.seq_len) {
    local_max = max(local_max, scores[base + i]);
    i += 256u;
  }
  shared_max[tid] = local_max;
  workgroupBarrier();

  for (var stride: u32 = 128u; stride > 0u; stride >>= 1u) {
    if (tid < stride) { shared_max[tid] = max(shared_max[tid], shared_max[tid + stride]); }
    workgroupBarrier();
  }
  let max_val = shared_max[0];

  // Exp and sum
  var local_sum: f32 = 0.0;
  i = tid;
  while (i < params.seq_len) {
    let e = exp(scores[base + i] - max_val);
    scores[base + i] = e;
    local_sum += e;
    i += 256u;
  }
  shared_sum[tid] = local_sum;
  workgroupBarrier();

  for (var stride: u32 = 128u; stride > 0u; stride >>= 1u) {
    if (tid < stride) { shared_sum[tid] += shared_sum[tid + stride]; }
    workgroupBarrier();
  }
  let sum_val = shared_sum[0];

  // Normalize
  i = tid;
  while (i < params.seq_len) {
    scores[base + i] = scores[base + i] / sum_val;
    i += 256u;
  }
}`,

      // Attention output: probs[num_q_heads, seq_len] @ V_cache[seq_len, num_kv_heads, head_dim]

struct Params { num_q_heads: u32, num_kv_heads: u32, head_dim: u32, seq_len: u32 }
@group(0) @binding(0) var<storage, read> probs: array<f32>;
@group(0) @binding(1) var<storage, read> v_cache: array<f32>;
@group(0) @binding(2) var<storage, read_write> output: array<f32>;
@group(0) @binding(3) var<uniform> params: Params;

@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let idx = gid.x;
  let total = params.num_q_heads * params.head_dim;
  if (idx >= total) { return; }

  let head = idx / params.head_dim;
  let d = idx % params.head_dim;

  let kv_head = head * params.num_kv_heads / params.num_q_heads;

  let kv_stride = params.num_kv_heads * params.head_dim;

  var sum: f32 = 0.0;
  for (var pos: u32 = 0u; pos < params.seq_len; pos++) {
    let prob = probs[head * params.seq_len + pos];
    let v_idx = pos * kv_stride + kv_head * params.head_dim + d;

  output[head * params.head_dim + d] = sum;

      // LM Head: project hidden state [H] to logits [V] via embedding matrix [V, H]
      // Optimized with vec4 loads for 4x better memory coalescing
      lmHead: `
struct Params { vocab_size: u32, hidden_size: u32 }
@group(0) @binding(0) var<storage, read> hidden: array<vec4<f32>>;
@group(0) @binding(1) var<storage, read> embedding: array<vec4<f32>>;
@group(0) @binding(2) var<storage, read_write> logits: array<f32>;
@group(0) @binding(3) var<uniform> params: Params;

@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let v = gid.x;
  if (v >= params.vocab_size) { return; }

  let vec4_count = params.hidden_size / 4u;
  let emb_offset = v * vec4_count;

  var sum0: vec4<f32> = vec4<f32>(0.0);
  var sum1: vec4<f32> = vec4<f32>(0.0);
  var sum2: vec4<f32> = vec4<f32>(0.0);
  var sum3: vec4<f32> = vec4<f32>(0.0);

  let end4 = (vec4_count / 4u) * 4u;
  var i: u32 = 0u;
  while (i < end4) {
    sum0 += hidden[i] * embedding[emb_offset + i];
    sum1 += hidden[i+1u] * embedding[emb_offset + i + 1u];
    sum2 += hidden[i+2u] * embedding[emb_offset + i + 2u];
    sum3 += hidden[i+3u] * embedding[emb_offset + i + 3u];
    i += 4u;
  }
  while (i < vec4_count) {
    sum0 += hidden[i] * embedding[emb_offset + i];
    i += 1u;
  }

  let total = sum0 + sum1 + sum2 + sum3;
  logits[v] = total.x + total.y + total.z + total.w;
}`,

      // Fused per-head RMS norm + RoPE: normalize each head then apply rotary embedding
      // Replaces separate perHeadRmsNorm + rope passes, saving 1 dispatch boundary per layer
      fusedPerHeadNormRope: `
struct Params { num_heads: u32, head_dim: u32, eps: f32, position: u32, theta: f32, pad: u32 }
@group(0) @binding(0) var<storage, read_write> data: array<f32>;
@group(0) @binding(1) var<storage, read> weight: array<f32>;
@group(0) @binding(2) var<uniform> params: Params;

var<workgroup> shared_sum: array<f32, 256>;

@compute @workgroup_size(256)
fn main(@builtin(local_invocation_id) lid: vec3<u32>,
        @builtin(workgroup_id) wid: vec3<u32>) {
  let head = wid.x;
  if (head >= params.num_heads) { return; }
  let tid = lid.x;
  let base = head * params.head_dim;

  // Step 1: Compute RMS of this head
  var partial: f32 = 0.0;
  var i = tid;
  while (i < params.head_dim) {
    let val = data[base + i];
    partial += val * val;
    i += 256u;
  }
  shared_sum[tid] = partial;
  workgroupBarrier();

  for (var stride: u32 = 128u; stride > 0u; stride >>= 1u) {
    if (tid < stride) { shared_sum[tid] += shared_sum[tid + stride]; }
    workgroupBarrier();
  }

  let rms = sqrt(shared_sum[0] / f32(params.head_dim) + params.eps);

  // Step 2: Normalize with weight
  i = tid;
  while (i < params.head_dim) {
    data[base + i] = data[base + i] * weight[i] / rms;
    i += 256u;
  }
  workgroupBarrier();

  // Step 3: Apply RoPE rotation using NEOX/half-split pairing
  // Pairs: (data[i], data[i + half_dim]) — matches llama.cpp LLAMA_ROPE_TYPE_NEOX
  let half_dim = params.head_dim / 2u;
  i = tid;
  while (i < half_dim) {
    let freq = 1.0 / pow(params.theta, f32(i * 2u) / f32(params.head_dim));
    let angle = f32(params.position) * freq;
    let cos_a = cos(angle);
    let sin_a = sin(angle);

    let x0 = data[base + i];
    let x1 = data[base + i + half_dim];
    data[base + i] = x0 * cos_a - x1 * sin_a;
    data[base + i + half_dim] = x0 * sin_a + x1 * cos_a;
    i += 256u;
  }
}`,
