        pass = enc.beginComputePass(); pass.setPipeline(pipelines.softmax); pass.setBindGroup(0, lb2.softmax); pass.dispatchWorkgroups(NQH); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.attnOutput); pass.setBindGroup(0, lb2.attnOutput); pass.dispatchWorkgroups(Math.ceil((NQH * HD) / 256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb2.linearAttnOut); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb2.postAttnNorm); pass.dispatchWorkgroups(1); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.add); pass.setBindGroup(0, lb2.residualAdd1); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb2.ffnNorm); pass.dispatchWorkgroups(1); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb2.ffnGate); pass.dispatchWorkgroups(Math.ceil(CONFIG.intermediate_size / 256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb2.ffnUp); pass.dispatchWorkgroups(Math.ceil(CONFIG.intermediate_size / 256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.siluMul); pass.setBindGroup(0, lb2.siluMul); pass.dispatchWorkgroups(Math.ceil(CONFIG.intermediate_size / 256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb2.ffnDown); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb2.postFfnNorm); pass.dispatchWorkgroups(1); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.add); pass.setBindGroup(0, lb2.residualAdd2); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
      }

      // Final norm
      pass = enc.beginComputePass();
      pass.setPipeline(pipelines.rmsNorm);
      pass.setBindGroup(0, bindGroupCache.finalNorm);
      pass.dispatchWorkgroups(1);
      pass.end();

      device.queue.submit([enc.finish()]);
      await device.queue.onSubmittedWorkDone();
    }

    // Debug: read back hidden state
    async function readBackHidden(label) {
      const H = CONFIG.hidden_size;
      const encoder = device.createCommandEncoder();
      encoder.copyBufferToBuffer(workBuffers.hidden, 0, workBuffers.hiddenReadback, 0, H * 4);
      device.queue.submit([encoder.finish()]);
      await device.queue.onSubmittedWorkDone();
      await workBuffers.hiddenReadback.mapAsync(GPUMapMode.READ);
      const data = new Float32Array(workBuffers.hiddenReadback.getMappedRange().slice(0));
      workBuffers.hiddenReadback.unmap();
      log(`${label}: [${data.slice(0, 10).map(v => v.toFixed(6)).join(', ')}]`);
      return data;
    }

    // Debug: read back logits and return top-K
    async function getTopKLogits(k = 10) {
      const V = CONFIG.vocab_size;
      const encoder = device.createCommandEncoder();
      encoder.copyBufferToBuffer(workBuffers.logits, 0, workBuffers.logitsReadback, 0, V * 4);
      device.queue.submit([encoder.finish()]);
      await device.queue.onSubmittedWorkDone();

      await workBuffers.logitsReadback.mapAsync(GPUMapMode.READ);
      const logits = new Float32Array(workBuffers.logitsReadback.getMappedRange().slice(0));
      workBuffers.logitsReadback.unmap();

      // Find top-K
      const indexed = [];
      for (let i = 0; i < logits.length; i++) indexed.push([i, logits[i]]);
      indexed.sort((a, b) => b[1] - a[1]);

      const topK = indexed.slice(0, k).map(([id, val]) => ({
        id, val: val.toFixed(4), token: decodeToken(id)
      }));
      return topK;
    }

    // =========================================================================
    // Generation
    // =========================================================================
    let generating = false;

    async function generate(prompt, maxTokens, temperature = 0.7, topP = 0.9, repPenalty = 1.15) {
      if (generating) return;
      generating = true;

      const outputArea = document.getElementById('output-area');
      const timingEl = document.getElementById('timing');
      const btn = document.getElementById('generate-btn');
      btn.disabled = true;
      btn.textContent = 'Generating...';

      try {
        // Build FunctionGemma prompt with tool declarations
        const toolsJson = document.getElementById('tools-input').value;
        const chatPrompt = buildFunctionPrompt(prompt, toolsJson);

        // Encode prompt
        const encodeStart = performance.now();
        const inputTokens = encodeSimple(chatPrompt);
        const encodeTime = performance.now() - encodeStart;
        log(`\nSampling: temperature=${temperature}, top_p=${topP}${temperature === 0 ? ' (greedy)' : ''}`, 'info');
        log(`Encoded prompt: "${prompt}" -> ${inputTokens.length} tokens (${encodeTime.toFixed(1)}ms)`, 'info');
        log(`  (Wrapped in FunctionGemma prompt with ${JSON.parse(toolsJson).length} tools)`);
        log(`  Token IDs: [${inputTokens.join(', ')}]`);

        // Show prompt tokens decoded back
        const promptDecoded = decodeTokens(inputTokens.slice(1)); // skip BOS for display
        log(`  Decoded back: "${promptDecoded}"`);

        const allTokens = [...inputTokens];

        // Display prompt
        outputArea.innerHTML = `<span class="prompt-text">${escapeHtml(prompt)}\n</span><span class="generated-text"></span>`;

        setStatus('Prefilling prompt...');

        // Prefill: batch-submit all tokens (no await between them)
        const prefillStart = performance.now();
        await prefillBatched(inputTokens);
        const prefillTime = performance.now() - prefillStart;
        log(`Prefill: ${inputTokens.length} tokens in ${prefillTime.toFixed(1)}ms (${(inputTokens.length / prefillTime * 1000).toFixed(1)} t/s)`, 'success');

        setStatus('Generating...');

        // Get first generated token using combined forward+lmHead+argmax (single submit)
        const genStart = performance.now();
        // For the first gen token, we need LM head on the last prefill hidden state
        // But prefillBatched already ran the final norm, so we need a forwardPassAndGetToken
        // that starts fresh. Actually the last prefill token's hidden state IS in the buffer,
        // but the final norm output (normed) was computed. We need to re-run from the last
        // prefill token to get the first gen token.
        // Actually, forwardPassOnly runs the final norm too, so normed buffer has the right state.
        // We just need LM head + argmax. But for simplicity, let's use a lightweight path:
        {
          const encoder = device.createCommandEncoder();
          let pass;
          const V = CONFIG.vocab_size;
          // LM Head (f32 — Q8_0 too lossy for 262K vocab)
          pass = encoder.beginComputePass();
          pass.setPipeline(pipelines.linearQ8);
          pass.setBindGroup(0, bindGroupCache.lmHead);
          pass.dispatchWorkgroups(Math.ceil(V / 256));
          pass.end();

          const useGreedyFast = (temperature === 0 && repPenalty <= 1.0);
          if (useGreedyFast) {
            pass = encoder.beginComputePass();
            pass.setPipeline(pipelines.argmax);
            pass.setBindGroup(0, bindGroupCache.argmax);
            pass.dispatchWorkgroups(1);
            pass.end();
            encoder.copyBufferToBuffer(workBuffers.argmaxResult, 0, workBuffers.argmaxReadback, 0, 4);
            device.queue.submit([encoder.finish()]);
            await device.queue.onSubmittedWorkDone();
            await workBuffers.argmaxReadback.mapAsync(GPUMapMode.READ);
            const r = new Uint32Array(workBuffers.argmaxReadback.getMappedRange());
            var nextToken = r[0];
            workBuffers.argmaxReadback.unmap();
          } else {
            pass = encoder.beginComputePass();
            pass.setPipeline(pipelines.topk256);
            pass.setBindGroup(0, bindGroupCache.topk256);
            pass.dispatchWorkgroups(1);
            pass.end();
            encoder.copyBufferToBuffer(workBuffers.topk256Result, 0, workBuffers.topk256Readback, 0, 256 * 2 * 4);
            device.queue.submit([encoder.finish()]);
            await device.queue.onSubmittedWorkDone();
            await workBuffers.topk256Readback.mapAsync(GPUMapMode.READ);
            const topkData = new Float32Array(workBuffers.topk256Readback.getMappedRange().slice(0));
            workBuffers.topk256Readback.unmap();
            const candidates = new Array(256);
            const topkU32 = new Uint32Array(topkData.buffer.slice(0));
            for (let i = 0; i < 256; i++) candidates[i] = { val: topkData[i*2], id: topkU32[i*2+1] };
            if (repPenalty > 1.0 && allTokens.length > 0) {
              const seen = new Set(allTokens);
              for (let i = 0; i < 256; i++) {
                if (seen.has(candidates[i].id)) {
                  if (candidates[i].val > 0) candidates[i].val /= repPenalty;
                  else candidates[i].val *= repPenalty;
                }
              }
            }
            candidates.sort((a, b) => b.val - a.val);
            if (temperature === 0) {
              var nextToken = candidates[0].id;
            } else {
              const maxL = candidates[0].val;
              let se = 0;
              const pr = new Float32Array(256);
              for (let i = 0; i < 256; i++) { pr[i] = Math.exp((candidates[i].val - maxL) / temperature); se += pr[i]; }
              let cp = 0, co = 256;
              for (let i = 0; i < 256; i++) { cp += pr[i] / se; if (cp >= topP) { co = i + 1; break; } }
              let ss = 0;
              for (let i = 0; i < co; i++) ss += pr[i];
              let rr = Math.random() * ss;
              var nextToken = candidates[co - 1].id;
              for (let i = 0; i < co; i++) { rr -= pr[i]; if (rr <= 0) { nextToken = candidates[i].id; break; } }
            }
          }
        }

        allTokens.push(nextToken);

        let generatedTokens = [nextToken];
        let genTokenCount = 1;

        // Update display
        const genSpan = outputArea.querySelector('.generated-text');
        genSpan.textContent = decodeToken(nextToken);
        timingEl.textContent = `Generated 1 token...`;

        // Auto-regressive generation using combined forward+lmHead+argmax
        for (let step = 1; step < maxTokens; step++) {
          if (nextToken === 1) break; // EOS
          if (nextToken === 0) break; // PAD
          if (nextToken === 106) break; // <end_of_turn>
          if (FUNC_TOKENS['<end_function_call>'] && nextToken === FUNC_TOKENS['<end_function_call>']) {
            generatedTokens.push(nextToken); // include the closing token in output
            genTokenCount++;
            break;
          }

          const pos = inputTokens.length + step - 1;
          if (pos >= CONFIG.context_length - 1) {
            log('Reached max context length', 'info');
            break;
          }

          // Single submit: forward pass + LM head + token selection
          nextToken = await forwardPassAndGetToken(nextToken, pos, temperature, topP, repPenalty, allTokens);

          if (nextToken === 1) break; // EOS
          if (nextToken === 0) break; // PAD
          if (nextToken === 106) break; // <end_of_turn>
          if (FUNC_TOKENS['<end_function_call>'] && nextToken === FUNC_TOKENS['<end_function_call>']) {
            allTokens.push(nextToken);
            generatedTokens.push(nextToken);
            genTokenCount++;
            break;
          }

          allTokens.push(nextToken);
          generatedTokens.push(nextToken);
          genTokenCount++;

          // Incremental display
          genSpan.textContent = decodeTokens(generatedTokens);

          const elapsed = performance.now() - genStart;
          const tokPerSec = (genTokenCount / elapsed * 1000).toFixed(1);
          timingEl.textContent = `Generated ${genTokenCount} tokens | ${tokPerSec} tokens/sec | ${elapsed.toFixed(0)}ms elapsed`;
          setStatus(`Generating... ${genTokenCount} tokens (${tokPerSec} t/s)`);
        }

        const totalGenTime = performance.now() - genStart;
        const finalTokPerSec = (genTokenCount / totalGenTime * 1000).toFixed(1);

        // Parse and display function call output nicely
        const rawOutput = decodeTokens(generatedTokens);
        const parsedOutput = formatFunctionCallOutput(rawOutput);
        genSpan.innerHTML = parsedOutput;

        timingEl.textContent = `Prefill: ${inputTokens.length} tokens in ${prefillTime.toFixed(0)}ms (${(inputTokens.length / prefillTime * 1000).toFixed(1)} t/s) | Generation: ${genTokenCount} tokens in ${totalGenTime.toFixed(0)}ms (${finalTokPerSec} t/s)`;
        setStatus(`Done: ${genTokenCount} tokens generated at ${finalTokPerSec} tokens/sec`);
        log(`\nGeneration complete: ${genTokenCount} tokens in ${totalGenTime.toFixed(1)}ms (${finalTokPerSec} t/s)`, 'success');
        log(`Raw output: "${rawOutput}"`, 'info');

      } catch (err) {
        log(`\nGeneration ERROR: ${err.message}`, 'error');
        log(`Stack: ${err.stack}`, 'error');
        setStatus(`Error: ${err.message}`);
      } finally {
        generating = false;
        btn.disabled = false;
        btn.textContent = 'Generate';
      }
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function formatFunctionCallOutput(text) {
      // Try to parse FunctionGemma output format:
      // <start_function_call>call:func_name{param:<escape>value<escape>}<end_function_call>
      const callMatch = text.match(/call:(\w+)\{(.*)\}/s);
      if (callMatch) {
        const funcName = callMatch[1];
        const paramsRaw = callMatch[2];
        // Replace <escape> delimiters with quotes for display
        const paramsClean = paramsRaw.replace(/<escape>/g, '"');
        return `<span class="function-call">📞 Function Call:</span>\n` +
               `<span class="function-name">${escapeHtml(funcName)}</span>` +
               `<span class="function-params">(${escapeHtml(paramsClean)})</span>`;
      }
      // Fallback: just show raw output
      return `<span class="generated-text">${escapeHtml(text)}</span>`;
    }

    // Make generate accessible from button onclick
    window.onGenerate = function() {
      const prompt = document.getElementById('prompt-input').value;
      const maxTokens = parseInt(document.getElementById('max-tokens').value) || 50;
      const temperature = parseFloat(document.getElementById('temperature').value) || 0;
      const topP = parseFloat(document.getElementById('top-p').value) || 0.9;
      const repPenalty = parseFloat(document.getElementById('rep-penalty').value) || 1.0;
      resetKVCaches();
      generate(prompt, maxTokens, temperature, topP, repPenalty);
    };

    // Debug: embedding-only forward pass
    async function debugEmbeddingOnly(tokenId) {
      const H = CONFIG.hidden_size;
      device.queue.writeBuffer(uniformBuffers.embeddingLookup, 4, new Uint32Array([tokenId]));
      const enc = device.createCommandEncoder();
      const pass = enc.beginComputePass();
      pass.setPipeline(pipelines.embeddingLookup);
      pass.setBindGroup(0, bindGroupCache.embeddingLookup);
      pass.dispatchWorkgroups(Math.ceil(H / 256));
      pass.end();
      device.queue.submit([enc.finish()]);
      await device.queue.onSubmittedWorkDone();
      return await readBackBuffer(workBuffers.hidden, H * 4, 'embedding');
    }

    // Debug: get layer-by-layer hidden states
    async function debugLayerOutputs(tokenId, position) {
      const H = CONFIG.hidden_size;
      device.queue.writeBuffer(uniformBuffers.embeddingLookup, 4, new Uint32Array([tokenId]));
      const posU32 = new Uint32Array([position]);
      for (let il = 0; il < CONFIG.num_layers; il++) {
        device.queue.writeBuffer(uniformBuffers.fusedNormRopeQ[il], 12, posU32);
        device.queue.writeBuffer(uniformBuffers.fusedNormRopeK[il], 12, posU32);
      }
      device.queue.writeBuffer(uniformBuffers.kvCacheStore, 8, posU32);
      const seqU32 = new Uint32Array([position + 1]);
      device.queue.writeBuffer(uniformBuffers.attnScore, 12, seqU32);
      device.queue.writeBuffer(uniformBuffers.softmax, 4, seqU32);
      device.queue.writeBuffer(uniformBuffers.attnOutput, 12, seqU32);

      // Embedding
      let enc = device.createCommandEncoder();
      let pass = enc.beginComputePass();
      pass.setPipeline(pipelines.embeddingLookup);
      pass.setBindGroup(0, bindGroupCache.embeddingLookup);
      pass.dispatchWorkgroups(Math.ceil(H / 256));
      pass.end();
      device.queue.submit([enc.finish()]);
      await device.queue.onSubmittedWorkDone();
      const embOut = await readBackBuffer(workBuffers.hidden, H * 4, 'emb');

      const results = { embedding: { first5: Array.from(embOut.slice(0,5)).map(v=>v.toFixed(6)), rms: Math.sqrt(Array.from(embOut).reduce((s,v)=>s+v*v,0)/H).toFixed(4) } };

      // Run layer by layer
      for (let layerIdx = 0; layerIdx < CONFIG.num_layers; layerIdx++) {
        // Full layer forward (same as forwardPass)
        const lb = bindGroupCache.layers[layerIdx];
        enc = device.createCommandEncoder();
        // attn norm
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.attnNorm); pass.dispatchWorkgroups(1); pass.end();
        // Q+K+V
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.linearQ); pass.dispatchWorkgroups(Math.ceil(CONFIG.q_dim / 256));
        pass.setBindGroup(0, lb.linearK); pass.dispatchWorkgroups(Math.ceil(CONFIG.kv_dim / 256));
        pass.setBindGroup(0, lb.linearV); pass.dispatchWorkgroups(Math.ceil(CONFIG.kv_dim / 256));
        pass.end();
        // Fused norm+rope
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.fusedPerHeadNormRope);
        pass.setBindGroup(0, lb.fusedNormRopeQ); pass.dispatchWorkgroups(CONFIG.num_q_heads);
        pass.setBindGroup(0, lb.fusedNormRopeK); pass.dispatchWorkgroups(CONFIG.num_kv_heads);
        pass.end();
        // KV store
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.kvCacheStore); pass.setBindGroup(0, lb.kvStore); pass.dispatchWorkgroups(Math.ceil(CONFIG.kv_dim/256)); pass.end();
        // Attn
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.attnScore); pass.setBindGroup(0, lb.attnScore); pass.dispatchWorkgroups(Math.ceil((CONFIG.num_q_heads*(position+1))/256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.softmax); pass.setBindGroup(0, lb.softmax); pass.dispatchWorkgroups(CONFIG.num_q_heads); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.attnOutput); pass.setBindGroup(0, lb.attnOutput); pass.dispatchWorkgroups(Math.ceil((CONFIG.num_q_heads*CONFIG.head_dim)/256)); pass.end();
        // Output proj
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.linearAttnOut); pass.dispatchWorkgroups(Math.ceil(H/256)); pass.end();
        // Fused post-attn norm + residual
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.fusedNormAdd); pass.setBindGroup(0, lb.fusedPostAttnNormAdd); pass.dispatchWorkgroups(1); pass.end();
        // FFN
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.ffnNorm); pass.dispatchWorkgroups(1); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.ffnGate); pass.dispatchWorkgroups(Math.ceil(CONFIG.intermediate_size/256));
        pass.setBindGroup(0, lb.ffnUp); pass.dispatchWorkgroups(Math.ceil(CONFIG.intermediate_size/256));
        pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.siluMul); pass.setBindGroup(0, lb.siluMul); pass.dispatchWorkgroups(Math.ceil(CONFIG.intermediate_size/256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.ffnDown); pass.dispatchWorkgroups(Math.ceil(H/256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.fusedNormAdd); pass.setBindGroup(0, lb.fusedPostFfnNormAdd); pass.dispatchWorkgroups(1); pass.end();
        device.queue.submit([enc.finish()]);
        await device.queue.onSubmittedWorkDone();

        const layerOut = await readBackBuffer(workBuffers.hidden, H * 4, `L${layerIdx}`);
        results[`layer${layerIdx}`] = { first5: Array.from(layerOut.slice(0,5)).map(v=>v.toFixed(6)), rms: Math.sqrt(Array.from(layerOut).reduce((s,v)=>s+v*v,0)/H).toFixed(4) };
      }
      return results;
    }

    // Expose internals for debugging from Chrome console
    window._debug = {
      forwardPass, forwardPassAndGetToken, forwardPassOnly, prefillBatched,
      lmHeadAndArgmax, sampleTopP, getTopKLogits, encodeSimple,
      resetKVCaches, readBackBuffer, debugForwardPass, debugNaN, debugNaN2, nanDebugForwardPass,
      debugEmbeddingOnly, debugLayerOutputs,
      get device() { return device; },
      get workBuffers() { return workBuffers; },
      get kvCaches() { return kvCaches; },
      get CONFIG() { return CONFIG; },
      decodeToken, decodeTokens,
    };

    window.onDebugNaN = function() {
      const prompt = document.getElementById('prompt-input').value;
      debugNaN2(prompt);
    };

    function resetKVCaches() {
      const HD = CONFIG.head_dim;
      const NKH = CONFIG.num_kv_heads;
      const MAX_SEQ = CONFIG.context_length;
      const zeros = new Float32Array(MAX_SEQ * NKH * HD);
      for (let i = 0; i < CONFIG.num_layers; i++) {
        device.queue.writeBuffer(kvCaches[i].k, 0, zeros);
        device.queue.writeBuffer(kvCaches[i].v, 0, zeros);
      }
    }

    // =========================================================================
    // NaN Debug: trace which layer/operation first produces NaN
    // =========================================================================
    async function checkBufferForNaN(buffer, numFloats, label) {
      const rb = device.createBuffer({ size: numFloats * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
      const enc = device.createCommandEncoder();
      enc.copyBufferToBuffer(buffer, 0, rb, 0, numFloats * 4);
      device.queue.submit([enc.finish()]);
      await device.queue.onSubmittedWorkDone();
      await rb.mapAsync(GPUMapMode.READ);
      const data = new Float32Array(rb.getMappedRange().slice(0));
      rb.unmap();
      rb.destroy();

      let nanCount = 0, infCount = 0, maxAbs = 0;
      for (let i = 0; i < data.length; i++) {
        if (isNaN(data[i])) nanCount++;
        else if (!isFinite(data[i])) infCount++;
        else if (Math.abs(data[i]) > maxAbs) maxAbs = Math.abs(data[i]);
      }
      return { nanCount, infCount, maxAbs, data, label };
    }

    async function nanDebugForwardPass(tokenId, position) {
      const H = CONFIG.hidden_size;
      const Q = CONFIG.q_dim;
      const KV = CONFIG.kv_dim;
      const I = CONFIG.intermediate_size;
      const HD = CONFIG.head_dim;
      const NQH = CONFIG.num_q_heads;
      const NKH = CONFIG.num_kv_heads;
      const MAX_SEQ = CONFIG.context_length;
      const seqLen = position + 1;

      // Update all uniforms
      device.queue.writeBuffer(uniformBuffers.embeddingLookup, 4, new Uint32Array([tokenId]));
      const posU32 = new Uint32Array([position]);
      for (let il = 0; il < CONFIG.num_layers; il++) {
        device.queue.writeBuffer(uniformBuffers.ropeQ[il], 8, posU32);
        device.queue.writeBuffer(uniformBuffers.ropeK[il], 8, posU32);
      }
      device.queue.writeBuffer(uniformBuffers.kvCacheStore, 8, posU32);
      const seqU32 = new Uint32Array([seqLen]);
      device.queue.writeBuffer(uniformBuffers.attnScore, 12, seqU32);
      device.queue.writeBuffer(uniformBuffers.softmax, 4, seqU32);
      device.queue.writeBuffer(uniformBuffers.attnOutput, 12, seqU32);

      // Embedding
      let enc = device.createCommandEncoder();
      let pass = enc.beginComputePass();
      pass.setPipeline(pipelines.embeddingLookup);
      pass.setBindGroup(0, bindGroupCache.embeddingLookup);
      pass.dispatchWorkgroups(Math.ceil(H / 256));
      pass.end();
      device.queue.submit([enc.finish()]);
      await device.queue.onSubmittedWorkDone();

      let check = await checkBufferForNaN(workBuffers.hidden, H, 'embedding');
      if (check.nanCount || check.infCount) {
        log(`🔴 NaN/Inf in EMBEDDING: NaN=${check.nanCount}, Inf=${check.infCount}`, 'error');
        return { found: true, where: 'embedding', position, tokenId, check };
      }

      // Process each layer with NaN checks
      for (let layerIdx = 0; layerIdx < CONFIG.num_layers; layerIdx++) {
        const lb = bindGroupCache.layers[layerIdx];

        // Run full layer
        enc = device.createCommandEncoder();
        // 1. Pre-attention norm
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.attnNorm); pass.dispatchWorkgroups(1); pass.end();
        // 2-4. Q, K, V projections
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.linearQ); pass.dispatchWorkgroups(Math.ceil(Q / 256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.linearK); pass.dispatchWorkgroups(Math.ceil(KV / 256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.linearV); pass.dispatchWorkgroups(Math.ceil(KV / 256)); pass.end();
        // 5-6. Q/K norms
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.perHeadRmsNorm); pass.setBindGroup(0, lb.qNorm); pass.dispatchWorkgroups(NQH); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.perHeadRmsNorm); pass.setBindGroup(0, lb.kNorm); pass.dispatchWorkgroups(NKH); pass.end();
        // 7-8. RoPE
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.rope); pass.setBindGroup(0, lb.ropeQ); pass.dispatchWorkgroups(Math.ceil((NQH * HD / 2) / 256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.rope); pass.setBindGroup(0, lb.ropeK); pass.dispatchWorkgroups(Math.ceil((NKH * HD / 2) / 256)); pass.end();
        // 9. KV cache store
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.kvCacheStore); pass.setBindGroup(0, lb.kvStore); pass.dispatchWorkgroups(Math.ceil(KV / 256)); pass.end();
        // 10-12. Attention
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.attnScore); pass.setBindGroup(0, lb.attnScore); pass.dispatchWorkgroups(Math.ceil((NQH * seqLen) / 256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.softmax); pass.setBindGroup(0, lb.softmax); pass.dispatchWorkgroups(NQH); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.attnOutput); pass.setBindGroup(0, lb.attnOutput); pass.dispatchWorkgroups(Math.ceil((NQH * HD) / 256)); pass.end();
        // 13. Output projection
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.linearAttnOut); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
        // 14. Post-attention norm
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.postAttnNorm); pass.dispatchWorkgroups(1); pass.end();
        // 15. Residual add
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.add); pass.setBindGroup(0, lb.residualAdd1); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
        // 16. FFN norm
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.ffnNorm); pass.dispatchWorkgroups(1); pass.end();
        // 17-18. FFN gate, up
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.ffnGate); pass.dispatchWorkgroups(Math.ceil(I / 256)); pass.end();
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.ffnUp); pass.dispatchWorkgroups(Math.ceil(I / 256)); pass.end();
        // 19. GeGLU
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.siluMul); pass.setBindGroup(0, lb.siluMul); pass.dispatchWorkgroups(Math.ceil(I / 256)); pass.end();
        // 20. FFN down
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.ffnDown); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
        // 21. Post-FFN norm
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.postFfnNorm); pass.dispatchWorkgroups(1); pass.end();
        // 22. Residual add
        pass = enc.beginComputePass(); pass.setPipeline(pipelines.add); pass.setBindGroup(0, lb.residualAdd2); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();

        device.queue.submit([enc.finish()]);
        await device.queue.onSubmittedWorkDone();

        // Check hidden state after this layer
        check = await checkBufferForNaN(workBuffers.hidden, H, `layer ${layerIdx} hidden`);
        if (check.nanCount || check.infCount) {
          log(`🔴 NaN/Inf after LAYER ${layerIdx}: NaN=${check.nanCount}, Inf=${check.infCount}, maxAbs=${check.maxAbs.toExponential(3)}`, 'error');

          // Immediately check ALL intermediate buffers (they still hold this layer's values!)
          log(`\n🔍 Checking intermediate buffers in-place for layer ${layerIdx}:`, 'info');
          const intermediates = [
            ['normed (ffnNorm output)', workBuffers.normed, H],
            ['q (after RoPE)', workBuffers.q, Q],
            ['k (after RoPE)', workBuffers.k, KV],
            ['v (after linearV)', workBuffers.v, KV],
            ['attnScores (after softmax)', workBuffers.attnScores, NQH * seqLen],
            ['attnOut', workBuffers.attnOut, NQH * HD],
            ['attnProj', workBuffers.attnProj, H],
            ['postAttnNormed', workBuffers.postAttnNormed, H],
            ['residual (after add1)', workBuffers.residual, H],
            ['ffnGate', workBuffers.ffnGate, I],
            ['ffnUp', workBuffers.ffnUp, I],
            ['ffnMul (after GeGLU)', workBuffers.ffnMul, I],
            ['ffnDown', workBuffers.ffnDown, H],
            ['postFfnNormed', workBuffers.postFfnNormed, H],
            ['hidden (after add2)', workBuffers.hidden, H],
          ];

          for (const [name, buf, size] of intermediates) {
            const c = await checkBufferForNaN(buf, size, name);
            const status = (c.nanCount || c.infCount)
              ? `🔴 NaN=${c.nanCount}, Inf=${c.infCount}`
              : `✅ maxAbs=${c.maxAbs.toFixed(4)}`;
            log(`  ${name}: ${status}  first5=[${Array.from(c.data.slice(0,5)).map(v=> isNaN(v) ? 'NaN' : v.toFixed(4)).join(', ')}]`);
          }

          // Also check the hidden state that was INPUT to this layer
          // (it was overwritten by residualAdd2, but we can check what the PREVIOUS layer left)
          // We can't recover it, but let's check the KV cache for this layer
          const kvK = await checkBufferForNaN(kvCaches[layerIdx].k, MAX_SEQ * NKH * HD, `layer ${layerIdx} K cache`);
          const kvV = await checkBufferForNaN(kvCaches[layerIdx].v, MAX_SEQ * NKH * HD, `layer ${layerIdx} V cache`);
          log(`  KV cache K: NaN=${kvK.nanCount}, Inf=${kvK.infCount}, maxAbs=${kvK.maxAbs.toFixed(4)}`);
          log(`  KV cache V: NaN=${kvV.nanCount}, Inf=${kvV.infCount}, maxAbs=${kvV.maxAbs.toFixed(4)}`);

          return { found: true, where: `layer${layerIdx}`, position, tokenId, check };
        }
        if (layerIdx % 3 === 0 || layerIdx === CONFIG.num_layers - 1) {
          log(`  Layer ${layerIdx}: OK (maxAbs=${check.maxAbs.toFixed(2)})`, 'success');
        }
      }

      // Final norm
      enc = device.createCommandEncoder();
      pass = enc.beginComputePass();
      pass.setPipeline(pipelines.rmsNorm);
      pass.setBindGroup(0, bindGroupCache.finalNorm);
      pass.dispatchWorkgroups(1);
      pass.end();
      device.queue.submit([enc.finish()]);
      await device.queue.onSubmittedWorkDone();

      check = await checkBufferForNaN(workBuffers.normed, H, 'final norm');
      if (check.nanCount || check.infCount) {
        log(`🔴 NaN/Inf in FINAL NORM: NaN=${check.nanCount}, Inf=${check.infCount}`, 'error');
        return { found: true, where: 'final_norm', position, tokenId, check };
      }

      return { found: false, position, tokenId };
    }

    // Drill down into a specific layer to find which operation produces NaN
    async function nanDrillDownLayer(layerIdx, tokenId, position) {
      const H = CONFIG.hidden_size;
      const Q = CONFIG.q_dim;
      const KV = CONFIG.kv_dim;
      const I = CONFIG.intermediate_size;
      const HD = CONFIG.head_dim;
      const NQH = CONFIG.num_q_heads;
      const NKH = CONFIG.num_kv_heads;
      const seqLen = position + 1;

      log(`\n🔍 DRILLING DOWN into layer ${layerIdx}...`, 'info');

      // We need to re-run this layer from the hidden state at the start of this layer.
      // But we've already corrupted it. Instead, let's re-run the full forward from scratch
      // up to this layer, then step through the operations one by one.
      // Actually, we can't easily re-run because the KV cache state matters.
      // Instead, let's just re-run the ENTIRE forward pass but only check the problem layer in detail.

      // Re-run: update uniforms
      device.queue.writeBuffer(uniformBuffers.embeddingLookup, 4, new Uint32Array([tokenId]));
      const posU32 = new Uint32Array([position]);
      for (let il = 0; il < CONFIG.num_layers; il++) {
        device.queue.writeBuffer(uniformBuffers.ropeQ[il], 8, posU32);
        device.queue.writeBuffer(uniformBuffers.ropeK[il], 8, posU32);
      }
      device.queue.writeBuffer(uniformBuffers.kvCacheStore, 8, posU32);
      const seqU32 = new Uint32Array([seqLen]);
      device.queue.writeBuffer(uniformBuffers.attnScore, 12, seqU32);
      device.queue.writeBuffer(uniformBuffers.softmax, 4, seqU32);
      device.queue.writeBuffer(uniformBuffers.attnOutput, 12, seqU32);

      // Reset KV caches so we can re-run cleanly
      resetKVCaches();

      // Re-run all prior positions (full forward for each)
      log(`  Re-running ${position} prior positions...`);
      const chatPrompt = `<start_of_turn>user\nExplain how computers work to a 5 year old<end_of_turn>\n<start_of_turn>model\n`;
      const tokens = encodeSimple(chatPrompt);
      for (let p = 0; p < position; p++) {
        await forwardPass(tokens[p], p);
      }
      log(`  Prior positions done. Now stepping through position ${position}, layer ${layerIdx}...`);

      // Run embedding for current position
      device.queue.writeBuffer(uniformBuffers.embeddingLookup, 4, new Uint32Array([tokenId]));
      for (let il = 0; il < CONFIG.num_layers; il++) {
        device.queue.writeBuffer(uniformBuffers.ropeQ[il], 8, posU32);
        device.queue.writeBuffer(uniformBuffers.ropeK[il], 8, posU32);
      }
      device.queue.writeBuffer(uniformBuffers.kvCacheStore, 8, posU32);
      device.queue.writeBuffer(uniformBuffers.attnScore, 12, seqU32);
      device.queue.writeBuffer(uniformBuffers.softmax, 4, seqU32);
      device.queue.writeBuffer(uniformBuffers.attnOutput, 12, seqU32);

      let enc = device.createCommandEncoder();
      let pass = enc.beginComputePass();
      pass.setPipeline(pipelines.embeddingLookup);
      pass.setBindGroup(0, bindGroupCache.embeddingLookup);
      pass.dispatchWorkgroups(Math.ceil(H / 256));
      pass.end();
      device.queue.submit([enc.finish()]);
      await device.queue.onSubmittedWorkDone();

      // Run layers 0 through layerIdx-1 as a batch
      if (layerIdx > 0) {
        enc = device.createCommandEncoder();
        for (let li = 0; li < layerIdx; li++) {
          const lb = bindGroupCache.layers[li];
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.attnNorm); pass.dispatchWorkgroups(1); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.linearQ); pass.dispatchWorkgroups(Math.ceil(Q / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.linearK); pass.dispatchWorkgroups(Math.ceil(KV / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.linearV); pass.dispatchWorkgroups(Math.ceil(KV / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.perHeadRmsNorm); pass.setBindGroup(0, lb.qNorm); pass.dispatchWorkgroups(NQH); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.perHeadRmsNorm); pass.setBindGroup(0, lb.kNorm); pass.dispatchWorkgroups(NKH); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.rope); pass.setBindGroup(0, lb.ropeQ); pass.dispatchWorkgroups(Math.ceil((NQH * HD / 2) / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.rope); pass.setBindGroup(0, lb.ropeK); pass.dispatchWorkgroups(Math.ceil((NKH * HD / 2) / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.kvCacheStore); pass.setBindGroup(0, lb.kvStore); pass.dispatchWorkgroups(Math.ceil(KV / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.attnScore); pass.setBindGroup(0, lb.attnScore); pass.dispatchWorkgroups(Math.ceil((NQH * seqLen) / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.softmax); pass.setBindGroup(0, lb.softmax); pass.dispatchWorkgroups(NQH); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.attnOutput); pass.setBindGroup(0, lb.attnOutput); pass.dispatchWorkgroups(Math.ceil((NQH * HD) / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.linearAttnOut); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.postAttnNorm); pass.dispatchWorkgroups(1); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.add); pass.setBindGroup(0, lb.residualAdd1); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.ffnNorm); pass.dispatchWorkgroups(1); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.ffnGate); pass.dispatchWorkgroups(Math.ceil(I / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.ffnUp); pass.dispatchWorkgroups(Math.ceil(I / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.siluMul); pass.setBindGroup(0, lb.siluMul); pass.dispatchWorkgroups(Math.ceil(I / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.ffnDown); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.postFfnNorm); pass.dispatchWorkgroups(1); pass.end();
          pass = enc.beginComputePass(); pass.setPipeline(pipelines.add); pass.setBindGroup(0, lb.residualAdd2); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
        }
        device.queue.submit([enc.finish()]);
        await device.queue.onSubmittedWorkDone();
        log(`  Layers 0-${layerIdx-1} re-run OK`);
      }

      // Now step through the problem layer operation by operation
      const lb = bindGroupCache.layers[layerIdx];
      const ops = [
        { name: 'attnNorm', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.rmsNorm); p.setBindGroup(0, lb.attnNorm); p.dispatchWorkgroups(1); p.end(); return e; }, buf: workBuffers.normed, size: H },
        { name: 'linearQ', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.linearQ); p.dispatchWorkgroups(Math.ceil(Q/256)); p.end(); return e; }, buf: workBuffers.q, size: Q },
        { name: 'linearK', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.linearK); p.dispatchWorkgroups(Math.ceil(KV/256)); p.end(); return e; }, buf: workBuffers.k, size: KV },
        { name: 'linearV', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.linearV); p.dispatchWorkgroups(Math.ceil(KV/256)); p.end(); return e; }, buf: workBuffers.v, size: KV },
        { name: 'qNorm', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.perHeadRmsNorm); p.setBindGroup(0, lb.qNorm); p.dispatchWorkgroups(NQH); p.end(); return e; }, buf: workBuffers.q, size: Q },
        { name: 'kNorm', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.perHeadRmsNorm); p.setBindGroup(0, lb.kNorm); p.dispatchWorkgroups(NKH); p.end(); return e; }, buf: workBuffers.k, size: KV },
        { name: 'ropeQ', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.rope); p.setBindGroup(0, lb.ropeQ); p.dispatchWorkgroups(Math.ceil((NQH*HD/2)/256)); p.end(); return e; }, buf: workBuffers.q, size: Q },
        { name: 'ropeK', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.rope); p.setBindGroup(0, lb.ropeK); p.dispatchWorkgroups(Math.ceil((NKH*HD/2)/256)); p.end(); return e; }, buf: workBuffers.k, size: KV },
        { name: 'kvStore', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.kvCacheStore); p.setBindGroup(0, lb.kvStore); p.dispatchWorkgroups(Math.ceil(KV/256)); p.end(); return e; }, buf: null, size: 0 },
        { name: 'attnScore', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.attnScore); p.setBindGroup(0, lb.attnScore); p.dispatchWorkgroups(Math.ceil((NQH*seqLen)/256)); p.end(); return e; }, buf: workBuffers.attnScores, size: NQH * seqLen },
        { name: 'softmax', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.softmax); p.setBindGroup(0, lb.softmax); p.dispatchWorkgroups(NQH); p.end(); return e; }, buf: workBuffers.attnScores, size: NQH * seqLen },
        { name: 'attnOutput', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.attnOutput); p.setBindGroup(0, lb.attnOutput); p.dispatchWorkgroups(Math.ceil((NQH*HD)/256)); p.end(); return e; }, buf: workBuffers.attnOut, size: NQH * HD },
        { name: 'linearAttnOut', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.linearAttnOut); p.dispatchWorkgroups(Math.ceil(H/256)); p.end(); return e; }, buf: workBuffers.attnProj, size: H },
        { name: 'postAttnNorm', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.rmsNorm); p.setBindGroup(0, lb.postAttnNorm); p.dispatchWorkgroups(1); p.end(); return e; }, buf: workBuffers.postAttnNormed, size: H },
        { name: 'residualAdd1', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.add); p.setBindGroup(0, lb.residualAdd1); p.dispatchWorkgroups(Math.ceil(H/256)); p.end(); return e; }, buf: workBuffers.residual, size: H },
        { name: 'ffnNorm', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.rmsNorm); p.setBindGroup(0, lb.ffnNorm); p.dispatchWorkgroups(1); p.end(); return e; }, buf: workBuffers.normed, size: H },
        { name: 'ffnGate', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.ffnGate); p.dispatchWorkgroups(Math.ceil(I/256)); p.end(); return e; }, buf: workBuffers.ffnGate, size: I },
        { name: 'ffnUp', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.ffnUp); p.dispatchWorkgroups(Math.ceil(I/256)); p.end(); return e; }, buf: workBuffers.ffnUp, size: I },
        { name: 'geGLU', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.siluMul); p.setBindGroup(0, lb.siluMul); p.dispatchWorkgroups(Math.ceil(I/256)); p.end(); return e; }, buf: workBuffers.ffnMul, size: I },
        { name: 'ffnDown', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.ffnDown); p.dispatchWorkgroups(Math.ceil(H/256)); p.end(); return e; }, buf: workBuffers.ffnDown, size: H },
        { name: 'postFfnNorm', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.rmsNorm); p.setBindGroup(0, lb.postFfnNorm); p.dispatchWorkgroups(1); p.end(); return e; }, buf: workBuffers.postFfnNormed, size: H },
        { name: 'residualAdd2', fn: () => { const e=device.createCommandEncoder(); const p=e.beginComputePass(); p.setPipeline(pipelines.add); p.setBindGroup(0, lb.residualAdd2); p.dispatchWorkgroups(Math.ceil(H/256)); p.end(); return e; }, buf: workBuffers.hidden, size: H },
      ];

      for (const op of ops) {
        const encoder = op.fn();
        device.queue.submit([encoder.finish()]);
        await device.queue.onSubmittedWorkDone();

        if (op.buf && op.size > 0) {
          const check = await checkBufferForNaN(op.buf, op.size, op.name);
          const status = (check.nanCount || check.infCount)
            ? `🔴 NaN=${check.nanCount}, Inf=${check.infCount}`
            : `✅ maxAbs=${check.maxAbs.toFixed(4)}`;
          log(`  L${layerIdx}.${op.name}: ${status}  first5=[${Array.from(check.data.slice(0,5)).map(v=>v.toFixed(4)).join(', ')}]`);

          if (check.nanCount || check.infCount) {
            return { found: true, where: `layer${layerIdx}.${op.name}`, position, tokenId, check };
          }
        } else {
          log(`  L${layerIdx}.${op.name}: (no output to check)`);
        }
      }

      return { found: true, where: `layer${layerIdx} (NaN disappeared on re-run - may be nondeterministic)`, position, tokenId };
    }

    // Focused NaN debug: run positions 0-9 normally, then step through position 10
    async function debugNaN2(prompt) {
      if (generating) return;
      generating = true;
      const btn = document.getElementById('generate-btn');
      btn.disabled = true;

      try {
        log('\n🔍 === NaN DEBUG v2 (step-by-step) ===', 'info');
        resetKVCaches();

        const chatPrompt = `<start_of_turn>user\n${prompt}<end_of_turn>\n<start_of_turn>model\n`;

        log(`Prompt: "${prompt}" → ${inputTokens.length} tokens`, 'info');

        for (let i = 0; i < inputTokens.length; i++) {
          log(`  pos ${i}: token ${inputTokens[i]} = "${decodeToken(inputTokens[i])}"`);

        const NKH = CONFIG.num_kv_heads;
        const MAX_SEQ = CONFIG.context_length;

        // First, let's check KV cache state after each position using NORMAL forward pass
        for (let p = 0; p < inputTokens.length; p++) {
          await forwardPass(inputTokens[p], p);

          // Quick NaN check on hidden after each position
          const hCheck = await checkBufferForNaN(workBuffers.hidden, H, `pos ${p} hidden`);

          // Check layer 0 KV cache has data
          const kvCheck = await checkBufferForNaN(kvCaches[0].k, NKH * HD, `pos ${p} L0 K[0]`);

          if (hCheck.nanCount || hCheck.infCount) {
            log(`🔴 Position ${p}: NaN in hidden! NaN=${hCheck.nanCount}, Inf=${hCheck.infCount}`, 'error');

            // Check what's in the intermediate buffers RIGHT NOW
            log(`\n🔍 Intermediate buffer state after position ${p}:`, 'info');
            const checks = [
              ['normed', workBuffers.normed, H],
              ['q', workBuffers.q, Q],
              ['k', workBuffers.k, KV],
              ['v', workBuffers.v, KV],
              ['attnScores', workBuffers.attnScores, NQH * (p+1)],
              ['attnOut', workBuffers.attnOut, NQH * HD],
              ['attnProj', workBuffers.attnProj, H],
              ['postAttnNormed', workBuffers.postAttnNormed, H],
              ['residual', workBuffers.residual, H],
              ['ffnGate', workBuffers.ffnGate, I],
              ['ffnUp', workBuffers.ffnUp, I],
              ['ffnMul', workBuffers.ffnMul, I],
              ['ffnDown', workBuffers.ffnDown, H],
              ['postFfnNormed', workBuffers.postFfnNormed, H],
            ];
            for (const [name, buf, size] of checks) {
              const c = await checkBufferForNaN(buf, size, name);
              const s = (c.nanCount || c.infCount) ? `🔴 NaN=${c.nanCount} Inf=${c.infCount}` : `✅ maxAbs=${c.maxAbs.toFixed(4)}`;
              log(`  ${name}: ${s}  [${Array.from(c.data.slice(0,5)).map(v=>isNaN(v)?'NaN':v.toFixed(4)).join(',')}]`);
            }

            // Check all KV caches
            for (let li = 0; li < 3; li++) {
              const ck = await checkBufferForNaN(kvCaches[li].k, MAX_SEQ * NKH * HD, `L${li} K cache`);
              const cv = await checkBufferForNaN(kvCaches[li].v, MAX_SEQ * NKH * HD, `L${li} V cache`);
              log(`  L${li} K cache: maxAbs=${ck.maxAbs.toFixed(4)}, NaN=${ck.nanCount}`);
              log(`  L${li} V cache: maxAbs=${cv.maxAbs.toFixed(4)}, NaN=${cv.nanCount}`);
            }

            // NOW: re-run this position step by step through each layer
            log(`\n🔬 RE-RUN position ${p} step by step:`, 'info');
            resetKVCaches();
            // Re-run prior positions
            for (let pp = 0; pp < p; pp++) {
              await forwardPass(inputTokens[pp], pp);
            }

            // Verify KV cache has data from prior positions
            const kvVerify = await checkBufferForNaN(kvCaches[0].k, (p) * NKH * HD, `L0 K cache after ${p} positions`);
            log(`  L0 K cache (first ${p} positions): maxAbs=${kvVerify.maxAbs.toFixed(4)}`);

            // Now run position p embedding
            const tokenId = inputTokens[p];
            const position = p;
            const seqLen = p + 1;

            // Update uniforms
            device.queue.writeBuffer(uniformBuffers.embeddingLookup, 4, new Uint32Array([tokenId]));
            const posU32 = new Uint32Array([position]);
            for (let il = 0; il < CONFIG.num_layers; il++) {
              device.queue.writeBuffer(uniformBuffers.ropeQ[il], 8, posU32);
              device.queue.writeBuffer(uniformBuffers.ropeK[il], 8, posU32);
            }
            device.queue.writeBuffer(uniformBuffers.kvCacheStore, 8, posU32);
            device.queue.writeBuffer(uniformBuffers.attnScore, 12, new Uint32Array([seqLen]));
            device.queue.writeBuffer(uniformBuffers.softmax, 4, new Uint32Array([seqLen]));
            device.queue.writeBuffer(uniformBuffers.attnOutput, 12, new Uint32Array([seqLen]));

            // Embedding
            let enc = device.createCommandEncoder();
            let pass = enc.beginComputePass();
            pass.setPipeline(pipelines.embeddingLookup);
            pass.setBindGroup(0, bindGroupCache.embeddingLookup);
            pass.dispatchWorkgroups(Math.ceil(H / 256));
            pass.end();
            device.queue.submit([enc.finish()]);
            await device.queue.onSubmittedWorkDone();

            let embCheck = await checkBufferForNaN(workBuffers.hidden, H, 'embedding');
            log(`  Embedding: maxAbs=${embCheck.maxAbs.toFixed(4)} [${Array.from(embCheck.data.slice(0,5)).map(v=>v.toFixed(4)).join(',')}]`);

            // Step through ALL layers, one op at a time
            for (let li = 0; li < CONFIG.num_layers; li++) {
              const lb = bindGroupCache.layers[li];

              const runOp = async (name, fn, buf, size) => {
                const e = device.createCommandEncoder();
                fn(e);
                device.queue.submit([e.finish()]);
                await device.queue.onSubmittedWorkDone();
                if (buf && size > 0) {
                  const c = await checkBufferForNaN(buf, size, name);
                  const hasNaN = c.nanCount > 0 || c.infCount > 0;
                  if (hasNaN || li < 2) { // always show first 2 layers
                    const s = hasNaN ? `🔴 NaN=${c.nanCount} Inf=${c.infCount}` : `✅ maxAbs=${c.maxAbs.toFixed(4)}`;
                    log(`  L${li}.${name}: ${s} [${Array.from(c.data.slice(0,3)).map(v=>isNaN(v)?'NaN':v.toFixed(4)).join(',')}]`);
                  }
                  if (hasNaN) return true;
                }
                return false;
              };

              let nan = false;
              nan = nan || await runOp('attnNorm', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.rmsNorm); p.setBindGroup(0, lb.attnNorm); p.dispatchWorkgroups(1); p.end(); }, workBuffers.normed, H);
              nan = nan || await runOp('linearQ', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.linearQ); p.dispatchWorkgroups(Math.ceil(Q/256)); p.end(); }, workBuffers.q, Q);
              nan = nan || await runOp('linearK', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.linearK); p.dispatchWorkgroups(Math.ceil(KV/256)); p.end(); }, workBuffers.k, KV);
              nan = nan || await runOp('linearV', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.linearV); p.dispatchWorkgroups(Math.ceil(KV/256)); p.end(); }, workBuffers.v, KV);
              nan = nan || await runOp('qNorm', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.perHeadRmsNorm); p.setBindGroup(0, lb.qNorm); p.dispatchWorkgroups(NQH); p.end(); }, workBuffers.q, Q);
              nan = nan || await runOp('kNorm', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.perHeadRmsNorm); p.setBindGroup(0, lb.kNorm); p.dispatchWorkgroups(NKH); p.end(); }, workBuffers.k, KV);
              nan = nan || await runOp('ropeQ', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.rope); p.setBindGroup(0, lb.ropeQ); p.dispatchWorkgroups(Math.ceil((NQH*HD/2)/256)); p.end(); }, workBuffers.q, Q);
              nan = nan || await runOp('ropeK', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.rope); p.setBindGroup(0, lb.ropeK); p.dispatchWorkgroups(Math.ceil((NKH*HD/2)/256)); p.end(); }, workBuffers.k, KV);
              nan = nan || await runOp('kvStore', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.kvCacheStore); p.setBindGroup(0, lb.kvStore); p.dispatchWorkgroups(Math.ceil(KV/256)); p.end(); }, null, 0);
              nan = nan || await runOp('attnScore', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.attnScore); p.setBindGroup(0, lb.attnScore); p.dispatchWorkgroups(Math.ceil((NQH*seqLen)/256)); p.end(); }, workBuffers.attnScores, NQH * seqLen);
              nan = nan || await runOp('softmax', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.softmax); p.setBindGroup(0, lb.softmax); p.dispatchWorkgroups(NQH); p.end(); }, workBuffers.attnScores, NQH * seqLen);
              nan = nan || await runOp('attnOutput', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.attnOutput); p.setBindGroup(0, lb.attnOutput); p.dispatchWorkgroups(Math.ceil((NQH*HD)/256)); p.end(); }, workBuffers.attnOut, NQH * HD);
              nan = nan || await runOp('linearAttnOut', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.linearAttnOut); p.dispatchWorkgroups(Math.ceil(H/256)); p.end(); }, workBuffers.attnProj, H);
              nan = nan || await runOp('postAttnNorm', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.rmsNorm); p.setBindGroup(0, lb.postAttnNorm); p.dispatchWorkgroups(1); p.end(); }, workBuffers.postAttnNormed, H);
              nan = nan || await runOp('residualAdd1', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.add); p.setBindGroup(0, lb.residualAdd1); p.dispatchWorkgroups(Math.ceil(H/256)); p.end(); }, workBuffers.residual, H);
              nan = nan || await runOp('ffnNorm', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.rmsNorm); p.setBindGroup(0, lb.ffnNorm); p.dispatchWorkgroups(1); p.end(); }, workBuffers.normed, H);
              nan = nan || await runOp('ffnGate', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.ffnGate); p.dispatchWorkgroups(Math.ceil(I/256)); p.end(); }, workBuffers.ffnGate, I);
              nan = nan || await runOp('ffnUp', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.ffnUp); p.dispatchWorkgroups(Math.ceil(I/256)); p.end(); }, workBuffers.ffnUp, I);
              nan = nan || await runOp('geGLU', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.siluMul); p.setBindGroup(0, lb.siluMul); p.dispatchWorkgroups(Math.ceil(I/256)); p.end(); }, workBuffers.ffnMul, I);
              nan = nan || await runOp('ffnDown', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.linearQ8); p.setBindGroup(0, lb.ffnDown); p.dispatchWorkgroups(Math.ceil(H/256)); p.end(); }, workBuffers.ffnDown, H);
              nan = nan || await runOp('postFfnNorm', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.rmsNorm); p.setBindGroup(0, lb.postFfnNorm); p.dispatchWorkgroups(1); p.end(); }, workBuffers.postFfnNormed, H);
              nan = nan || await runOp('residualAdd2', e => { const p=e.beginComputePass(); p.setPipeline(pipelines.add); p.setBindGroup(0, lb.residualAdd2); p.dispatchWorkgroups(Math.ceil(H/256)); p.end(); }, workBuffers.hidden, H);

              if (nan) {
                log(`💥 NaN at position ${p}, layer ${li}`, 'error');
                setStatus(`NaN found at position ${p}, layer ${li}`);
                return;
              }

              // Brief layer summary
              const lCheck = await checkBufferForNaN(workBuffers.hidden, H, `L${li}`);
              if (li % 6 === 0 || li === CONFIG.num_layers - 1) {
                log(`  Layer ${li} done: maxAbs=${lCheck.maxAbs.toFixed(2)}`);
              }
            }

            log(`  Position ${p} completed without NaN on re-run (non-deterministic!)`, 'info');
            setStatus(`NaN was non-deterministic at position ${p}`);
            return;
          }

          // Brief summary for positions that work
          log(`  Position ${p} (token ${inputTokens[p]} "${decodeToken(inputTokens[p])}"): maxAbs=${hCheck.maxAbs.toFixed(2)}, L0_K0_max=${kvCheck.maxAbs.toFixed(4)}`);
        }

        log('\n✅ No NaN found during entire prefill!', 'success');
        setStatus('No NaN found');

      } catch (err) {
        log(`ERROR: ${err.message}\n${err.stack}`, 'error');
      } finally {
        generating = false;
        btn.disabled = false;
      }
    }

    // Run NaN debug on a specific prompt
    async function debugNaN(prompt) {
      if (generating) return;
      generating = true;
      const btn = document.getElementById('generate-btn');
      btn.disabled = true;

      try {
        log('\n🔍 === NaN DEBUG MODE ===', 'info');
        resetKVCaches();

        const chatPrompt = `<start_of_turn>user\n${prompt}<end_of_turn>\n<start_of_turn>model\n`;
        const inputTokens = encodeSimple(chatPrompt);
        log(`Prompt: "${prompt}"`, 'info');
        log(`Tokens: [${inputTokens.join(', ')}] (${inputTokens.length} tokens)`, 'info');
        log(`Decoded: "${decodeTokens(inputTokens.slice(1))}"`, 'info');

        setStatus('NaN Debug: running prefill with per-layer checks...');

        // Process each prefill token with NaN checks
        for (let i = 0; i < inputTokens.length; i++) {
          log(`\n--- Position ${i}: token ${inputTokens[i]} ("${decodeToken(inputTokens[i])}") ---`, 'info');
          const result = await nanDebugForwardPass(inputTokens[i], i);
          if (result.found) {
            log(`\n💥 FIRST NaN at position ${i}, ${result.where}`, 'error');
            log(`Token: ${inputTokens[i]} ("${decodeToken(inputTokens[i])}")`, 'error');
            setStatus(`NaN found at position ${i}, ${result.where}`);
            return;
          }
        }

        // Also check first generation step
        log(`\n--- Generation step 0 ---`, 'info');
        const genResult = await nanDebugForwardPass(inputTokens[inputTokens.length - 1], inputTokens.length - 1);
        if (genResult.found) {
          log(`\n💥 NaN in generation step: ${genResult.where}`, 'error');
        } else {
          log('\n✅ No NaN found during prefill! Checking logits...', 'success');
          // Check LM head
          const lmEnc = device.createCommandEncoder();
          const lmPass = lmEnc.beginComputePass();
          lmPass.setPipeline(pipelines.linearQ8);
          lmPass.setBindGroup(0, bindGroupCache.lmHead);
          lmPass.dispatchWorkgroups(Math.ceil(CONFIG.vocab_size / 256));
          lmPass.end();
          device.queue.submit([lmEnc.finish()]);
          await device.queue.onSubmittedWorkDone();

          const logitCheck = await checkBufferForNaN(workBuffers.logits, CONFIG.vocab_size, 'logits');
          if (logitCheck.nanCount || logitCheck.infCount) {
            log(`🔴 NaN/Inf in LOGITS: NaN=${logitCheck.nanCount}, Inf=${logitCheck.infCount}`, 'error');
          } else {
            log(`✅ Logits OK (maxAbs=${logitCheck.maxAbs.toFixed(2)})`, 'success');
          }
        }

        setStatus('NaN debug complete - check log');

      } catch (err) {
        log(`ERROR: ${err.message}\n${err.stack}`, 'error');
      } finally {
        generating = false;
        btn.disabled = false;
      }
    }

    // =========================================================================
    // Main
    // =========================================================================
    async function main() {
      try {
        log('=== FunctionGemma 270M - Function Calling ===\n', 'info');

        setStatus('Initializing WebGPU...');
        await initWebGPU();

        setStatus('Loading GGUF file (292MB)...');
        const HF_BASE = 'https://huggingface.co/unsloth/functiongemma-270m-it-GGUF/resolve/main/';
        const defaultModel = HF_BASE + 'functiongemma-270m-it-Q8_0.gguf';
        const modelFile = new URLSearchParams(window.location.search).get('model') || defaultModel;
        log(`Loading model: ${modelFile}`, 'info');

        // Fetch with progress tracking
        const response = await fetch(modelFile);
        const contentLength = response.headers.get('content-length');
        const total = contentLength ? parseInt(contentLength) : 291543744;
        const reader = response.body.getReader();
        const chunks = [];
        let received = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          received += value.length;
          const pct = ((received / total) * 100).toFixed(0);
          const mb = (received / 1e6).toFixed(0);
          setStatus(`Downloading model... ${mb}MB / ${(total / 1e6).toFixed(0)}MB (${pct}%)`);
        }

        // Combine chunks into single ArrayBuffer
        const buffer = new Uint8Array(received);
        let offset = 0;
        for (const chunk of chunks) {
          buffer.set(chunk, offset);
          offset += chunk.length;
        }
        log(`Loaded GGUF: ${(received / 1e6).toFixed(1)}MB`);

        setStatus('Parsing GGUF...');
        parser = new GGUFParser(buffer);
        gguf = parser.parse();
        log(`Parsed ${gguf.tensors.length} tensors`);

        // Extract tokenizer
        setStatus('Extracting tokenizer...');
        extractTokenizer();

        setStatus('Initializing function calling tokens...');
        initFunctionTokens();

        setStatus('Creating pipelines...');
        createPipelines();

        setStatus('Creating uniform buffers...');
        createUniformBuffers();

        setStatus('Uploading weights to GPU...');
        uploadWeightsToGPU();

        // Free download buffer and parser to reduce memory pressure
        // (weights are now on GPU, we don't need the CPU-side data anymore)
        parser = null;
        gguf = null;

        setStatus('Creating work buffers + KV caches...');
        createWorkBuffers();

        setStatus('Pre-creating bind groups...');
        createBindGroups();

        log('\nModel loaded! Ready to generate.', 'success');
        setStatus('Ready - enter a prompt and click Generate');

        // Enable UI
        document.getElementById('prompt-input').disabled = false;
        document.getElementById('generate-btn').disabled = false;
        document.getElementById('debug-btn').disabled = false;
        document.getElementById('tools-input').disabled = false;

        // Allow Enter key to trigger generation
        document.getElementById('prompt-input').addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !generating) {
            window.onGenerate();
          }
        });

      } catch (err) {
        log(`\nERROR: ${err.message}`, 'error');
        log(`Stack: ${err.stack}`, 'error');
        console.error(err);
        setStatus(`FAILED: ${err.message}`);
        document.title = `FAILED: ${err.message}`;
      }
    }

    main();
  </script>
