    // =========================================================================
    // Global state
    // =========================================================================
    let device = null; window._d = () => device;
    let pipelines = {};
    let modelBuffers = null; window._mb = () => modelBuffers;
    let workBuffers = null; window._wb = () => workBuffers;
    let uniformBuffers = null;
    let kvCaches = null;
    let gguf = null;
    let parser = null;

    // Tokenizer
    let vocab = [];
    let vocabByLength = [];

    // Memory tracking
    let weightMemoryQ8 = 0;
    let weightMemoryF32Equiv = 0;

    async function initWebGPU() {
      if (device) return device;
      if (!navigator.gpu) throw new Error('WebGPU not supported');
      const adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
      device = await adapter.requestDevice({
        requiredLimits: {
          maxStorageBufferBindingSize: adapter.limits.maxStorageBufferBindingSize,
          maxBufferSize: adapter.limits.maxBufferSize,
        },
      });
      log(`WebGPU device initialized`);
      log(`Max storage buffer: ${(device.limits.maxStorageBufferBindingSize / 1e9).toFixed(2)} GB`);
      return device;
    }

    function createPipelines() {
      pipelines = {};
      for (const [name, code] of Object.entries(SHADERS)) {
        const module = device.createShaderModule({ code });
        pipelines[name] = device.createComputePipeline({
          layout: 'auto',
          compute: { module, entryPoint: 'main' },
        });
      }
      log(`Created ${Object.keys(pipelines).length} compute pipelines`);
    }

    // =========================================================================
    // Pre-create ALL uniform buffers at load time
    // =========================================================================
    function createUniformBuffers() {
      const H = CONFIG.hidden_size;       // 640
      const Q = CONFIG.q_dim;             // 1024
      const KV = CONFIG.kv_dim;           // 256
      const I = CONFIG.intermediate_size; // 2048
      const MAX_SEQ = CONFIG.context_length;
      const V = CONFIG.vocab_size;
      const HD = CONFIG.head_dim;         // 256
      const NQH = CONFIG.num_q_heads;     // 4
      const NKH = CONFIG.num_kv_heads;    // 1

      log(`  Architecture: hidden=${H}, q_dim=${Q}, kv_dim=${KV}, num_q_heads=${NQH}, num_kv_heads=${NKH}, head_dim=${HD}`);

      // Helper to create uniform from mixed uint32/float32 values
      const makeUniformMixed = (values) => {
        const size = Math.max(values.length * 4, 16);
        const ab = new ArrayBuffer(size);
        const u32 = new Uint32Array(ab);
        const f32 = new Float32Array(ab);
        for (let i = 0; i < values.length; i++) {
          if ('u' in values[i]) u32[i] = values[i].u;
          else f32[i] = values[i].f;
        }
        const buf = device.createBuffer({
          size,
          usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
          mappedAtCreation: true,
        });
        new Uint8Array(buf.getMappedRange()).set(new Uint8Array(ab));
        buf.unmap();
        return buf;
      };

      uniformBuffers = {
        // RMS norm params: {hidden_size: H, eps: 1e-6}
        rmsNorm: makeUniformMixed([{u: H}, {f: CONFIG.rms_norm_eps}]),

        // Per-head RMS norm for Q: {num_heads: 4, head_dim: 256, eps, pad}
        perHeadRmsNormQ: makeUniformMixed([{u: NQH}, {u: HD}, {f: CONFIG.rms_norm_eps}, {u: 0}]),
        // Per-head RMS norm for K: {num_heads: 1, head_dim: 256, eps, pad}
        perHeadRmsNormK: makeUniformMixed([{u: NKH}, {u: HD}, {f: CONFIG.rms_norm_eps}, {u: 0}]),

        // Q8 linear params: {M, N} - M is output dim, N is input dim
        linearQ8_Q_H: makeUniformMixed([{u: Q}, {u: H}]),       // attn_q: [640] -> [1024]
        linearQ8_KV_H: makeUniformMixed([{u: KV}, {u: H}]),     // attn_k, attn_v: [640] -> [256]
        linearQ8_H_Q: makeUniformMixed([{u: H}, {u: Q}]),       // attn_output: [1024] -> [640]
        linearQ8_I_H: makeUniformMixed([{u: I}, {u: H}]),       // ffn_gate, ffn_up: [640] -> [2048]
        linearQ8_H_I: makeUniformMixed([{u: H}, {u: I}]),       // ffn_down: [2048] -> [640]

        // Element-wise size params
        sizeH: makeUniformMixed([{u: H}]),
        sizeI: makeUniformMixed([{u: I}]),

        // Embedding lookup: {hidden_size, token_id} - token_id written per inference
        embeddingLookup: makeUniformMixed([{u: H}, {u: 0}]),

        // Per-layer RoPE Q/K params: {num_heads, head_dim, position, theta}
        // SWA layers use theta=10000, global layers use theta=1000000
        ropeQ: [],  // will be filled per-layer
        ropeK: [],  // will be filled per-layer

        // KV cache store: {num_kv_heads: 1, head_dim: 256, position, max_seq_len}
        kvCacheStore: makeUniformMixed([{u: NKH}, {u: HD}, {u: 0}, {u: MAX_SEQ}]),

        // Attention score: {num_q_heads: 4, num_kv_heads: 1, head_dim: 256, seq_len, scale: 1/sqrt(256), pad}
        attnScore: makeUniformMixed([
          {u: NQH}, {u: NKH}, {u: HD},
          {u: 0}, {f: 1.0 / Math.sqrt(HD)}, {u: 0}
        ]),

        // Softmax: {num_heads: 4, seq_len}
        softmax: makeUniformMixed([{u: NQH}, {u: 0}]),

        // Attention output: {num_q_heads: 4, num_kv_heads: 1, head_dim: 256, seq_len}
        attnOutput: makeUniformMixed([{u: NQH}, {u: NKH}, {u: HD}, {u: 0}]),

        // LM Head (Q8_0): {M=vocab_size, N=hidden_size}
        lmHead: makeUniformMixed([{u: V}, {u: H}]),
        linearQ8_V_H: makeUniformMixed([{u: V}, {u: H}]),   // lm_head Q8_0: [640] -> [262144]

        // Argmax: vocab_size
        argmaxSize: makeUniformMixed([{u: V}]),
      };

      // Create per-layer RoPE uniform buffers with layer-specific theta
      // Also create fusedPerHeadNormRope uniforms: {num_heads, head_dim, eps, position, theta, pad}
      uniformBuffers.fusedNormRopeQ = [];
      uniformBuffers.fusedNormRopeK = [];
      for (let il = 0; il < CONFIG.num_layers; il++) {
        const theta = getRopeTheta(il);
        uniformBuffers.ropeQ.push(makeUniformMixed([{u: NQH}, {u: HD}, {u: 0}, {f: theta}]));
        uniformBuffers.ropeK.push(makeUniformMixed([{u: NKH}, {u: HD}, {u: 0}, {f: theta}]));
        // Fused norm+rope: {num_heads, head_dim, eps, position, theta, pad}
        uniformBuffers.fusedNormRopeQ.push(makeUniformMixed([{u: NQH}, {u: HD}, {f: CONFIG.rms_norm_eps}, {u: 0}, {f: theta}, {u: 0}]));
        uniformBuffers.fusedNormRopeK.push(makeUniformMixed([{u: NKH}, {u: HD}, {f: CONFIG.rms_norm_eps}, {u: 0}, {f: theta}, {u: 0}]));
      }
      log(`  RoPE theta per layer: ${Array.from({length: CONFIG.num_layers}, (_, i) => `${i}:${isSwaLayer(i) ? '10k' : '1M'}`).join(', ')}`);

      log(`  Created ${Object.keys(uniformBuffers).length} pre-allocated uniform buffers`);
      log(`  Attention scale: ${(1.0 / Math.sqrt(HD)).toFixed(6)} (1/sqrt(${HD}))`);
    }

    // =========================================================================
    // Extract tokenizer from GGUF metadata
    // =========================================================================
    function extractTokenizer() {
      const tokensKV = gguf.kv.get('tokenizer.ggml.tokens');
      if (tokensKV && tokensKV.type === 'array') {
        vocab = tokensKV.value.map(v => v.value);
        log(`  Extracted vocabulary: ${vocab.length} tokens`);
      } else {
        log('  WARNING: No tokenizer found in GGUF metadata', 'error');
        return;
      }

      // Build sorted entries for greedy encoding (longest first)
      vocabByLength = [];
      for (let i = 0; i < vocab.length; i++) {
        if (vocab[i] && vocab[i].length > 0) {
          vocabByLength.push([i, vocab[i]]);
        }
      }
      // Build prefix map for fast lookup
      buildTokenIndex();

      const modelKV = gguf.kv.get('tokenizer.ggml.model');
      if (modelKV) {
        log(`  Tokenizer model: ${modelKV.value}`);
      }
    }

    // Build a prefix-based index for faster tokenization
    let tokenByText = new Map();
    let maxTokenLen = 0;

    function buildTokenIndex() {
      tokenByText = new Map();
      maxTokenLen = 0;
      for (let i = 0; i < vocab.length; i++) {
        const token = vocab[i];
        if (token && token.length > 0) {
          if (!tokenByText.has(token)) {
            tokenByText.set(token, i);
          }
          if (token.length > maxTokenLen) {
            maxTokenLen = token.length;
          }
        }
      }
      log(`  Token index: ${tokenByText.size} unique entries, max length ${maxTokenLen}`);
    }

    // Special tokens that must be matched whole before SentencePiece encoding
    const SPECIAL_TOKENS = {
      '<start_of_turn>': 105,
      '<end_of_turn>': 106,
      '<eos>': 1,
      '<bos>': 2,
    };

    // FunctionGemma special tokens - will be populated after tokenizer extraction
    const FUNC_TOKENS = {};
    const FUNC_TOKEN_NAMES = [
      '<start_function_declaration>', '<end_function_declaration>',
      '<start_function_call>', '<end_function_call>',
      '<start_function_response>', '<end_function_response>',
      '<escape>',
    ];

    function initFunctionTokens() {
      for (const name of FUNC_TOKEN_NAMES) {
        const id = tokenByText.get(name);
        if (id !== undefined) {
          FUNC_TOKENS[name] = id;
          SPECIAL_TOKENS[name] = id;
          log(`  Function token: ${name} -> ${id}`);
        } else {
          log(`  WARNING: Function token ${name} not found in vocab`, 'error');
        }
      }
      // Rebuild the regex pattern to include function tokens
      rebuildSpecialPattern();
    }

    let specialPatternStr = '<start_of_turn>|<end_of_turn>|<eos>|<bos>';
    let specialPatternRegex = new RegExp(specialPatternStr.replace(/[<>]/g, c => '\\' + c), 'g');

    function rebuildSpecialPattern() {
      const allTokenNames = Object.keys(SPECIAL_TOKENS);
      // Sort by length descending so longer tokens match first
      allTokenNames.sort((a, b) => b.length - a.length);
      specialPatternStr = allTokenNames.map(t => t.replace(/[<>]/g, c => '\\' + c)).join('|');
      specialPatternRegex = new RegExp(specialPatternStr, 'g');
      log(`  Special token pattern: ${allTokenNames.length} tokens`);
    }

    // Build FunctionGemma prompt from user query and tool definitions
    function buildFunctionPrompt(userQuery, toolsJson) {
      let tools;
      try {
        tools = JSON.parse(toolsJson);
      } catch (e) {
        log('WARNING: Invalid tools JSON, using plain prompt', 'error');
        return `<start_of_turn>user\n${userQuery}<end_of_turn>\n<start_of_turn>model\n`;
      }

      // Build function declarations
      let declarations = '';
      for (const tool of tools) {
        declarations += `<start_function_declaration>declaration:${tool.name}{`;
        declarations += `description:<escape>${tool.description}<escape>`;
        if (tool.parameters) {
          declarations += `,parameters:{properties:{`;
          const props = Object.entries(tool.parameters.properties || {});
          declarations += props.map(([k, v]) => {
            let param = `${k}:{description:<escape>${v.description}<escape>,type:<escape>${v.type}<escape>`;
            if (v.enum) {
              param += `,enum:[${v.enum.map(e => `<escape>${e}<escape>`).join(',')}]`;
            }
            param += '}';
            return param;
          }).join(',');
          declarations += `}`;
          if (tool.parameters.required) {
            declarations += `,required:[${tool.parameters.required.map(r => `<escape>${r}<escape>`).join(',')}]`;
          }
          declarations += `,type:<escape>${tool.parameters.type}<escape>`;
          declarations += `}`;
        }
        declarations += `}<end_function_declaration>`;
      }

      return `<start_of_turn>developer\nYou are a model that can do function calling with the following functions${declarations}<end_of_turn>\n<start_of_turn>user\n${userQuery}<end_of_turn>\n<start_of_turn>model\n`;
    }

    function encodeSegment(text, addPrefix = true) {
      // Encode a text segment using SentencePiece greedy longest-match
      // addPrefix: whether to prepend ▁ (only for standalone text, not after special tokens)
      const tokens = [];
      let remaining = text.replace(/ /g, '\u2581');
      if (addPrefix) {
        remaining = '\u2581' + remaining;
      }

      while (remaining.length > 0) {
        let bestLen = 0;
        let bestId = -1;

        const tryLen = Math.min(remaining.length, maxTokenLen);
        for (let len = tryLen; len >= 1; len--) {
          const candidate = remaining.substring(0, len);
          const id = tokenByText.get(candidate);
          if (id !== undefined) {
            bestLen = len;
            bestId = id;
            break;
          }
        }

        if (bestLen === 0) {
          remaining = remaining.slice(1);
        } else {
          tokens.push(bestId);
          remaining = remaining.slice(bestLen);
        }
      }
      return tokens;
    }

    function encodeSimple(text) {
      const tokens = [2]; // BOS token

      // Split text on special tokens, preserving them
      const specialPattern = new RegExp(specialPatternRegex.source, 'g');
      let lastIdx = 0;
      let match;
      let afterSpecial = false;

      while ((match = specialPattern.exec(text)) !== null) {
        // Encode text before the special token
        const before = text.slice(lastIdx, match.index);
        if (before.length > 0) {
          // After special tokens, don't prepend ▁
          tokens.push(...encodeSegment(before, !afterSpecial));
        }
        // Add the special token ID directly
        tokens.push(SPECIAL_TOKENS[match[0]]);
        lastIdx = match.index + match[0].length;
        afterSpecial = true;
      }

      // Encode remaining text after last special token
      const remaining = text.slice(lastIdx);
      if (remaining.length > 0) {
        tokens.push(...encodeSegment(remaining, !afterSpecial));
      }

      return tokens;
    }

    function decodeToken(tokenId) {
      if (tokenId < vocab.length && vocab[tokenId]) {
        return vocab[tokenId].replace(/\u2581/g, ' ');
      }
      return `<unk:${tokenId}>`;
    }

    function decodeTokens(tokenIds) {
      let text = '';
      for (const id of tokenIds) {
        text += decodeToken(id);
      }
      return text;
    }

    // =========================================================================
    // Upload weights - Q8_0 tensors stay packed, F32 tensors stay f32
    // =========================================================================
    function uploadWeightsToGPU() {
      const tensors = gguf.tensors;
      const dataOffset = gguf.dataOffset;

      modelBuffers = {
        embeddingQ8: null,
        layers: [],
        finalNorm: null,
      };

      // Embedding is already [V, H] in GGUF (262144 rows of 640 elements)
      // Q8_0 packed format used for BOTH token lookup and LM head (saves 671MB vs f32)
      const embedTensor = tensors.find(t => t.name === 'token_embd.weight');
      if (embedTensor) {
        const H = CONFIG.hidden_size;
        const V = CONFIG.vocab_size;

        log(`  Embedding [${V}, ${H}] - already in correct layout, no transpose needed`);

        if (embedTensor.type === 8) {  // Q8_0
          const packedEmbedding = parser.getTensorDataQ8Packed(embedTensor, dataOffset);
          modelBuffers.embeddingQ8 = device.createBuffer({
            size: packedEmbedding.byteLength,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
          });
          device.queue.writeBuffer(modelBuffers.embeddingQ8, 0, packedEmbedding);
          log(`  Loaded Q8_0 packed embedding (shared for lookup + LM head): ${(packedEmbedding.byteLength / 1e6).toFixed(1)}MB`);
        } else {
          // F16 or F32 model — dequantize to f32 for lookup, no Q8 LM head
          const rawData = parser.getTensorData(embedTensor, dataOffset);
          modelBuffers.embeddingQ8 = device.createBuffer({
            size: rawData.byteLength,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
          });
          device.queue.writeBuffer(modelBuffers.embeddingQ8, 0, rawData);
          log(`  Loaded f32 embedding: ${(rawData.byteLength / 1e6).toFixed(1)}MB`);
        }
      }

      // Final norm weight (F32)
      const finalNormTensor = tensors.find(t => t.name === 'output_norm.weight');
      if (finalNormTensor) {
        const data = parser.getTensorData(finalNormTensor, dataOffset);
        modelBuffers.finalNorm = device.createBuffer({
          size: data.byteLength,
          usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
        });
        device.queue.writeBuffer(modelBuffers.finalNorm, 0, data);
      }

      // Q8_0 weight names (these get packed format for quantized compute)
      const q8WeightNames = ['attn_q', 'attn_k', 'attn_v', 'attn_output', 'ffn_gate', 'ffn_up', 'ffn_down'];
      // F32 weight names (norm weights stay as f32)
      const f32WeightNames = ['attn_norm', 'ffn_norm', 'attn_q_norm', 'attn_k_norm', 'post_attention_norm', 'post_ffw_norm'];

      for (let i = 0; i < CONFIG.num_layers; i++) {
        const prefix = `blk.${i}.`;
        const layer = {};

        // Load F32 norm weights
        for (const key of f32WeightNames) {
          const suffix = key + '.weight';
          const tensor = tensors.find(t => t.name === prefix + suffix);
          if (tensor) {
            const data = parser.getTensorData(tensor, dataOffset);
            layer[key] = device.createBuffer({
              size: data.byteLength,
              usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
            });
            device.queue.writeBuffer(layer[key], 0, data);
            if (i === 0) {
              log(`    ${key}: [${tensor.dims.join(', ')}] F32 (${data.byteLength} bytes)`);
            }
          } else if (i === 0) {
            log(`    WARNING: Missing ${prefix}${suffix}`, 'error');
          }
        }

        // Load linear weights as Q8_0 packed (on-GPU dequantization)
        for (const key of q8WeightNames) {
          const suffix = key + '.weight';
          const tensor = tensors.find(t => t.name === prefix + suffix);
          if (tensor) {
            const data = parser.getTensorDataQ8Packed(tensor, dataOffset); // Q8_0 packed for GPU
            layer[key] = device.createBuffer({
              size: data.byteLength,
              usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
            });
            device.queue.writeBuffer(layer[key], 0, data);

            if (i === 0) {
              weightMemoryQ8 += data.byteLength;
              const numElements = Number(tensor.dims.reduce((a, b) => a * b, 1n));
              weightMemoryF32Equiv += numElements * 4;
              const typeStr = tensor.type === 1 ? 'F16→Q8' : tensor.type === 8 ? 'Q8_0' : 'f32';
              log(`    ${key}: [${tensor.dims.join(', ')}] ${typeStr} packed (${data.byteLength} bytes)`);
            }
          }
        }

        modelBuffers.layers.push(layer);
      }

      const totalQ8 = weightMemoryQ8 * CONFIG.num_layers;
      const totalF32 = weightMemoryF32Equiv * CONFIG.num_layers;
      log(`  Loaded ${CONFIG.num_layers} transformer layers`);
      log(`  Dequantized weights: ${(totalQ8 / 1e6).toFixed(1)}MB → ${(totalF32 / 1e6).toFixed(1)}MB f32`);
    }

    // =========================================================================
    // Create work buffers and KV caches
    // =========================================================================
    function createWorkBuffers() {
      const H = CONFIG.hidden_size;       // 640
      const Q = CONFIG.q_dim;             // 1024
      const KV = CONFIG.kv_dim;           // 256
      const I = CONFIG.intermediate_size; // 2048
      const MAX_SEQ = CONFIG.context_length;
      const V = CONFIG.vocab_size;
      const HD = CONFIG.head_dim;         // 256
      const NQH = CONFIG.num_q_heads;     // 4
      const NKH = CONFIG.num_kv_heads;    // 1

      // COPY_SRC on all work buffers for debugging readbacks
      const S = GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC;
      const SD = S | GPUBufferUsage.COPY_DST;
      workBuffers = {
        hidden: device.createBuffer({ size: H * 4, usage: SD }),
        hiddenReadback: device.createBuffer({ size: H * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST }),
        residual: device.createBuffer({ size: H * 4, usage: S }),
        normed: device.createBuffer({ size: H * 4, usage: S }),
        q: device.createBuffer({ size: Q * 4, usage: S }),        // 1024 floats
        k: device.createBuffer({ size: KV * 4, usage: S }),       // 256 floats
        v: device.createBuffer({ size: KV * 4, usage: S }),       // 256 floats
        attnOut: device.createBuffer({ size: Q * 4, usage: S }),   // 1024 floats (4 heads * 256)
        attnProj: device.createBuffer({ size: H * 4, usage: S }), // 640 floats (after output proj)
        postAttnNormed: device.createBuffer({ size: H * 4, usage: S }), // post-attention norm output
        attnScores: device.createBuffer({ size: NQH * MAX_SEQ * 4, usage: S }), // 4 * 128
        ffnGate: device.createBuffer({ size: I * 4, usage: S }),
        ffnUp: device.createBuffer({ size: I * 4, usage: S }),
        ffnMul: device.createBuffer({ size: I * 4, usage: S }),
        ffnDown: device.createBuffer({ size: H * 4, usage: S }),
        postFfnNormed: device.createBuffer({ size: H * 4, usage: S }), // post-ffn norm output
        // LM Head buffers
        logits: device.createBuffer({ size: V * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC }),
        logitsReadback: device.createBuffer({ size: V * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST }),
        argmaxResult: device.createBuffer({ size: 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC }),
        argmaxReadback: device.createBuffer({ size: 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST }),
        // Top-K 256: each thread finds its local max → 256 candidates (val, id pairs)
        topk256Result: device.createBuffer({ size: 256 * 2 * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC }),
        topk256Readback: device.createBuffer({ size: 256 * 2 * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST }),
      };

      // KV caches per layer: [max_seq, num_kv_heads, head_dim] = [128, 1, 256]
      const kvSize = MAX_SEQ * NKH * HD * 4;
      kvCaches = [];
      for (let i = 0; i < CONFIG.num_layers; i++) {
        kvCaches.push({
          k: device.createBuffer({ size: kvSize, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC }),
          v: device.createBuffer({ size: kvSize, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC }),
        });
      }

      log(`  Created work buffers and ${CONFIG.num_layers} KV caches`);
      log(`  Q buffer: ${Q} floats (${Q * 4} bytes)`);
      log(`  KV cache per layer: ${MAX_SEQ} * ${NKH} * ${HD} = ${MAX_SEQ * NKH * HD} floats (${kvSize} bytes)`);
      log(`  Logits buffer: ${(V * 4 / 1e6).toFixed(1)}MB`);
    }

    // =========================================================================
    // Pre-create bind groups for the entire forward pass
    // =========================================================================
    let bindGroupCache = null;

    function createBindGroups() {
      bindGroupCache = {
        layers: [],
      };

      // Embedding lookup bind group (uses Q8_0 packed embedding)
      bindGroupCache.embeddingLookup = device.createBindGroup({
        layout: pipelines.embeddingLookup.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: modelBuffers.embeddingQ8 } },
          { binding: 1, resource: { buffer: workBuffers.hidden } },
          { binding: 2, resource: { buffer: uniformBuffers.embeddingLookup } },
        ],
      });

      // Final norm
      bindGroupCache.finalNorm = device.createBindGroup({
        layout: pipelines.rmsNorm.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: workBuffers.hidden } },
          { binding: 1, resource: { buffer: modelBuffers.finalNorm } },
          { binding: 2, resource: { buffer: workBuffers.normed } },
          { binding: 3, resource: { buffer: uniformBuffers.rmsNorm } },
        ],
      });

      // LM Head bind group — uses Q8_0 packed embedding via linearQ8 pipeline
      // (saves 671MB by not needing separate f32 embedding)
      bindGroupCache.lmHead = device.createBindGroup({
        layout: pipelines.linearQ8.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: workBuffers.normed } },
          { binding: 1, resource: { buffer: modelBuffers.embeddingQ8 } },
          { binding: 2, resource: { buffer: workBuffers.logits } },
          { binding: 3, resource: { buffer: uniformBuffers.linearQ8_V_H } },
        ],
      });

      // Argmax bind group
      bindGroupCache.argmax = device.createBindGroup({
        layout: pipelines.argmax.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: workBuffers.logits } },
          { binding: 1, resource: { buffer: workBuffers.argmaxResult } },
          { binding: 2, resource: { buffer: uniformBuffers.argmaxSize } },
        ],
      });

      bindGroupCache.topk256 = device.createBindGroup({
        layout: pipelines.topk256.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: workBuffers.logits } },
          { binding: 1, resource: { buffer: workBuffers.topk256Result } },
          { binding: 2, resource: { buffer: uniformBuffers.argmaxSize } },
        ],
      });

      for (let i = 0; i < CONFIG.num_layers; i++) {
        const layer = modelBuffers.layers[i];
        const kv = kvCaches[i];
        const lb = {};

        // Pre-attention RMS norm: hidden -> normed
        lb.attnNorm = device.createBindGroup({
          layout: pipelines.rmsNorm.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.hidden } },
            { binding: 1, resource: { buffer: layer.attn_norm } },
            { binding: 2, resource: { buffer: workBuffers.normed } },
            { binding: 3, resource: { buffer: uniformBuffers.rmsNorm } },
          ],
        });

        // Q projection: normed [640] -> q [1024]
        lb.linearQ = device.createBindGroup({
          layout: pipelines.linearQ8.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.normed } },
            { binding: 1, resource: { buffer: layer.attn_q } },
            { binding: 2, resource: { buffer: workBuffers.q } },
            { binding: 3, resource: { buffer: uniformBuffers.linearQ8_Q_H } },
          ],
        });

        // NOTE: Fused attnNorm+Q and ffnNorm+gate bind groups removed —
        // they assumed Q8_0 packed weights. Can be re-added with fusedNormLinearQ8 shader.

        // K projection: normed [640] -> k [256]
        lb.linearK = device.createBindGroup({
          layout: pipelines.linearQ8.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.normed } },
            { binding: 1, resource: { buffer: layer.attn_k } },
            { binding: 2, resource: { buffer: workBuffers.k } },
            { binding: 3, resource: { buffer: uniformBuffers.linearQ8_KV_H } },
          ],
        });

        // V projection: normed [640] -> v [256]
        lb.linearV = device.createBindGroup({
          layout: pipelines.linearQ8.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.normed } },
            { binding: 1, resource: { buffer: layer.attn_v } },
            { binding: 2, resource: { buffer: workBuffers.v } },
            { binding: 3, resource: { buffer: uniformBuffers.linearQ8_KV_H } },
          ],
        });

        // RoPE on Q (4 heads, head_dim=256) - per-layer theta
        lb.ropeQ = device.createBindGroup({
          layout: pipelines.rope.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.q } },
            { binding: 1, resource: { buffer: uniformBuffers.ropeQ[i] } },
          ],
        });

        // RoPE on K (1 head, head_dim=256) - per-layer theta
        lb.ropeK = device.createBindGroup({
          layout: pipelines.rope.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.k } },
            { binding: 1, resource: { buffer: uniformBuffers.ropeK[i] } },
          ],
        });

        // Per-head RMS norm on Q (4 heads of 256)
        lb.qNorm = device.createBindGroup({
          layout: pipelines.perHeadRmsNorm.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.q } },
            { binding: 1, resource: { buffer: layer.attn_q_norm } },
            { binding: 2, resource: { buffer: uniformBuffers.perHeadRmsNormQ } },
          ],
        });

        // Per-head RMS norm on K (1 head of 256)
        lb.kNorm = device.createBindGroup({
          layout: pipelines.perHeadRmsNorm.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.k } },
            { binding: 1, resource: { buffer: layer.attn_k_norm } },
            { binding: 2, resource: { buffer: uniformBuffers.perHeadRmsNormK } },
          ],
        });

        // Fused per-head norm + RoPE on Q (saves 1 dispatch boundary)
        lb.fusedNormRopeQ = device.createBindGroup({
          layout: pipelines.fusedPerHeadNormRope.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.q } },
            { binding: 1, resource: { buffer: layer.attn_q_norm } },
            { binding: 2, resource: { buffer: uniformBuffers.fusedNormRopeQ[i] } },
          ],
        });

        // Fused per-head norm + RoPE on K (saves 1 dispatch boundary)
        lb.fusedNormRopeK = device.createBindGroup({
          layout: pipelines.fusedPerHeadNormRope.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.k } },
            { binding: 1, resource: { buffer: layer.attn_k_norm } },
            { binding: 2, resource: { buffer: uniformBuffers.fusedNormRopeK[i] } },
          ],
        });

        // KV cache store
        lb.kvStore = device.createBindGroup({
          layout: pipelines.kvCacheStore.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.k } },
            { binding: 1, resource: { buffer: workBuffers.v } },
            { binding: 2, resource: { buffer: kv.k } },
            { binding: 3, resource: { buffer: kv.v } },
            { binding: 4, resource: { buffer: uniformBuffers.kvCacheStore } },
          ],
        });

        // Attention scores
        lb.attnScore = device.createBindGroup({
          layout: pipelines.attnScore.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.q } },
            { binding: 1, resource: { buffer: kv.k } },
            { binding: 2, resource: { buffer: workBuffers.attnScores } },
            { binding: 3, resource: { buffer: uniformBuffers.attnScore } },
          ],
        });

        // Softmax
        lb.softmax = device.createBindGroup({
          layout: pipelines.softmax.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.attnScores } },
            { binding: 1, resource: { buffer: uniformBuffers.softmax } },
          ],
        });

        // Attention output: probs @ V -> attnOut [1024]
        lb.attnOutput = device.createBindGroup({
          layout: pipelines.attnOutput.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.attnScores } },
            { binding: 1, resource: { buffer: kv.v } },
            { binding: 2, resource: { buffer: workBuffers.attnOut } },
            { binding: 3, resource: { buffer: uniformBuffers.attnOutput } },
          ],
        });

        // Output projection: attnOut [1024] -> attnProj [640]
        lb.linearAttnOut = device.createBindGroup({
          layout: pipelines.linearQ8.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.attnOut } },
            { binding: 1, resource: { buffer: layer.attn_output } },
            { binding: 2, resource: { buffer: workBuffers.attnProj } },
            { binding: 3, resource: { buffer: uniformBuffers.linearQ8_H_Q } },
          ],
        });

        // Post-attention norm: attnProj [640] -> postAttnNormed [640]
        lb.postAttnNorm = device.createBindGroup({
          layout: pipelines.rmsNorm.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.attnProj } },
            { binding: 1, resource: { buffer: layer.post_attention_norm } },
            { binding: 2, resource: { buffer: workBuffers.postAttnNormed } },
            { binding: 3, resource: { buffer: uniformBuffers.rmsNorm } },
          ],
        });

        // Residual add: hidden + postAttnNormed -> residual
        lb.residualAdd1 = device.createBindGroup({
          layout: pipelines.add.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.hidden } },
            { binding: 1, resource: { buffer: workBuffers.postAttnNormed } },
            { binding: 2, resource: { buffer: workBuffers.residual } },
            { binding: 3, resource: { buffer: uniformBuffers.sizeH } },
          ],
        });

        // FFN norm: residual -> normed
        lb.ffnNorm = device.createBindGroup({
          layout: pipelines.rmsNorm.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.residual } },
            { binding: 1, resource: { buffer: layer.ffn_norm } },
            { binding: 2, resource: { buffer: workBuffers.normed } },
            { binding: 3, resource: { buffer: uniformBuffers.rmsNorm } },
          ],
        });

        // FFN gate
        lb.ffnGate = device.createBindGroup({
          layout: pipelines.linearQ8.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.normed } },
            { binding: 1, resource: { buffer: layer.ffn_gate } },
            { binding: 2, resource: { buffer: workBuffers.ffnGate } },
            { binding: 3, resource: { buffer: uniformBuffers.linearQ8_I_H } },
          ],
        });

        // FFN up
        lb.ffnUp = device.createBindGroup({
          layout: pipelines.linearQ8.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.normed } },
            { binding: 1, resource: { buffer: layer.ffn_up } },
            { binding: 2, resource: { buffer: workBuffers.ffnUp } },
            { binding: 3, resource: { buffer: uniformBuffers.linearQ8_I_H } },
          ],
        });

        // Fused SiLU * Mul
        lb.siluMul = device.createBindGroup({
          layout: pipelines.siluMul.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.ffnGate } },
            { binding: 1, resource: { buffer: workBuffers.ffnUp } },
            { binding: 2, resource: { buffer: workBuffers.ffnMul } },
            { binding: 3, resource: { buffer: uniformBuffers.sizeI } },
          ],
        });

        // FFN down
        lb.ffnDown = device.createBindGroup({
          layout: pipelines.linearQ8.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.ffnMul } },
            { binding: 1, resource: { buffer: layer.ffn_down } },
            { binding: 2, resource: { buffer: workBuffers.ffnDown } },
            { binding: 3, resource: { buffer: uniformBuffers.linearQ8_H_I } },
          ],
        });

        // Post-FFN norm: ffnDown [640] -> postFfnNormed [640]
        lb.postFfnNorm = device.createBindGroup({
          layout: pipelines.rmsNorm.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.ffnDown } },
            { binding: 1, resource: { buffer: layer.post_ffw_norm } },
            { binding: 2, resource: { buffer: workBuffers.postFfnNormed } },
            { binding: 3, resource: { buffer: uniformBuffers.rmsNorm } },
          ],
        });

        // Residual add: residual + postFfnNormed -> hidden
        lb.residualAdd2 = device.createBindGroup({
          layout: pipelines.add.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.residual } },
            { binding: 1, resource: { buffer: workBuffers.postFfnNormed } },
            { binding: 2, resource: { buffer: workBuffers.hidden } },
            { binding: 3, resource: { buffer: uniformBuffers.sizeH } },
          ],
        });

        // Fused post-attention norm + residual add (saves 1 dispatch boundary)
        // out = hidden + norm(attnProj, post_attention_norm_weight)
        lb.fusedPostAttnNormAdd = device.createBindGroup({
          layout: pipelines.fusedNormAdd.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.attnProj } },
            { binding: 1, resource: { buffer: layer.post_attention_norm } },
            { binding: 2, resource: { buffer: workBuffers.hidden } },
            { binding: 3, resource: { buffer: workBuffers.residual } },
            { binding: 4, resource: { buffer: uniformBuffers.rmsNorm } },
          ],
        });

        // Fused post-FFN norm + residual add (saves 1 dispatch boundary)
        // out = residual + norm(ffnDown, post_ffw_norm_weight)
        lb.fusedPostFfnNormAdd = device.createBindGroup({
          layout: pipelines.fusedNormAdd.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.ffnDown } },
            { binding: 1, resource: { buffer: layer.post_ffw_norm } },
            { binding: 2, resource: { buffer: workBuffers.residual } },
            { binding: 3, resource: { buffer: workBuffers.hidden } },
            { binding: 4, resource: { buffer: uniformBuffers.rmsNorm } },
          ],
        });

        bindGroupCache.layers.push(lb);
      }

      log(`  Pre-created bind groups for all ${CONFIG.num_layers} layers + lmHead + argmax`);
    }

    // =========================================================================
    // Forward pass - single command encoder
    // =========================================================================
    async function forwardPass(tokenId, position) {
      const H = CONFIG.hidden_size;       // 640
      const Q = CONFIG.q_dim;             // 1024
      const KV = CONFIG.kv_dim;           // 256
      const I = CONFIG.intermediate_size; // 2048
      const HD = CONFIG.head_dim;         // 256
      const NQH = CONFIG.num_q_heads;     // 4
      const NKH = CONFIG.num_kv_heads;    // 1
      const MAX_SEQ = CONFIG.context_length;
      const seqLen = position + 1;

      // Write token_id into embedding lookup uniform
      device.queue.writeBuffer(uniformBuffers.embeddingLookup, 4, new Uint32Array([tokenId]));

      // Write position into per-layer RoPE and KV cache uniforms
      const posU32 = new Uint32Array([position]);
      for (let il = 0; il < CONFIG.num_layers; il++) {
        device.queue.writeBuffer(uniformBuffers.ropeQ[il], 8, posU32);
        device.queue.writeBuffer(uniformBuffers.ropeK[il], 8, posU32);
      }
      device.queue.writeBuffer(uniformBuffers.kvCacheStore, 8, posU32);

      // Write seq_len into attention uniforms
      const seqU32 = new Uint32Array([seqLen]);
      device.queue.writeBuffer(uniformBuffers.attnScore, 12, seqU32);
      device.queue.writeBuffer(uniformBuffers.softmax, 4, seqU32);
      device.queue.writeBuffer(uniformBuffers.attnOutput, 12, seqU32);

      // Single command encoder for the entire forward pass
      const encoder = device.createCommandEncoder();

      // --- Embedding lookup on GPU ---
      {
        const pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.embeddingLookup);
        pass.setBindGroup(0, bindGroupCache.embeddingLookup);
        pass.dispatchWorkgroups(Math.ceil(H / 256));
        pass.end();
      }

      // --- Process each transformer layer ---
      for (let layerIdx = 0; layerIdx < CONFIG.num_layers; layerIdx++) {
        const lb = bindGroupCache.layers[layerIdx];
        let pass;

        // 1. Pre-attention RMS norm: hidden -> normed
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.rmsNorm);
        pass.setBindGroup(0, lb.attnNorm);
        pass.dispatchWorkgroups(1);
        pass.end();

        // 2. Q projection (Q8_0): normed [640] -> q [1024]
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.linearQ);
        pass.dispatchWorkgroups(Math.ceil(Q / 256));
        pass.end();

        // 3. K projection (Q8_0): normed [640] -> k [256]
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.linearK);
        pass.dispatchWorkgroups(Math.ceil(KV / 256));
        pass.end();

        // 4. V projection (Q8_0): normed [640] -> v [256]
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.linearV);
        pass.dispatchWorkgroups(Math.ceil(KV / 256));
        pass.end();

        // 5. Per-head RMS norm on Q (4 heads) — BEFORE RoPE (Gemma 3 order)
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.perHeadRmsNorm);
        pass.setBindGroup(0, lb.qNorm);
        pass.dispatchWorkgroups(NQH);
        pass.end();

        // 6. Per-head RMS norm on K (1 head) — BEFORE RoPE (Gemma 3 order)
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.perHeadRmsNorm);
        pass.setBindGroup(0, lb.kNorm);
        pass.dispatchWorkgroups(NKH);
        pass.end();

        // 7. RoPE on Q (4 heads, head_dim=256) — AFTER norms
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.rope);
        pass.setBindGroup(0, lb.ropeQ);
        pass.dispatchWorkgroups(Math.ceil((NQH * HD / 2) / 256));
        pass.end();

        // 8. RoPE on K (1 head, head_dim=256) — AFTER norms
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.rope);
        pass.setBindGroup(0, lb.ropeK);
        pass.dispatchWorkgroups(Math.ceil((NKH * HD / 2) / 256));
        pass.end();

        // 9. Store K, V in cache
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.kvCacheStore);
        pass.setBindGroup(0, lb.kvStore);
        pass.dispatchWorkgroups(Math.ceil(KV / 256));
        pass.end();

        // 10. Attention scores: Q @ K_cache^T / sqrt(256)
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.attnScore);
        pass.setBindGroup(0, lb.attnScore);
        pass.dispatchWorkgroups(Math.ceil((NQH * seqLen) / 256));
        pass.end();

        // 11. Softmax over scores (one workgroup per head)
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.softmax);
        pass.setBindGroup(0, lb.softmax);
        pass.dispatchWorkgroups(NQH);
        pass.end();

        // 12. Attention output: probs @ V_cache -> attnOut [1024]
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.attnOutput);
        pass.setBindGroup(0, lb.attnOutput);
        pass.dispatchWorkgroups(Math.ceil((NQH * HD) / 256));
        pass.end();

        // 13. Output projection (Q8_0): attnOut [1024] -> attnProj [640]
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.linearAttnOut);
        pass.dispatchWorkgroups(Math.ceil(H / 256));
        pass.end();

        // 14. Post-attention RMS norm: attnProj -> postAttnNormed
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.rmsNorm);
        pass.setBindGroup(0, lb.postAttnNorm);
        pass.dispatchWorkgroups(1);
        pass.end();

        // 15. Residual add: hidden + postAttnNormed -> residual
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.add);
        pass.setBindGroup(0, lb.residualAdd1);
        pass.dispatchWorkgroups(Math.ceil(H / 256));
        pass.end();

        // 16. FFN norm: residual -> normed
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.rmsNorm);
        pass.setBindGroup(0, lb.ffnNorm);
        pass.dispatchWorkgroups(1);
        pass.end();

        // 17. FFN gate (Q8_0): normed [640] -> ffnGate [2048]
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.ffnGate);
        pass.dispatchWorkgroups(Math.ceil(I / 256));
        pass.end();

        // 18. FFN up (Q8_0): normed [640] -> ffnUp [2048]
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.ffnUp);
        pass.dispatchWorkgroups(Math.ceil(I / 256));
        pass.end();

        // 19. Fused SiLU * Mul
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.siluMul);
        pass.setBindGroup(0, lb.siluMul);
        pass.dispatchWorkgroups(Math.ceil(I / 256));
        pass.end();

        // 20. FFN down (Q8_0): ffnMul [2048] -> ffnDown [640]
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.ffnDown);
        pass.dispatchWorkgroups(Math.ceil(H / 256));
        pass.end();

        // 21. Post-FFN RMS norm: ffnDown -> postFfnNormed
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.rmsNorm);
        pass.setBindGroup(0, lb.postFfnNorm);
        pass.dispatchWorkgroups(1);
        pass.end();

        // 22. Residual add: residual + postFfnNormed -> hidden
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.add);
        pass.setBindGroup(0, lb.residualAdd2);
        pass.dispatchWorkgroups(Math.ceil(H / 256));
        pass.end();
      }

      // --- Final RMS norm ---
      {
        const pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.rmsNorm);
        pass.setBindGroup(0, bindGroupCache.finalNorm);
        pass.dispatchWorkgroups(1);
        pass.end();
      }

      // Submit everything as ONE command buffer
      device.queue.submit([encoder.finish()]);
      await device.queue.onSubmittedWorkDone();
    }

    // =========================================================================
    // FAST PATH: Combined forward pass + LM head + token selection
    // Single command buffer, single submit, single await per token
    // Uses Q8_0 LM head (3.5x less bandwidth than f32)
    // =========================================================================
    async function forwardPassAndGetToken(tokenId, position, temperature = 0, topP = 0.9, repPenalty = 1.0, generatedTokens = null) {
      const H = CONFIG.hidden_size;
      const Q = CONFIG.q_dim;
      const KV = CONFIG.kv_dim;
      const I = CONFIG.intermediate_size;
      const HD = CONFIG.head_dim;
      const NQH = CONFIG.num_q_heads;
      const NKH = CONFIG.num_kv_heads;
      const V = CONFIG.vocab_size;
      const seqLen = position + 1;

      // Write token_id into embedding lookup uniform
      device.queue.writeBuffer(uniformBuffers.embeddingLookup, 4, new Uint32Array([tokenId]));

      // Write position into fusedNormRope and legacy RoPE/KV cache uniforms
      const posU32 = new Uint32Array([position]);
      for (let il = 0; il < CONFIG.num_layers; il++) {
        // Fused norm+rope uniforms: position at offset 12 (4th field)
        device.queue.writeBuffer(uniformBuffers.fusedNormRopeQ[il], 12, posU32);
        device.queue.writeBuffer(uniformBuffers.fusedNormRopeK[il], 12, posU32);
      }
      device.queue.writeBuffer(uniformBuffers.kvCacheStore, 8, posU32);

      // Write seq_len into attention uniforms
      const seqU32 = new Uint32Array([seqLen]);
      device.queue.writeBuffer(uniformBuffers.attnScore, 12, seqU32);
      device.queue.writeBuffer(uniformBuffers.softmax, 4, seqU32);
      device.queue.writeBuffer(uniformBuffers.attnOutput, 12, seqU32);

      // === SINGLE command encoder for everything ===
      const encoder = device.createCommandEncoder();
      let pass;

      // --- Embedding lookup ---
      pass = encoder.beginComputePass();
      pass.setPipeline(pipelines.embeddingLookup);
      pass.setBindGroup(0, bindGroupCache.embeddingLookup);
      pass.dispatchWorkgroups(Math.ceil(H / 256));
      pass.end();

      // --- All 18 transformer layers (optimized: 14 passes/layer, was 17) ---
      for (let layerIdx = 0; layerIdx < CONFIG.num_layers; layerIdx++) {
        const lb = bindGroupCache.layers[layerIdx];

        // 1. Pre-attention RMS norm
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.attnNorm); pass.dispatchWorkgroups(1); pass.end();

        // 2. Q+K+V projections (all read normed, write to separate buffers — no conflicts)
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.linearQ); pass.dispatchWorkgroups(Math.ceil(Q / 256));
        pass.setBindGroup(0, lb.linearK); pass.dispatchWorkgroups(Math.ceil(KV / 256));
        pass.setBindGroup(0, lb.linearV); pass.dispatchWorkgroups(Math.ceil(KV / 256));
        pass.end();

        // 3. Fused Q norm+RoPE + K norm+RoPE (each head: norm → rotate, separate buffers)
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.fusedPerHeadNormRope);
        pass.setBindGroup(0, lb.fusedNormRopeQ); pass.dispatchWorkgroups(NQH);
        pass.setBindGroup(0, lb.fusedNormRopeK); pass.dispatchWorkgroups(NKH);
        pass.end();

        // 4. KV cache store
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.kvCacheStore); pass.setBindGroup(0, lb.kvStore); pass.dispatchWorkgroups(Math.ceil(KV / 256)); pass.end();

        // 5-7. Attention: score → softmax → output
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.attnScore); pass.setBindGroup(0, lb.attnScore); pass.dispatchWorkgroups(Math.ceil((NQH * seqLen) / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.softmax); pass.setBindGroup(0, lb.softmax); pass.dispatchWorkgroups(NQH); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.attnOutput); pass.setBindGroup(0, lb.attnOutput); pass.dispatchWorkgroups(Math.ceil((NQH * HD) / 256)); pass.end();

        // 8. Output projection
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.linearAttnOut); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();

        // 9. Fused post-attention norm + residual add (was 2 passes, now 1)
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.fusedNormAdd); pass.setBindGroup(0, lb.fusedPostAttnNormAdd); pass.dispatchWorkgroups(1); pass.end();

        // 10. FFN norm
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.ffnNorm); pass.dispatchWorkgroups(1); pass.end();

        // 11. FFN gate + up (both read normed, write to separate buffers)
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.ffnGate); pass.dispatchWorkgroups(Math.ceil(I / 256));
        pass.setBindGroup(0, lb.ffnUp); pass.dispatchWorkgroups(Math.ceil(I / 256));
        pass.end();

        // 12. GeGLU activation
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.siluMul); pass.setBindGroup(0, lb.siluMul); pass.dispatchWorkgroups(Math.ceil(I / 256)); pass.end();

        // 13. FFN down
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.ffnDown); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();

        // 14. Fused post-FFN norm + residual add (was 2 passes, now 1)
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.fusedNormAdd); pass.setBindGroup(0, lb.fusedPostFfnNormAdd); pass.dispatchWorkgroups(1); pass.end();
      }

      // --- Final RMS norm ---
      pass = encoder.beginComputePass();
      pass.setPipeline(pipelines.rmsNorm);
      pass.setBindGroup(0, bindGroupCache.finalNorm);
      pass.dispatchWorkgroups(1);
      pass.end();

      // --- LM Head (f32 — Q8_0 is too lossy for 262K vocab, causes wrong token selection) ---
      pass = encoder.beginComputePass();
      pass.setPipeline(pipelines.linearQ8);
      pass.setBindGroup(0, bindGroupCache.lmHead);
      pass.dispatchWorkgroups(Math.ceil(V / 256));
      pass.end();

      // --- Token selection ---
      const useGreedyFast = (temperature === 0 && repPenalty <= 1.0);

      if (useGreedyFast) {
        // GPU argmax + readback in same command buffer
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.argmax);
        pass.setBindGroup(0, bindGroupCache.argmax);
        pass.dispatchWorkgroups(1);
        pass.end();
        encoder.copyBufferToBuffer(workBuffers.argmaxResult, 0, workBuffers.argmaxReadback, 0, 4);
      } else {
        // GPU top-256 + readback for CPU sampling
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.topk256);
        pass.setBindGroup(0, bindGroupCache.topk256);
        pass.dispatchWorkgroups(1);
        pass.end();
        encoder.copyBufferToBuffer(workBuffers.topk256Result, 0, workBuffers.topk256Readback, 0, 256 * 2 * 4);
      }

      // === SINGLE submit — mapAsync waits implicitly, no need for onSubmittedWorkDone ===
      device.queue.submit([encoder.finish()]);

      if (useGreedyFast) {
        await workBuffers.argmaxReadback.mapAsync(GPUMapMode.READ);
        const resultArray = new Uint32Array(workBuffers.argmaxReadback.getMappedRange());
        const tokenResult = resultArray[0];
        workBuffers.argmaxReadback.unmap();
        return tokenResult;
      }

      // CPU sampling path
      await workBuffers.topk256Readback.mapAsync(GPUMapMode.READ);
      const topkData = new Float32Array(workBuffers.topk256Readback.getMappedRange().slice(0));
      workBuffers.topk256Readback.unmap();

      // Unpack 256 (value, id) pairs
      const candidates = new Array(256);
      const topkU32 = new Uint32Array(topkData.buffer.slice(0));
      for (let i = 0; i < 256; i++) {
        candidates[i] = { val: topkData[i * 2], id: topkU32[i * 2 + 1] };
      }

      // Apply repetition penalty
      if (repPenalty > 1.0 && generatedTokens && generatedTokens.length > 0) {
        const seen = new Set(generatedTokens);
        for (let i = 0; i < 256; i++) {
          if (seen.has(candidates[i].id)) {
            if (candidates[i].val > 0) candidates[i].val /= repPenalty;
            else candidates[i].val *= repPenalty;
          }
        }
      }

      candidates.sort((a, b) => b.val - a.val);

      if (temperature === 0) return candidates[0].id;

      // Temperature + softmax
      const maxLogit = candidates[0].val;
      let sumExp = 0;
      const probs = new Float32Array(256);
      for (let i = 0; i < 256; i++) {
        probs[i] = Math.exp((candidates[i].val - maxLogit) / temperature);
        sumExp += probs[i];
      }

      // Top-p filtering + sampling
      let cumProb = 0, cutoff = 256;
      for (let i = 0; i < 256; i++) {
        cumProb += probs[i] / sumExp;
        if (cumProb >= topP) { cutoff = i + 1; break; }
      }
      let subsetSum = 0;
      for (let i = 0; i < cutoff; i++) subsetSum += probs[i];
      let r = Math.random() * subsetSum;
      for (let i = 0; i < cutoff; i++) {
        r -= probs[i];
        if (r <= 0) return candidates[i].id;
      }
      return candidates[cutoff - 1].id;
    }

    // Fast prefill-only path (no LM head needed during prefill except last token)
    async function forwardPassOnly(tokenId, position) {
      const H = CONFIG.hidden_size;
      const Q = CONFIG.q_dim;
      const KV = CONFIG.kv_dim;
      const I = CONFIG.intermediate_size;
      const HD = CONFIG.head_dim;
      const NQH = CONFIG.num_q_heads;
      const NKH = CONFIG.num_kv_heads;
      const seqLen = position + 1;

      // Write token_id into embedding lookup uniform
      device.queue.writeBuffer(uniformBuffers.embeddingLookup, 4, new Uint32Array([tokenId]));

      // Write position into fusedNormRope and legacy KV cache uniforms
      const posU32 = new Uint32Array([position]);
      for (let il = 0; il < CONFIG.num_layers; il++) {
        device.queue.writeBuffer(uniformBuffers.fusedNormRopeQ[il], 12, posU32);
        device.queue.writeBuffer(uniformBuffers.fusedNormRopeK[il], 12, posU32);
      }
      device.queue.writeBuffer(uniformBuffers.kvCacheStore, 8, posU32);

      // Write seq_len into attention uniforms
      const seqU32 = new Uint32Array([seqLen]);
      device.queue.writeBuffer(uniformBuffers.attnScore, 12, seqU32);
      device.queue.writeBuffer(uniformBuffers.softmax, 4, seqU32);
      device.queue.writeBuffer(uniformBuffers.attnOutput, 12, seqU32);

      const encoder = device.createCommandEncoder();
      let pass;

      pass = encoder.beginComputePass();
      pass.setPipeline(pipelines.embeddingLookup);
      pass.setBindGroup(0, bindGroupCache.embeddingLookup);
      pass.dispatchWorkgroups(Math.ceil(H / 256));
      pass.end();

      for (let layerIdx = 0; layerIdx < CONFIG.num_layers; layerIdx++) {
        const lb = bindGroupCache.layers[layerIdx];
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.attnNorm); pass.dispatchWorkgroups(1); pass.end();
        // Fused Q+K+V projections
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.linearQ); pass.dispatchWorkgroups(Math.ceil(Q / 256));
        pass.setBindGroup(0, lb.linearK); pass.dispatchWorkgroups(Math.ceil(KV / 256));
        pass.setBindGroup(0, lb.linearV); pass.dispatchWorkgroups(Math.ceil(KV / 256));
        pass.end();
        // Fused norm+RoPE Q+K
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.fusedPerHeadNormRope);
        pass.setBindGroup(0, lb.fusedNormRopeQ); pass.dispatchWorkgroups(NQH);
        pass.setBindGroup(0, lb.fusedNormRopeK); pass.dispatchWorkgroups(NKH);
        pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.kvCacheStore); pass.setBindGroup(0, lb.kvStore); pass.dispatchWorkgroups(Math.ceil(KV / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.attnScore); pass.setBindGroup(0, lb.attnScore); pass.dispatchWorkgroups(Math.ceil((NQH * seqLen) / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.softmax); pass.setBindGroup(0, lb.softmax); pass.dispatchWorkgroups(NQH); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.attnOutput); pass.setBindGroup(0, lb.attnOutput); pass.dispatchWorkgroups(Math.ceil((NQH * HD) / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.linearAttnOut); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
        // Fused post-attn norm + residual add
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.fusedNormAdd); pass.setBindGroup(0, lb.fusedPostAttnNormAdd); pass.dispatchWorkgroups(1); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.ffnNorm); pass.dispatchWorkgroups(1); pass.end();
        // Fused gate+up
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.ffnGate); pass.dispatchWorkgroups(Math.ceil(I / 256));
        pass.setBindGroup(0, lb.ffnUp); pass.dispatchWorkgroups(Math.ceil(I / 256));
        pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.siluMul); pass.setBindGroup(0, lb.siluMul); pass.dispatchWorkgroups(Math.ceil(I / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.ffnDown); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
        // Fused post-FFN norm + residual add
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.fusedNormAdd); pass.setBindGroup(0, lb.fusedPostFfnNormAdd); pass.dispatchWorkgroups(1); pass.end();
      }

      pass = encoder.beginComputePass();
      pass.setPipeline(pipelines.rmsNorm);
      pass.setBindGroup(0, bindGroupCache.finalNorm);
      pass.dispatchWorkgroups(1);
      pass.end();

      device.queue.submit([encoder.finish()]);
      // No await here — caller can batch multiple prefill tokens before awaiting
    }

    // Batched prefill: submit all tokens without awaiting between them
    async function prefillBatched(tokens) {
      for (let i = 0; i < tokens.length; i++) {
        forwardPassOnly(tokens[i], i);
      }
      // Single await for all prefill tokens
      await device.queue.onSubmittedWorkDone();
    }

    // LM Head + Token Selection (argmax or sampling) — LEGACY (for debug only)

    // Top-p (nucleus) sampling on CPU
    // Optimized: uses top-K pre-filter (O(N)) instead of full sort (O(N log N))
    function sampleTopP(logits, temperature, topP) {
      const V = logits.length;

      // Temperature=0 means greedy
      if (temperature === 0) {
        let maxVal = -Infinity, maxIdx = 0;
        for (let i = 0; i < V; i++) {
          if (logits[i] > maxVal) { maxVal = logits[i]; maxIdx = i; }
        }
        return maxIdx;
      }

      // Find max logit for numerical stability (single pass)
      let maxLogit = -Infinity;
      for (let i = 0; i < V; i++) if (logits[i] > maxLogit) maxLogit = logits[i];

      // Apply temperature + compute exp in one pass, and find top-K candidates
      // With temperature 0.7 and top-p 0.9, we typically need <50 tokens
      // Keep top 512 candidates via a min-heap-like approach (linear scan with threshold)
      const K = 512;
      const topIds = new Uint32Array(K);
      const topVals = new Float32Array(K);
      let topCount = 0;
      let minTopVal = -Infinity;
      let minTopIdx = 0;
      let sumExp = 0;

      for (let i = 0; i < V; i++) {
        const expVal = Math.exp((logits[i] / temperature) - (maxLogit / temperature));
        sumExp += expVal;

        if (topCount < K) {
          topIds[topCount] = i;
          topVals[topCount] = expVal;
          if (topCount === 0 || expVal < minTopVal) {
            minTopVal = expVal;
            minTopIdx = topCount;
          }
          topCount++;
        } else if (expVal > minTopVal) {
          topIds[minTopIdx] = i;
          topVals[minTopIdx] = expVal;
          // Find new min
          minTopVal = topVals[0]; minTopIdx = 0;
          for (let j = 1; j < K; j++) {
            if (topVals[j] < minTopVal) { minTopVal = topVals[j]; minTopIdx = j; }
          }
        }
      }

      // Sort top-K candidates by probability descending (only 512 elements!)
      const sortIndices = Array.from({length: topCount}, (_, i) => i);
      sortIndices.sort((a, b) => topVals[b] - topVals[a]);

      // Top-p filtering: accumulate until cumulative prob >= topP
      let cumProb = 0;
      let cutoff = topCount;
      for (let i = 0; i < topCount; i++) {
        cumProb += topVals[sortIndices[i]] / sumExp;
        if (cumProb >= topP) {
          cutoff = i + 1;
          break;
        }
      }

      // Sample from the filtered subset
      let subsetSum = 0;
      for (let i = 0; i < cutoff; i++) subsetSum += topVals[sortIndices[i]];

      let r = Math.random() * subsetSum;
      for (let i = 0; i < cutoff; i++) {
        r -= topVals[sortIndices[i]];
        if (r <= 0) return topIds[sortIndices[i]];
      }
      return topIds[sortIndices[cutoff - 1]]; // fallback
    }

    async function lmHeadAndArgmax(temperature = 0, topP = 0.9, repPenalty = 1.0, generatedTokens = null) {
      const V = CONFIG.vocab_size;

      const encoder = device.createCommandEncoder();

      // LM Head (f32): normed [H] -> logits [V] via f32 embedding
      {
        const pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, bindGroupCache.lmHead);
        pass.dispatchWorkgroups(Math.ceil(V / 256));
        pass.end();
      }

      // Fast path: greedy with no repetition penalty → GPU argmax
      if (temperature === 0 && repPenalty <= 1.0) {
        {
          const pass = encoder.beginComputePass();
          pass.setPipeline(pipelines.argmax);
          pass.setBindGroup(0, bindGroupCache.argmax);
          pass.dispatchWorkgroups(1);
          pass.end();
        }

        encoder.copyBufferToBuffer(workBuffers.argmaxResult, 0, workBuffers.argmaxReadback, 0, 4);
        device.queue.submit([encoder.finish()]);
        await device.queue.onSubmittedWorkDone();

        await workBuffers.argmaxReadback.mapAsync(GPUMapMode.READ);
        const resultArray = new Uint32Array(workBuffers.argmaxReadback.getMappedRange());
        const tokenId = resultArray[0];
        workBuffers.argmaxReadback.unmap();
        return tokenId;
      }

      // CPU sampling path: GPU top-256 → apply repetition penalty → sample/argmax
      {
        const pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.topk256);
        pass.setBindGroup(0, bindGroupCache.topk256);
        pass.dispatchWorkgroups(1);
        pass.end();
      }

      encoder.copyBufferToBuffer(workBuffers.topk256Result, 0, workBuffers.topk256Readback, 0, 256 * 2 * 4);
      device.queue.submit([encoder.finish()]);
      await device.queue.onSubmittedWorkDone();

      await workBuffers.topk256Readback.mapAsync(GPUMapMode.READ);
      const topkData = new Float32Array(workBuffers.topk256Readback.getMappedRange().slice(0));
      workBuffers.topk256Readback.unmap();

      // Unpack 256 (value, id) pairs
      const candidates = new Array(256);
      const topkU32 = new Uint32Array(topkData.buffer.slice(0));
      for (let i = 0; i < 256; i++) {
        candidates[i] = { val: topkData[i * 2], id: topkU32[i * 2 + 1] };
      }

      // Apply repetition penalty: penalize tokens that already appeared
      if (repPenalty > 1.0 && generatedTokens && generatedTokens.length > 0) {
        const seen = new Set(generatedTokens);
        for (let i = 0; i < 256; i++) {
          if (seen.has(candidates[i].id)) {
            // Standard HF/llama.cpp repetition penalty:
            // If logit > 0: logit /= penalty  (make less likely)
            // If logit < 0: logit *= penalty  (make even less likely)
            if (candidates[i].val > 0) {
              candidates[i].val /= repPenalty;
            } else {
              candidates[i].val *= repPenalty;
            }
          }
        }
      }

      // Sort by (penalized) value descending
      candidates.sort((a, b) => b.val - a.val);

      // Greedy with repetition penalty: just pick the top candidate
      if (temperature === 0) {
        return candidates[0].id;
      }

      // Apply temperature + softmax over candidates
      const maxLogit = candidates[0].val;
      let sumExp = 0;
      const probs = new Float32Array(256);
      for (let i = 0; i < 256; i++) {
        probs[i] = Math.exp((candidates[i].val - maxLogit) / temperature);
        sumExp += probs[i];
      }

      // Top-p filtering
      let cumProb = 0;
      let cutoff = 256;
      for (let i = 0; i < 256; i++) {
        cumProb += probs[i] / sumExp;
        if (cumProb >= topP) { cutoff = i + 1; break; }
      }

      // Sample from filtered subset
      let subsetSum = 0;
      for (let i = 0; i < cutoff; i++) subsetSum += probs[i];
      let r = Math.random() * subsetSum;
      for (let i = 0; i < cutoff; i++) {
        r -= probs[i];
        if (r <= 0) return candidates[i].id;
      }
      return candidates[cutoff - 1].id;
    }

    // Debug: read back any buffer
    async function readBackBuffer(buffer, size, label) {
      const rb = device.createBuffer({ size, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
      const enc = device.createCommandEncoder();
      enc.copyBufferToBuffer(buffer, 0, rb, 0, size);
      device.queue.submit([enc.finish()]);
      await device.queue.onSubmittedWorkDone();
      await rb.mapAsync(GPUMapMode.READ);
      const data = new Float32Array(rb.getMappedRange().slice(0));
      rb.unmap();
      rb.destroy();
      log(`${label}: [${data.slice(0, 10).map(v => v.toFixed(4)).join(', ')}]`);
      return data;
    }

    // Debug forward pass: runs layer 0 step by step with readbacks
