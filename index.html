<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>Gemma 270M — WebGPU Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #1e2028;
      --bg-secondary: #252830;
      --bg-tertiary: #2c2f3a;
      --bg-input: #1a1c24;
      --text-primary: #e8e9ed;
      --text-secondary: #9a9ca6;
      --text-muted: #6b6d77;
      --amber: #e5a54b;
      --amber-dim: #b8863d;
      --amber-glow: rgba(229, 165, 75, 0.15);
      --blue: #5b9bd5;
      --green: #6bbf7a;
      --red: #d55b5b;
      --border: #353845;
      --border-light: #404354;
      --user-bg: #2a2d38;
      --fn-card-bg: #272a35;
      --fn-card-border: #3a3d4a;
      --font-ui: 'DM Sans', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 8px;
      --radius-lg: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      height: 100dvh;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-ui);
      overflow: hidden;
      /* Prevent iOS bounce/overscroll */
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Loading Screen ── */
    #loading-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg-primary);
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .loading-title {
      font-family: var(--font-mono);
      font-size: 20px; font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .loading-subtitle {
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 32px;
    }
    .progress-container {
      width: 320px; max-width: 80vw;
    }
    .progress-bar-bg {
      width: 100%; height: 4px;
      background: var(--bg-tertiary);
      border-radius: 2px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; width: 0%;
      background: var(--amber);
      border-radius: 2px;
      transition: width 0.2s ease;
    }
    .progress-text {
      font-family: var(--font-mono);
      font-size: 12px; color: var(--text-muted);
      margin-top: 10px; text-align: center;
    }
    .loading-status {
      font-size: 12px; color: var(--text-secondary);
      margin-top: 20px;
    }

    /* ── App Layout ── */
    #app {
      display: flex; flex-direction: column;
      height: 100vh;
      height: 100dvh;
      opacity: 0; transition: opacity 0.4s ease;
    }
    #app.visible { opacity: 1; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-title {
      font-family: var(--font-mono);
      font-size: 14px; font-weight: 500;
    }
    .badge {
      font-family: var(--font-mono);
      font-size: 10px; font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--amber-glow);
      color: var(--amber);
      border: 1px solid rgba(229,165,75,0.25);
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-right a {
      font-size: 12px; color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .header-right a:hover { color: var(--text-secondary); }
    #speed-indicator {
      font-family: var(--font-mono);
      font-size: 13px; font-weight: 500;
      color: var(--amber);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #speed-indicator.visible { opacity: 1; }
    .settings-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted);
      width: 30px; height: 30px;
      border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
      font-size: 15px;
    }
    .settings-btn:hover { border-color: var(--border-light); color: var(--text-secondary); }

    /* ── Settings Panel ── */
    #settings-panel {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease;
      flex-shrink: 0;
    }
    #settings-panel.open { max-height: 260px; }
    .settings-inner {
      padding: 14px 20px;
      display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-start;
    }
    .setting-group { display: flex; flex-direction: column; gap: 4px; }
    .setting-group label {
      font-size: 11px; color: var(--text-muted);
      font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .setting-group input[type="number"] {
      width: 72px; padding: 6px 8px;
      font-family: var(--font-mono); font-size: 13px;
      background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 6px;
      outline: none;
    }
    .setting-group input:focus { border-color: var(--amber-dim); }
    .tools-group { flex: 1; min-width: 200px; }
    .tools-group textarea {
      width: 100%; height: 60px; padding: 8px;
      font-family: var(--font-mono); font-size: 11px;
      background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 6px;
      resize: vertical; outline: none;
    }
    .tools-group textarea:focus { border-color: var(--amber-dim); }

    /* ── Chat Area ── */
    #chat-area {
      flex: 1; overflow-y: auto;
      padding: 20px 0;
      scroll-behavior: smooth;
    }
    #chat-area::-webkit-scrollbar { width: 6px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      padding: 12px 20px;
      max-width: 800px;
      margin: 0 auto 2px;
    }
    .message-user {
      text-align: right;
    }
    .message-user .message-content {
      display: inline-block;
      text-align: left;
      background: var(--user-bg);
      padding: 10px 14px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      line-height: 1.5;
      max-width: 85%;
    }
    .message-ai .message-content {
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      font-family: var(--font-mono);
    }
    .message-meta .speed { color: var(--amber); }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 2px; height: 1.1em;
      background: var(--amber);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Function call card */
    .fn-card {
      background: var(--fn-card-bg);
      border: 1px solid var(--fn-card-border);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin: 6px 0;
    }
    .fn-card-header {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .fn-card-name {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--blue);
    }
    .fn-card-params {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 6px;
      line-height: 1.5;
    }

    /* ── Welcome message ── */
    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .welcome h2 {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .welcome p {
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Input Area ── */
    #input-area {
      padding: 12px 20px calc(16px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }
    .input-row {
      max-width: 800px;
      margin: 0 auto;
      display: flex; gap: 10px; align-items: flex-end;
    }
    #prompt-input {
      flex: 1;
      padding: 10px 14px;
      font-family: var(--font-ui);
      font-size: 14px;
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.4;
    }
    #prompt-input:focus { border-color: var(--amber-dim); }
    #prompt-input::placeholder { color: var(--text-muted); }
    #send-btn {
      padding: 10px 18px;
      font-family: var(--font-ui);
      font-size: 14px; font-weight: 500;
      background: var(--amber);
      color: #1a1a1a;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #send-btn:hover { background: #d4963f; }
    #send-btn:disabled { background: var(--bg-tertiary); color: var(--text-muted); cursor: not-allowed; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .message { padding: 10px 14px; }
      header { padding: 10px 14px; }
      #input-area { padding: 10px 14px calc(14px + env(safe-area-inset-bottom, 0px)); }
      .settings-inner { padding: 12px 14px; }
      #send-btn { padding: 10px 14px; }
      .header-left span { font-size: 14px; }
    }

    /* ── Debug console (hidden) ── */
    #debug-log { display: none; }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-title">Gemma 270M</div>
    <div class="loading-subtitle">WebGPU Inference Engine</div>
    <div class="progress-container">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text">Initializing...</div>
    </div>
    <div class="loading-status" id="loading-status"></div>
  </div>

  <!-- App -->
  <div id="app">
    <header>
      <div class="header-left">
        <span class="header-title">Gemma 270M</span>
        <span class="badge">WebGPU</span>
      </div>
      <div class="header-right">
        <span id="speed-indicator"></span>
        <a href="debug.html">debug</a>
        <button class="settings-btn" id="settings-toggle" title="Settings">&#9881;</button>
      </div>
    </header>

    <div id="settings-panel">
      <div class="settings-inner">
        <div class="setting-group">
          <label>Temperature</label>
          <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1">
        </div>
        <div class="setting-group">
          <label>Top-P</label>
          <input type="number" id="top-p" value="0.9" min="0" max="1" step="0.05">
        </div>
        <div class="setting-group">
          <label>Rep. Penalty</label>
          <input type="number" id="rep-penalty" value="1.2" min="1" max="2" step="0.05">
        </div>
        <div class="setting-group">
          <label>Max Tokens</label>
          <input type="number" id="max-tokens" value="2048" min="1" max="2048">
        </div>
        <div class="setting-group tools-group">
          <label>Tools (JSON)</label>
          <textarea id="tools-input" placeholder='Add tools for function calling, e.g. [{"name":"get_weather","description":"Get weather","parameters":{...}}]'>[]</textarea>
        </div>
      </div>
    </div>

    <div id="chat-area">
      <div class="welcome">
        <h2>Ready to chat</h2>
        <p>Ask anything — runs entirely in your browser via WebGPU at ~100 t/s.<br>Add tools in settings (⚙) to enable function calling.</p>
      </div>
    </div>

    <div id="input-area">
      <div class="input-row">
        <textarea id="prompt-input" rows="1" placeholder="Ask something..." autofocus></textarea>
        <button id="send-btn" disabled>Send</button>
      </div>
    </div>
  </div>

  <pre id="debug-log" style="display:none;"></pre>

  <script type="module">
    // =========================================================================
    // UI helpers
    // =========================================================================
    const log = (msg, cls = '') => {
      const el = document.getElementById('debug-log');
      el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
      console.log(msg);
    };

    const setStatus = (msg) => {
      // During loading, update loading screen
      const ls = document.getElementById('loading-status');
      if (ls) ls.textContent = msg;
      console.log('[status]', msg);
    };

    function setProgress(received, total) {
      const pct = Math.min(100, (received / total) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      const mb = (received / 1e6).toFixed(0);
      const totalMb = (total / 1e6).toFixed(0);
      document.getElementById('progress-text').textContent = `${mb} MB / ${totalMb} MB`;
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // =========================================================================
    // Model Configuration - CORRECT Gemma 3 270M architecture
    // =========================================================================
    const CONFIG = {
      hidden_size: 640,
      q_dim: 1024,
      kv_dim: 256,
      num_q_heads: 4,
      num_kv_heads: 1,
      head_dim: 256,
      intermediate_size: 2048,
      vocab_size: 262144,
      num_layers: 18,
      context_length: 2048,
      rms_norm_eps: 1e-6,
      rope_theta_global: 1000000.0,
      rope_theta_swa: 1000000.0,
      swa_period: 6,
    };

    function isSwaLayer(il) {
      return (il % CONFIG.swa_period) < (CONFIG.swa_period - 1);
    }

    function getRopeTheta(il) {
      return isSwaLayer(il) ? CONFIG.rope_theta_swa : CONFIG.rope_theta_global;
    }

    // =========================================================================
    // GGUF Parser
    // =========================================================================
    class GGUFParser {
      constructor(buffer) {
        this.buffer = buffer instanceof ArrayBuffer ? buffer : buffer.buffer;
        this.view = new DataView(this.buffer);
        this.offset = 0;
        this.textDecoder = new TextDecoder('utf-8');
      }

      readUint32() {
        const val = this.view.getUint32(this.offset, true);
        this.offset += 4;
        return val;
      }

      readUint64() {
        const val = this.view.getBigUint64(this.offset, true);
        this.offset += 8;
        return val;
      }

      readString() {
        const length = Number(this.readUint64());
        const bytes = new Uint8Array(this.buffer, this.offset, length);
        this.offset += length;
        return this.textDecoder.decode(bytes);
      }

      readValue(type) {
        switch (type) {
          case 0: { const val = this.view.getUint8(this.offset); this.offset += 1; return { type: 'uint8', value: val }; }
          case 1: { const val = this.view.getInt8(this.offset); this.offset += 1; return { type: 'int8', value: val }; }
          case 2: { const val = this.view.getUint16(this.offset, true); this.offset += 2; return { type: 'uint16', value: val }; }
          case 3: { const val = this.view.getInt16(this.offset, true); this.offset += 2; return { type: 'int16', value: val }; }
          case 4: return { type: 'uint32', value: this.readUint32() };
          case 5: { const val = this.view.getInt32(this.offset, true); this.offset += 4; return { type: 'int32', value: val }; }
          case 6: { const val = this.view.getFloat32(this.offset, true); this.offset += 4; return { type: 'float32', value: val }; }
          case 7: { const val = this.view.getUint8(this.offset); this.offset += 1; return { type: 'bool', value: val !== 0 }; }
          case 8: return { type: 'string', value: this.readString() };
          case 9: {
            const elemType = this.readUint32();
            const count = Number(this.readUint64());
            const arr = [];
            for (let i = 0; i < count; i++) arr.push(this.readValue(elemType));
            return { type: 'array', value: arr };
          }
          case 10: return { type: 'uint64', value: this.readUint64() };
          case 11: { const val = this.view.getBigInt64(this.offset, true); this.offset += 8; return { type: 'int64', value: val }; }
          case 12: { const val = this.view.getFloat64(this.offset, true); this.offset += 8; return { type: 'float64', value: val }; }
          default: return { type: 'unknown', value: null };
        }
      }

      parse() {
        const magic = this.readUint32();
        if (magic !== 0x46554747) throw new Error(`Invalid GGUF magic: 0x${magic.toString(16)}`);
        const version = this.readUint32();
        const tensor_count = this.readUint64();
        const kv_count = this.readUint64();
        const kv = new Map();
        for (let i = 0n; i < kv_count; i++) {
          const key = this.readString();
          const valueType = this.readUint32();
          const value = this.readValue(valueType);
          kv.set(key, value);
        }
        const tensors = [];
        for (let i = 0n; i < tensor_count; i++) {
          const name = this.readString();
          const n_dims = this.readUint32();
          const dims = [];
          for (let d = 0; d < n_dims; d++) dims.push(this.readUint64());
          const type = this.readUint32();
          const offset = this.readUint64();
          tensors.push({ name, dims, type, offset });
        }
        const alignment = 32;
        const dataOffset = Math.ceil(this.offset / alignment) * alignment;
        return { version, tensor_count, kv_count, kv, tensors, dataOffset };
      }

      f16ToF32(h) {
        const sign = (h >> 15) & 0x1;
        const exp = (h >> 10) & 0x1f;
        const mant = h & 0x3ff;
        if (exp === 0) {
          if (mant === 0) return sign ? -0 : 0;
          return (sign ? -1 : 1) * Math.pow(2, -14) * (mant / 1024);
        }
        if (exp === 31) return mant === 0 ? (sign ? -Infinity : Infinity) : NaN;
        return (sign ? -1 : 1) * Math.pow(2, exp - 15) * (1 + mant / 1024);
      }

      dequantizeQ8_0(offset, count) {
        const blockSize = 32;
        const result = new Float32Array(count);
        let resultIdx = 0;
        let blockOffset = offset;
        while (resultIdx < count) {
          const scaleBits = this.view.getUint16(blockOffset, true);
          const scale = this.f16ToF32(scaleBits);
          blockOffset += 2;
          const elemsInBlock = Math.min(blockSize, count - resultIdx);
          for (let i = 0; i < elemsInBlock; i++) {
            const q = this.view.getInt8(blockOffset + i);
            result[resultIdx++] = q * scale;
          }
          blockOffset += blockSize;
        }
        return result;
      }

      packQ8_0ForGPU(offset, totalElements) {
        const blockSize = 32;
        const numBlocks = totalElements / blockSize;
        const result = new ArrayBuffer(numBlocks * 36);
        const resultU32 = new Uint32Array(result);
        const resultF32 = new Float32Array(result);
        let srcOff = offset;
        for (let b = 0; b < numBlocks; b++) {
          const scaleBits = this.view.getUint16(srcOff, true);
          const scale = this.f16ToF32(scaleBits);
          resultF32[b * 9] = scale;
          srcOff += 2;
          for (let j = 0; j < 8; j++) {
            let packed = 0;
            for (let k = 0; k < 4; k++) {
              const val = this.view.getUint8(srcOff + j * 4 + k);
              packed |= val << (k * 8);
            }
            resultU32[b * 9 + 1 + j] = packed;
          }
          srcOff += 32;
        }
        return new Uint32Array(result);
      }

      dequantizeF16(offset, count) {
        const result = new Float32Array(count);
        for (let i = 0; i < count; i++) {
          const bits = this.view.getUint16(offset + i * 2, true);
          result[i] = this.f16ToF32(bits);
        }
        return result;
      }

      getTensorData(tensor, dataOffset) {
        const absOffset = dataOffset + Number(tensor.offset);
        const count = Number(tensor.dims.reduce((a, b) => a * b, 1n));
        if (tensor.type === 0) {
          return new Float32Array(this.buffer, absOffset, count);
        } else if (tensor.type === 1) {
          return this.dequantizeF16(absOffset, count);
        } else if (tensor.type === 8) {
          return this.dequantizeQ8_0(absOffset, count);
        }
        throw new Error(`Unsupported type: ${tensor.type}`);
      }

      getTensorDataQ8Packed(tensor, dataOffset) {
        const absOffset = dataOffset + Number(tensor.offset);
        const count = Number(tensor.dims.reduce((a, b) => a * b, 1n));
        return this.packQ8_0ForGPU(absOffset, count);
      }
    }

    // =========================================================================
    // Shaders
    // =========================================================================
    const SHADERS = {
      embeddingLookup: `
struct Params { hidden_size: u32, token_id: u32 }
@group(0) @binding(0) var<storage, read> embedding_q8: array<u32>;
@group(0) @binding(1) var<storage, read_write> output: array<f32>;
@group(0) @binding(2) var<uniform> params: Params;

@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let i = gid.x;
  if (i >= params.hidden_size) { return; }
  let blocks_per_row = params.hidden_size / 32u;
  let row_offset = params.token_id * blocks_per_row * 9u;
  let block_idx = i / 32u;
  let elem_in_block = i % 32u;
  let block_off = row_offset + block_idx * 9u;
  let scale = bitcast<f32>(embedding_q8[block_off]);
  let packed_idx = elem_in_block / 4u;
  let byte_idx = elem_in_block % 4u;
  let packed = embedding_q8[block_off + 1u + packed_idx];
  let q = f32(extractBits(bitcast<i32>(packed), byte_idx * 8u, 8u));
  output[i] = q * scale * sqrt(f32(params.hidden_size));
}`,

      rmsNorm: `

const GELU_COEF_A: f32 = 0.044715;

struct Params { num_heads: u32, head_dim: u32, eps: f32, position: u32, theta: f32, pad: u32 }
@group(0) @binding(0) var<storage, read_write> data: array<f32>;
@group(0) @binding(1) var<storage, read> weight: array<f32>;
@group(0) @binding(2) var<uniform> params: Params;
var<workgroup> shared_sum: array<f32, 256>;

@compute @workgroup_size(256)
fn main(@builtin(local_invocation_id) lid: vec3<u32>,
        @builtin(workgroup_id) wid: vec3<u32>) {
  let head = wid.x;
  if (head >= params.num_heads) { return; }
  let tid = lid.x;
  let base = head * params.head_dim;
  var partial: f32 = 0.0;
  var i = tid;
  while (i < params.head_dim) {
    let val = data[base + i];
    partial += val * val;
    i += 256u;
  }
  shared_sum[tid] = partial;
  workgroupBarrier();
  for (var stride: u32 = 128u; stride > 0u; stride >>= 1u) {
    if (tid < stride) { shared_sum[tid] += shared_sum[tid + stride]; }
    workgroupBarrier();
  }
  let rms = sqrt(shared_sum[0] / f32(params.head_dim) + params.eps);
  i = tid;
  while (i < params.head_dim) {
    data[base + i] = data[base + i] * weight[i] / rms;
    i += 256u;
  }
  workgroupBarrier();
  let half_dim = params.head_dim / 2u;
  i = tid;
  while (i < half_dim) {
    let freq = 1.0 / pow(params.theta, f32(i * 2u) / f32(params.head_dim));
    let angle = f32(params.position) * freq;
    let cos_a = cos(angle);
    let sin_a = sin(angle);
    let x0 = data[base + i];
    let x1 = data[base + i + half_dim];
    data[base + i] = x0 * cos_a - x1 * sin_a;
    data[base + i + half_dim] = x0 * sin_a + x1 * cos_a;
    i += 256u;
  }
}`,
    };

    // =========================================================================
    // Global state
    // =========================================================================
    let device = null; window._d = () => device;
    let pipelines = {};
    let modelBuffers = null; window._mb = () => modelBuffers;
    let workBuffers = null; window._wb = () => workBuffers;
    let uniformBuffers = null;
    let kvCaches = null;
    let gguf = null;
    let parser = null;

    let vocab = [];
    let vocabByLength = [];

    let weightMemoryQ8 = 0;
    let weightMemoryF32Equiv = 0;

    async function initWebGPU() {
      if (device) return device;
      if (!navigator.gpu) throw new Error('WebGPU not supported');
      const adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
      device = await adapter.requestDevice({
        requiredLimits: {
          maxStorageBufferBindingSize: adapter.limits.maxStorageBufferBindingSize,
          maxBufferSize: adapter.limits.maxBufferSize,
        },
      });
      log(`WebGPU device initialized`);
      log(`Max storage buffer: ${(device.limits.maxStorageBufferBindingSize / 1e9).toFixed(2)} GB`);
      return device;
    }

    function createPipelines() {
      pipelines = {};
      for (const [name, code] of Object.entries(SHADERS)) {
        const module = device.createShaderModule({ code });
        pipelines[name] = device.createComputePipeline({
          layout: 'auto',
          compute: { module, entryPoint: 'main' },
        });
      }
      log(`Created ${Object.keys(pipelines).length} compute pipelines`);
    }

    // =========================================================================
    // Pre-create ALL uniform buffers at load time
    // =========================================================================
    function createUniformBuffers() {
      const H = CONFIG.hidden_size;
      const Q = CONFIG.q_dim;
      const KV = CONFIG.kv_dim;
      const I = CONFIG.intermediate_size;
      const MAX_SEQ = CONFIG.context_length;
      const V = CONFIG.vocab_size;
      const HD = CONFIG.head_dim;
      const NQH = CONFIG.num_q_heads;
      const NKH = CONFIG.num_kv_heads;

      const makeUniformMixed = (values) => {
        const size = Math.max(values.length * 4, 16);
        const ab = new ArrayBuffer(size);
        const u32 = new Uint32Array(ab);
        const f32 = new Float32Array(ab);
        for (let i = 0; i < values.length; i++) {
          if ('u' in values[i]) u32[i] = values[i].u;
          else f32[i] = values[i].f;
        }
        const buf = device.createBuffer({
          size,
          usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
          mappedAtCreation: true,
        });
        new Uint8Array(buf.getMappedRange()).set(new Uint8Array(ab));
        buf.unmap();
        return buf;
      };

      uniformBuffers = {
        rmsNorm: makeUniformMixed([{u: H}, {f: CONFIG.rms_norm_eps}]),
        perHeadRmsNormQ: makeUniformMixed([{u: NQH}, {u: HD}, {f: CONFIG.rms_norm_eps}, {u: 0}]),
        perHeadRmsNormK: makeUniformMixed([{u: NKH}, {u: HD}, {f: CONFIG.rms_norm_eps}, {u: 0}]),
        linearQ8_Q_H: makeUniformMixed([{u: Q}, {u: H}]),
        linearQ8_KV_H: makeUniformMixed([{u: KV}, {u: H}]),
        linearQ8_H_Q: makeUniformMixed([{u: H}, {u: Q}]),
        linearQ8_I_H: makeUniformMixed([{u: I}, {u: H}]),
        linearQ8_H_I: makeUniformMixed([{u: H}, {u: I}]),
        sizeH: makeUniformMixed([{u: H}]),
        sizeI: makeUniformMixed([{u: I}]),
        embeddingLookup: makeUniformMixed([{u: H}, {u: 0}]),
        ropeQ: [],
        ropeK: [],
        kvCacheStore: makeUniformMixed([{u: NKH}, {u: HD}, {u: 0}, {u: MAX_SEQ}]),
        attnScore: makeUniformMixed([
          {u: NQH}, {u: NKH}, {u: HD},
          {u: 0}, {f: 1.0 / Math.sqrt(HD)}, {u: 0}
        ]),
        softmax: makeUniformMixed([{u: NQH}, {u: 0}]),
        attnOutput: makeUniformMixed([{u: NQH}, {u: NKH}, {u: HD}, {u: 0}]),
        lmHead: makeUniformMixed([{u: V}, {u: H}]),
        linearQ8_V_H: makeUniformMixed([{u: V}, {u: H}]),
        argmaxSize: makeUniformMixed([{u: V}]),
      };

      uniformBuffers.fusedNormRopeQ = [];
      uniformBuffers.fusedNormRopeK = [];
      for (let il = 0; il < CONFIG.num_layers; il++) {
        const theta = getRopeTheta(il);
        uniformBuffers.ropeQ.push(makeUniformMixed([{u: NQH}, {u: HD}, {u: 0}, {f: theta}]));
        uniformBuffers.ropeK.push(makeUniformMixed([{u: NKH}, {u: HD}, {u: 0}, {f: theta}]));
        uniformBuffers.fusedNormRopeQ.push(makeUniformMixed([{u: NQH}, {u: HD}, {f: CONFIG.rms_norm_eps}, {u: 0}, {f: theta}, {u: 0}]));
        uniformBuffers.fusedNormRopeK.push(makeUniformMixed([{u: NKH}, {u: HD}, {f: CONFIG.rms_norm_eps}, {u: 0}, {f: theta}, {u: 0}]));
      }
      log(`Created uniform buffers`);
    }

    // =========================================================================
    // Tokenizer
    // =========================================================================
    function extractTokenizer() {
      const tokensKV = gguf.kv.get('tokenizer.ggml.tokens');
      if (tokensKV && tokensKV.type === 'array') {
        vocab = tokensKV.value.map(v => v.value);
        log(`Extracted vocabulary: ${vocab.length} tokens`);
      } else {
        log('WARNING: No tokenizer found in GGUF metadata', 'error');
        return;
      }
      vocabByLength = [];
      for (let i = 0; i < vocab.length; i++) {
        if (vocab[i] && vocab[i].length > 0) {
          vocabByLength.push([i, vocab[i]]);
        }
      }
      buildTokenIndex();
    }

    let tokenByText = new Map();
    let maxTokenLen = 0;

    function buildTokenIndex() {
      tokenByText = new Map();
      maxTokenLen = 0;
      for (let i = 0; i < vocab.length; i++) {
        const token = vocab[i];
        if (token && token.length > 0) {
          if (!tokenByText.has(token)) {
            tokenByText.set(token, i);
          }
          if (token.length > maxTokenLen) {
            maxTokenLen = token.length;
          }
        }
      }
      log(`Token index: ${tokenByText.size} unique entries, max length ${maxTokenLen}`);
    }

    const SPECIAL_TOKENS = {
      '<start_of_turn>': 105,
      '<end_of_turn>': 106,
      '<eos>': 1,
      '<bos>': 2,
    };

    const FUNC_TOKENS = {};
    const FUNC_TOKEN_NAMES = [
      '<start_function_declaration>', '<end_function_declaration>',
      '<start_function_call>', '<end_function_call>',
      '<start_function_response>', '<end_function_response>',
      '<escape>',
    ];

    function initFunctionTokens() {
      for (const name of FUNC_TOKEN_NAMES) {
        const id = tokenByText.get(name);
        if (id !== undefined) {
          FUNC_TOKENS[name] = id;
          SPECIAL_TOKENS[name] = id;
          log(`Function token: ${name} -> ${id}`);
        }
      }
      rebuildSpecialPattern();
    }

    let specialPatternStr = '<start_of_turn>|<end_of_turn>|<eos>|<bos>';
    let specialPatternRegex = new RegExp(specialPatternStr.replace(/[<>]/g, c => '\\' + c), 'g');

    function rebuildSpecialPattern() {
      const allTokenNames = Object.keys(SPECIAL_TOKENS);
      allTokenNames.sort((a, b) => b.length - a.length);
      specialPatternStr = allTokenNames.map(t => t.replace(/[<>]/g, c => '\\' + c)).join('|');
      specialPatternRegex = new RegExp(specialPatternStr, 'g');
    }

    function buildFunctionPrompt(userQuery, toolsJson) {
      let tools;
      try {
        tools = JSON.parse(toolsJson);
        if (!Array.isArray(tools) || tools.length === 0) {
          return `<start_of_turn>user\n${userQuery}<end_of_turn>\n<start_of_turn>model\n`;
        }
      } catch (e) {
        // No valid tools — use plain chat prompt
        return `<start_of_turn>user\n${userQuery}<end_of_turn>\n<start_of_turn>model\n`;
      }
      let declarations = '';
      for (const tool of tools) {
        declarations += `<start_function_declaration>declaration:${tool.name}{`;
        declarations += `description:<escape>${tool.description}<escape>`;
        if (tool.parameters) {
          declarations += `,parameters:{properties:{`;
          const props = Object.entries(tool.parameters.properties || {});
          declarations += props.map(([k, v]) => {
            let param = `${k}:{description:<escape>${v.description}<escape>,type:<escape>${v.type}<escape>`;
            if (v.enum) {
              param += `,enum:[${v.enum.map(e => `<escape>${e}<escape>`).join(',')}]`;
            }
            param += '}';
            return param;
          }).join(',');
          declarations += `}`;
          if (tool.parameters.required) {
            declarations += `,required:[${tool.parameters.required.map(r => `<escape>${r}<escape>`).join(',')}]`;
          }
          declarations += `,type:<escape>${tool.parameters.type}<escape>`;
          declarations += `}`;
        }
        declarations += `}<end_function_declaration>`;
      }
      return `<start_of_turn>developer\nYou are a model that can do function calling with the following functions\n${declarations}\n<end_of_turn>\n<start_of_turn>user\n${userQuery}<end_of_turn>\n<start_of_turn>model\n`;
    }

    function encodeSegment(text, addPrefix = true) {
      const tokens = [];
      let remaining = text.replace(/ /g, '\u2581');
      if (addPrefix) {
        remaining = '\u2581' + remaining;
      }
      while (remaining.length > 0) {
        let bestLen = 0;
        let bestId = -1;
        const tryLen = Math.min(remaining.length, maxTokenLen);
        for (let len = tryLen; len >= 1; len--) {
          const candidate = remaining.substring(0, len);
          const id = tokenByText.get(candidate);
          if (id !== undefined) {
            bestLen = len;
            bestId = id;
            break;
          }
        }
        if (bestLen === 0) {
          remaining = remaining.slice(1);
        } else {
          tokens.push(bestId);
          remaining = remaining.slice(bestLen);
        }
      }
      return tokens;
    }

    function encodeSimple(text) {
      const tokens = [2];
      const specialPattern = new RegExp(specialPatternRegex.source, 'g');
      let lastIdx = 0;
      let match;
      let afterSpecial = false;
      while ((match = specialPattern.exec(text)) !== null) {
        const before = text.slice(lastIdx, match.index);
        if (before.length > 0) {
          tokens.push(...encodeSegment(before, !afterSpecial));
        }
        tokens.push(SPECIAL_TOKENS[match[0]]);
        lastIdx = match.index + match[0].length;
        afterSpecial = true;
      }
      const remaining = text.slice(lastIdx);
      if (remaining.length > 0) {
        tokens.push(...encodeSegment(remaining, !afterSpecial));
      }
      return tokens;
    }

    function decodeToken(tokenId) {
      if (tokenId < vocab.length && vocab[tokenId]) {
        return vocab[tokenId].replace(/\u2581/g, ' ');
      }
      return `<unk:${tokenId}>`;
    }

    function decodeTokens(tokenIds) {
      let text = '';
      for (const id of tokenIds) {
        text += decodeToken(id);
      }
      return text;
    }

    // =========================================================================
    // Upload weights
    // =========================================================================
    function uploadWeightsToGPU() {
      const tensors = gguf.tensors;
      const dataOffset = gguf.dataOffset;

      modelBuffers = {
        embeddingQ8: null,
        layers: [],
        finalNorm: null,
      };

      const embedTensor = tensors.find(t => t.name === 'token_embd.weight');
      if (embedTensor) {
        const H = CONFIG.hidden_size;
        const V = CONFIG.vocab_size;
        if (embedTensor.type === 8) {
          const packedEmbedding = parser.getTensorDataQ8Packed(embedTensor, dataOffset);
          modelBuffers.embeddingQ8 = device.createBuffer({
            size: packedEmbedding.byteLength,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
          });
          device.queue.writeBuffer(modelBuffers.embeddingQ8, 0, packedEmbedding);
          log(`Loaded Q8_0 packed embedding: ${(packedEmbedding.byteLength / 1e6).toFixed(1)}MB`);
        } else {
          const rawData = parser.getTensorData(embedTensor, dataOffset);
          modelBuffers.embeddingQ8 = device.createBuffer({
            size: rawData.byteLength,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
          });
          device.queue.writeBuffer(modelBuffers.embeddingQ8, 0, rawData);
        }
      }

      const finalNormTensor = tensors.find(t => t.name === 'output_norm.weight');
      if (finalNormTensor) {
        const data = parser.getTensorData(finalNormTensor, dataOffset);
        modelBuffers.finalNorm = device.createBuffer({
          size: data.byteLength,
          usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
        });
        device.queue.writeBuffer(modelBuffers.finalNorm, 0, data);
      }

      const q8WeightNames = ['attn_q', 'attn_k', 'attn_v', 'attn_output', 'ffn_gate', 'ffn_up', 'ffn_down'];
      const f32WeightNames = ['attn_norm', 'ffn_norm', 'attn_q_norm', 'attn_k_norm', 'post_attention_norm', 'post_ffw_norm'];

      for (let i = 0; i < CONFIG.num_layers; i++) {
        const prefix = `blk.${i}.`;
        const layer = {};
        for (const key of f32WeightNames) {
          const tensor = tensors.find(t => t.name === prefix + key + '.weight');
          if (tensor) {
            const data = parser.getTensorData(tensor, dataOffset);
            layer[key] = device.createBuffer({
              size: data.byteLength,
              usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
            });
            device.queue.writeBuffer(layer[key], 0, data);
          }
        }
        for (const key of q8WeightNames) {
          const tensor = tensors.find(t => t.name === prefix + key + '.weight');
          if (tensor) {
            const data = parser.getTensorDataQ8Packed(tensor, dataOffset);
            layer[key] = device.createBuffer({
              size: data.byteLength,
              usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
            });
            device.queue.writeBuffer(layer[key], 0, data);
            if (i === 0) {
              weightMemoryQ8 += data.byteLength;
              const numElements = Number(tensor.dims.reduce((a, b) => a * b, 1n));
              weightMemoryF32Equiv += numElements * 4;
            }
          }
        }
        modelBuffers.layers.push(layer);
      }
      log(`Loaded ${CONFIG.num_layers} transformer layers`);
    }

    // =========================================================================
    // Create work buffers and KV caches
    // =========================================================================
    function createWorkBuffers() {
      const H = CONFIG.hidden_size;
      const Q = CONFIG.q_dim;
      const KV = CONFIG.kv_dim;
      const I = CONFIG.intermediate_size;
      const MAX_SEQ = CONFIG.context_length;
      const V = CONFIG.vocab_size;
      const HD = CONFIG.head_dim;
      const NQH = CONFIG.num_q_heads;
      const NKH = CONFIG.num_kv_heads;

      const S = GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC;
      const SD = S | GPUBufferUsage.COPY_DST;
      workBuffers = {
        hidden: device.createBuffer({ size: H * 4, usage: SD }),
        hiddenReadback: device.createBuffer({ size: H * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST }),
        residual: device.createBuffer({ size: H * 4, usage: S }),
        normed: device.createBuffer({ size: H * 4, usage: S }),
        q: device.createBuffer({ size: Q * 4, usage: S }),
        k: device.createBuffer({ size: KV * 4, usage: S }),
        v: device.createBuffer({ size: KV * 4, usage: S }),
        attnOut: device.createBuffer({ size: Q * 4, usage: S }),
        attnProj: device.createBuffer({ size: H * 4, usage: S }),
        postAttnNormed: device.createBuffer({ size: H * 4, usage: S }),
        attnScores: device.createBuffer({ size: NQH * MAX_SEQ * 4, usage: S }),
        ffnGate: device.createBuffer({ size: I * 4, usage: S }),
        ffnUp: device.createBuffer({ size: I * 4, usage: S }),
        ffnMul: device.createBuffer({ size: I * 4, usage: S }),
        ffnDown: device.createBuffer({ size: H * 4, usage: S }),
        postFfnNormed: device.createBuffer({ size: H * 4, usage: S }),
        logits: device.createBuffer({ size: V * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC }),
        logitsReadback: device.createBuffer({ size: V * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST }),
        argmaxResult: device.createBuffer({ size: 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC }),
        argmaxReadback: device.createBuffer({ size: 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST }),
        topk256Result: device.createBuffer({ size: 256 * 2 * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC }),
        topk256Readback: device.createBuffer({ size: 256 * 2 * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST }),
      };

      const kvSize = MAX_SEQ * NKH * HD * 4;
      kvCaches = [];
      for (let i = 0; i < CONFIG.num_layers; i++) {
        kvCaches.push({
          k: device.createBuffer({ size: kvSize, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC }),
          v: device.createBuffer({ size: kvSize, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC }),
        });
      }
      log(`Created work buffers and ${CONFIG.num_layers} KV caches`);
    }

    // =========================================================================
    // Bind groups
    // =========================================================================
    let bindGroupCache = null;

    function createBindGroups() {
      bindGroupCache = { layers: [] };

      bindGroupCache.embeddingLookup = device.createBindGroup({
        layout: pipelines.embeddingLookup.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: modelBuffers.embeddingQ8 } },
          { binding: 1, resource: { buffer: workBuffers.hidden } },
          { binding: 2, resource: { buffer: uniformBuffers.embeddingLookup } },
        ],
      });

      bindGroupCache.finalNorm = device.createBindGroup({
        layout: pipelines.rmsNorm.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: workBuffers.hidden } },
          { binding: 1, resource: { buffer: modelBuffers.finalNorm } },
          { binding: 2, resource: { buffer: workBuffers.normed } },
          { binding: 3, resource: { buffer: uniformBuffers.rmsNorm } },
        ],
      });

      bindGroupCache.lmHead = device.createBindGroup({
        layout: pipelines.linearQ8.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: workBuffers.normed } },
          { binding: 1, resource: { buffer: modelBuffers.embeddingQ8 } },
          { binding: 2, resource: { buffer: workBuffers.logits } },
          { binding: 3, resource: { buffer: uniformBuffers.linearQ8_V_H } },
        ],
      });

      bindGroupCache.argmax = device.createBindGroup({
        layout: pipelines.argmax.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: workBuffers.logits } },
          { binding: 1, resource: { buffer: workBuffers.argmaxResult } },
          { binding: 2, resource: { buffer: uniformBuffers.argmaxSize } },
        ],
      });

      bindGroupCache.topk256 = device.createBindGroup({
        layout: pipelines.topk256.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: workBuffers.logits } },
          { binding: 1, resource: { buffer: workBuffers.topk256Result } },
          { binding: 2, resource: { buffer: uniformBuffers.argmaxSize } },
        ],
      });

      for (let i = 0; i < CONFIG.num_layers; i++) {
        const layer = modelBuffers.layers[i];
        const kv = kvCaches[i];
        const lb = {};

        lb.attnNorm = device.createBindGroup({
          layout: pipelines.rmsNorm.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.hidden } },
            { binding: 1, resource: { buffer: layer.attn_norm } },
            { binding: 2, resource: { buffer: workBuffers.normed } },
            { binding: 3, resource: { buffer: uniformBuffers.rmsNorm } },
          ],
        });
        lb.linearQ = device.createBindGroup({
          layout: pipelines.linearQ8.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.normed } },
            { binding: 1, resource: { buffer: layer.attn_q } },
            { binding: 2, resource: { buffer: workBuffers.q } },
            { binding: 3, resource: { buffer: uniformBuffers.linearQ8_Q_H } },
          ],
        });
        lb.linearK = device.createBindGroup({
          layout: pipelines.linearQ8.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.normed } },
            { binding: 1, resource: { buffer: layer.attn_k } },
            { binding: 2, resource: { buffer: workBuffers.k } },
            { binding: 3, resource: { buffer: uniformBuffers.linearQ8_KV_H } },
          ],
        });
        lb.linearV = device.createBindGroup({
          layout: pipelines.linearQ8.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.normed } },
            { binding: 1, resource: { buffer: layer.attn_v } },
            { binding: 2, resource: { buffer: workBuffers.v } },
            { binding: 3, resource: { buffer: uniformBuffers.linearQ8_KV_H } },
          ],
        });
        lb.ropeQ = device.createBindGroup({
          layout: pipelines.rope.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.q } },
            { binding: 1, resource: { buffer: uniformBuffers.ropeQ[i] } },
          ],
        });
        lb.ropeK = device.createBindGroup({
          layout: pipelines.rope.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.k } },
            { binding: 1, resource: { buffer: uniformBuffers.ropeK[i] } },
          ],
        });
        lb.qNorm = device.createBindGroup({
          layout: pipelines.perHeadRmsNorm.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: workBuffers.q } },
            { binding: 1, resource: { buffer: layer.attn_q_norm } },
            { binding: 2, resource: { buffer: uniformBuffers.perHeadRmsNormQ } },
          ],

    // =========================================================================
    // Forward pass (optimized fast path)
    // =========================================================================
    async function forwardPassAndGetToken(tokenId, position, temperature = 0, topP = 0.9, repPenalty = 1.0, generatedTokens = null) {
      const H = CONFIG.hidden_size;
      const Q = CONFIG.q_dim;
      const KV = CONFIG.kv_dim;
      const I = CONFIG.intermediate_size;
      const HD = CONFIG.head_dim;
      const NQH = CONFIG.num_q_heads;
      const NKH = CONFIG.num_kv_heads;
      const V = CONFIG.vocab_size;
      const seqLen = position + 1;

      device.queue.writeBuffer(uniformBuffers.embeddingLookup, 4, new Uint32Array([tokenId]));
      const posU32 = new Uint32Array([position]);
      for (let il = 0; il < CONFIG.num_layers; il++) {
        device.queue.writeBuffer(uniformBuffers.fusedNormRopeQ[il], 12, posU32);
        device.queue.writeBuffer(uniformBuffers.fusedNormRopeK[il], 12, posU32);
      }
      device.queue.writeBuffer(uniformBuffers.kvCacheStore, 8, posU32);
      const seqU32 = new Uint32Array([seqLen]);
      device.queue.writeBuffer(uniformBuffers.attnScore, 12, seqU32);
      device.queue.writeBuffer(uniformBuffers.softmax, 4, seqU32);
      device.queue.writeBuffer(uniformBuffers.attnOutput, 12, seqU32);

      const encoder = device.createCommandEncoder();
      let pass;

      pass = encoder.beginComputePass();
      pass.setPipeline(pipelines.embeddingLookup);
      pass.setBindGroup(0, bindGroupCache.embeddingLookup);
      pass.dispatchWorkgroups(Math.ceil(H / 256));
      pass.end();

      for (let layerIdx = 0; layerIdx < CONFIG.num_layers; layerIdx++) {
        const lb = bindGroupCache.layers[layerIdx];
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.attnNorm); pass.dispatchWorkgroups(1); pass.end();
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.linearQ); pass.dispatchWorkgroups(Math.ceil(Q / 256));
        pass.setBindGroup(0, lb.linearK); pass.dispatchWorkgroups(Math.ceil(KV / 256));
        pass.setBindGroup(0, lb.linearV); pass.dispatchWorkgroups(Math.ceil(KV / 256));
        pass.end();
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.fusedPerHeadNormRope);
        pass.setBindGroup(0, lb.fusedNormRopeQ); pass.dispatchWorkgroups(NQH);
        pass.setBindGroup(0, lb.fusedNormRopeK); pass.dispatchWorkgroups(NKH);
        pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.kvCacheStore); pass.setBindGroup(0, lb.kvStore); pass.dispatchWorkgroups(Math.ceil(KV / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.attnScore); pass.setBindGroup(0, lb.attnScore); pass.dispatchWorkgroups(Math.ceil((NQH * seqLen) / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.softmax); pass.setBindGroup(0, lb.softmax); pass.dispatchWorkgroups(NQH); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.attnOutput); pass.setBindGroup(0, lb.attnOutput); pass.dispatchWorkgroups(Math.ceil((NQH * HD) / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.linearAttnOut); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.fusedNormAdd); pass.setBindGroup(0, lb.fusedPostAttnNormAdd); pass.dispatchWorkgroups(1); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.ffnNorm); pass.dispatchWorkgroups(1); pass.end();
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.ffnGate); pass.dispatchWorkgroups(Math.ceil(I / 256));
        pass.setBindGroup(0, lb.ffnUp); pass.dispatchWorkgroups(Math.ceil(I / 256));
        pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.siluMul); pass.setBindGroup(0, lb.siluMul); pass.dispatchWorkgroups(Math.ceil(I / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.ffnDown); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.fusedNormAdd); pass.setBindGroup(0, lb.fusedPostFfnNormAdd); pass.dispatchWorkgroups(1); pass.end();
      }

      pass = encoder.beginComputePass();
      pass.setPipeline(pipelines.rmsNorm);
      pass.setBindGroup(0, bindGroupCache.finalNorm);
      pass.dispatchWorkgroups(1);
      pass.end();

      pass = encoder.beginComputePass();
      pass.setPipeline(pipelines.linearQ8);
      pass.setBindGroup(0, bindGroupCache.lmHead);
      pass.dispatchWorkgroups(Math.ceil(V / 256));
      pass.end();

      const useGreedyFast = (temperature === 0 && repPenalty <= 1.0);
      if (useGreedyFast) {
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.argmax);
        pass.setBindGroup(0, bindGroupCache.argmax);
        pass.dispatchWorkgroups(1);
        pass.end();
        encoder.copyBufferToBuffer(workBuffers.argmaxResult, 0, workBuffers.argmaxReadback, 0, 4);
      } else {
        pass = encoder.beginComputePass();
        pass.setPipeline(pipelines.topk256);
        pass.setBindGroup(0, bindGroupCache.topk256);
        pass.dispatchWorkgroups(1);
        pass.end();
        encoder.copyBufferToBuffer(workBuffers.topk256Result, 0, workBuffers.topk256Readback, 0, 256 * 2 * 4);
      }

      device.queue.submit([encoder.finish()]);

      if (useGreedyFast) {
        await workBuffers.argmaxReadback.mapAsync(GPUMapMode.READ);
        const resultArray = new Uint32Array(workBuffers.argmaxReadback.getMappedRange());
        const tokenResult = resultArray[0];
        workBuffers.argmaxReadback.unmap();
        return tokenResult;
      }

      await workBuffers.topk256Readback.mapAsync(GPUMapMode.READ);
      const topkData = new Float32Array(workBuffers.topk256Readback.getMappedRange().slice(0));
      workBuffers.topk256Readback.unmap();

      const candidates = new Array(256);
      const topkU32 = new Uint32Array(topkData.buffer.slice(0));
      for (let i = 0; i < 256; i++) {
        candidates[i] = { val: topkData[i * 2], id: topkU32[i * 2 + 1] };
      }

      if (repPenalty > 1.0 && generatedTokens && generatedTokens.length > 0) {
        const seen = new Set(generatedTokens);
        for (let i = 0; i < 256; i++) {
          if (seen.has(candidates[i].id)) {
            if (candidates[i].val > 0) candidates[i].val /= repPenalty;
            else candidates[i].val *= repPenalty;
          }
        }
      }

      candidates.sort((a, b) => b.val - a.val);
      if (temperature === 0) return candidates[0].id;

      const maxLogit = candidates[0].val;
      let sumExp = 0;
      const probs = new Float32Array(256);
      for (let i = 0; i < 256; i++) {
        probs[i] = Math.exp((candidates[i].val - maxLogit) / temperature);
        sumExp += probs[i];
      }

      let cumProb = 0, cutoff = 256;
      for (let i = 0; i < 256; i++) {
        cumProb += probs[i] / sumExp;
        if (cumProb >= topP) { cutoff = i + 1; break; }
      }
      let subsetSum = 0;
      for (let i = 0; i < cutoff; i++) subsetSum += probs[i];
      let r = Math.random() * subsetSum;
      for (let i = 0; i < cutoff; i++) {
        r -= probs[i];
        if (r <= 0) return candidates[i].id;
      }
      return candidates[cutoff - 1].id;
    }

    // Prefill-only path (no LM head)
    async function forwardPassOnly(tokenId, position) {
      const H = CONFIG.hidden_size;
      const Q = CONFIG.q_dim;
      const KV = CONFIG.kv_dim;
      const I = CONFIG.intermediate_size;
      const HD = CONFIG.head_dim;
      const NQH = CONFIG.num_q_heads;
      const NKH = CONFIG.num_kv_heads;
      const seqLen = position + 1;

      device.queue.writeBuffer(uniformBuffers.embeddingLookup, 4, new Uint32Array([tokenId]));
      const posU32 = new Uint32Array([position]);
      for (let il = 0; il < CONFIG.num_layers; il++) {
        device.queue.writeBuffer(uniformBuffers.fusedNormRopeQ[il], 12, posU32);
        device.queue.writeBuffer(uniformBuffers.fusedNormRopeK[il], 12, posU32);
      }
      device.queue.writeBuffer(uniformBuffers.kvCacheStore, 8, posU32);
      const seqU32 = new Uint32Array([seqLen]);
      device.queue.writeBuffer(uniformBuffers.attnScore, 12, seqU32);
      device.queue.writeBuffer(uniformBuffers.softmax, 4, seqU32);
      device.queue.writeBuffer(uniformBuffers.attnOutput, 12, seqU32);

      const encoder = device.createCommandEncoder();
      let pass;

      pass = encoder.beginComputePass();
      pass.setPipeline(pipelines.embeddingLookup);
      pass.setBindGroup(0, bindGroupCache.embeddingLookup);
      pass.dispatchWorkgroups(Math.ceil(H / 256));
      pass.end();

      for (let layerIdx = 0; layerIdx < CONFIG.num_layers; layerIdx++) {
        const lb = bindGroupCache.layers[layerIdx];
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.attnNorm); pass.dispatchWorkgroups(1); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.linearQ); pass.dispatchWorkgroups(Math.ceil(Q / 256));
        pass.setBindGroup(0, lb.linearK); pass.dispatchWorkgroups(Math.ceil(KV / 256));
        pass.setBindGroup(0, lb.linearV); pass.dispatchWorkgroups(Math.ceil(KV / 256));
        pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.fusedPerHeadNormRope);
        pass.setBindGroup(0, lb.fusedNormRopeQ); pass.dispatchWorkgroups(NQH);
        pass.setBindGroup(0, lb.fusedNormRopeK); pass.dispatchWorkgroups(NKH);
        pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.kvCacheStore); pass.setBindGroup(0, lb.kvStore); pass.dispatchWorkgroups(Math.ceil(KV / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.attnScore); pass.setBindGroup(0, lb.attnScore); pass.dispatchWorkgroups(Math.ceil((NQH * seqLen) / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.softmax); pass.setBindGroup(0, lb.softmax); pass.dispatchWorkgroups(NQH); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.attnOutput); pass.setBindGroup(0, lb.attnOutput); pass.dispatchWorkgroups(Math.ceil((NQH * HD) / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.linearAttnOut); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.fusedNormAdd); pass.setBindGroup(0, lb.fusedPostAttnNormAdd); pass.dispatchWorkgroups(1); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.rmsNorm); pass.setBindGroup(0, lb.ffnNorm); pass.dispatchWorkgroups(1); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.linearQ8);
        pass.setBindGroup(0, lb.ffnGate); pass.dispatchWorkgroups(Math.ceil(I / 256));
        pass.setBindGroup(0, lb.ffnUp); pass.dispatchWorkgroups(Math.ceil(I / 256));
        pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.siluMul); pass.setBindGroup(0, lb.siluMul); pass.dispatchWorkgroups(Math.ceil(I / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.linearQ8); pass.setBindGroup(0, lb.ffnDown); pass.dispatchWorkgroups(Math.ceil(H / 256)); pass.end();
        pass = encoder.beginComputePass(); pass.setPipeline(pipelines.fusedNormAdd); pass.setBindGroup(0, lb.fusedPostFfnNormAdd); pass.dispatchWorkgroups(1); pass.end();
      }

      pass = encoder.beginComputePass();
      pass.setPipeline(pipelines.rmsNorm);
      pass.setBindGroup(0, bindGroupCache.finalNorm);
      pass.dispatchWorkgroups(1);
      pass.end();

      device.queue.submit([encoder.finish()]);
    }

    async function prefillBatched(tokens) {
      for (let i = 0; i < tokens.length; i++) {
        forwardPassOnly(tokens[i], i);
      }
      await device.queue.onSubmittedWorkDone();
    }

    function resetKVCaches() {
      const HD = CONFIG.head_dim;
      const NKH = CONFIG.num_kv_heads;
      const MAX_SEQ = CONFIG.context_length;
      const zeros = new Float32Array(MAX_SEQ * NKH * HD);
      for (let i = 0; i < CONFIG.num_layers; i++) {
        device.queue.writeBuffer(kvCaches[i].k, 0, zeros);
        device.queue.writeBuffer(kvCaches[i].v, 0, zeros);
      }
    }

    // =========================================================================
    // Chat UI + Generation
    // =========================================================================
    let generating = false;

    function formatFunctionCallOutput(text) {
      const callMatch = text.match(/call:(\w+)\{(.*)\}/s);
      if (callMatch) {
        const funcName = callMatch[1];
        const paramsRaw = callMatch[2];
        const paramsClean = paramsRaw.replace(/<escape>/g, '"');
        return `<div class="fn-card"><div class="fn-card-header">Function Call</div><div class="fn-card-name">${escapeHtml(funcName)}</div><div class="fn-card-params">${escapeHtml(paramsClean)}</div></div>`;
      }
      return escapeHtml(text);
    }

    function scrollToBottom() {
      const chat = document.getElementById('chat-area');
      chat.scrollTop = chat.scrollHeight;
    }

    function addUserMessage(text) {
      const welcome = document.querySelector('.welcome');
      if (welcome) welcome.remove();

      const chat = document.getElementById('chat-area');
      const msg = document.createElement('div');
      msg.className = 'message message-user';
      msg.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
      chat.appendChild(msg);
      scrollToBottom();
    }

    function addAIMessage() {
      const chat = document.getElementById('chat-area');
      const msg = document.createElement('div');
      msg.className = 'message message-ai';
      msg.innerHTML = `<div class="message-content"><span class="ai-text"></span><span class="cursor"></span></div><div class="message-meta"></div>`;
      chat.appendChild(msg);
      scrollToBottom();
      return msg;
    }

    async function sendMessage() {
      const input = document.getElementById('prompt-input');
      const prompt = input.value.trim();
      if (!prompt || generating) return;

      input.value = '';
      input.style.height = 'auto';

      addUserMessage(prompt);

      const aiMsg = addAIMessage();
      const textSpan = aiMsg.querySelector('.ai-text');
      const cursorSpan = aiMsg.querySelector('.cursor');
      const metaDiv = aiMsg.querySelector('.message-meta');
      const speedEl = document.getElementById('speed-indicator');

      generating = true;
      document.getElementById('send-btn').disabled = true;

      try {
        const toolsJson = document.getElementById('tools-input').value;
        const chatPrompt = buildFunctionPrompt(prompt, toolsJson);
        const inputTokens = encodeSimple(chatPrompt);
        const maxTokens = parseInt(document.getElementById('max-tokens').value) || 2048;
        const temperature = parseFloat(document.getElementById('temperature').value) || 0;
        const topP = parseFloat(document.getElementById('top-p').value) || 0.9;
        const repPenalty = parseFloat(document.getElementById('rep-penalty').value) || 1.0;

        resetKVCaches();

        // Prefill
        speedEl.textContent = 'prefilling...';
        speedEl.classList.add('visible');
        const prefillStart = performance.now();
        await prefillBatched(inputTokens);
        const prefillTime = performance.now() - prefillStart;
        const prefillSpeed = (inputTokens.length / prefillTime * 1000).toFixed(0);

        // First token via LM head on prefill state
        const allTokens = [...inputTokens];
        const genStart = performance.now();
        let nextToken;
        {
          const V = CONFIG.vocab_size;
          const encoder = device.createCommandEncoder();
          let pass;
          pass = encoder.beginComputePass();
          pass.setPipeline(pipelines.linearQ8);
          pass.setBindGroup(0, bindGroupCache.lmHead);
          pass.dispatchWorkgroups(Math.ceil(V / 256));
          pass.end();

          const useGreedyFast = (temperature === 0 && repPenalty <= 1.0);
          if (useGreedyFast) {
            pass = encoder.beginComputePass();
            pass.setPipeline(pipelines.argmax);
            pass.setBindGroup(0, bindGroupCache.argmax);
            pass.dispatchWorkgroups(1);
            pass.end();
            encoder.copyBufferToBuffer(workBuffers.argmaxResult, 0, workBuffers.argmaxReadback, 0, 4);
            device.queue.submit([encoder.finish()]);
            await workBuffers.argmaxReadback.mapAsync(GPUMapMode.READ);
            const r = new Uint32Array(workBuffers.argmaxReadback.getMappedRange());
            nextToken = r[0];
            workBuffers.argmaxReadback.unmap();
          } else {
            pass = encoder.beginComputePass();
            pass.setPipeline(pipelines.topk256);
            pass.setBindGroup(0, bindGroupCache.topk256);
            pass.dispatchWorkgroups(1);
            pass.end();
            encoder.copyBufferToBuffer(workBuffers.topk256Result, 0, workBuffers.topk256Readback, 0, 256 * 2 * 4);
            device.queue.submit([encoder.finish()]);
            await workBuffers.topk256Readback.mapAsync(GPUMapMode.READ);
            const topkData = new Float32Array(workBuffers.topk256Readback.getMappedRange().slice(0));
            workBuffers.topk256Readback.unmap();
            const candidates = new Array(256);
            const topkU32 = new Uint32Array(topkData.buffer.slice(0));
            for (let i = 0; i < 256; i++) candidates[i] = { val: topkData[i*2], id: topkU32[i*2+1] };
            if (repPenalty > 1.0 && allTokens.length > 0) {
              const seen = new Set(allTokens);
              for (let i = 0; i < 256; i++) {
                if (seen.has(candidates[i].id)) {
                  if (candidates[i].val > 0) candidates[i].val /= repPenalty;
                  else candidates[i].val *= repPenalty;
                }
              }
            }
            candidates.sort((a, b) => b.val - a.val);
            if (temperature === 0) {
              nextToken = candidates[0].id;
            } else {
              const maxL = candidates[0].val;
              let se = 0;
              const pr = new Float32Array(256);
              for (let i = 0; i < 256; i++) { pr[i] = Math.exp((candidates[i].val - maxL) / temperature); se += pr[i]; }
              let cp = 0, co = 256;
              for (let i = 0; i < 256; i++) { cp += pr[i] / se; if (cp >= topP) { co = i + 1; break; } }
              let ss = 0;
              for (let i = 0; i < co; i++) ss += pr[i];
              let rr = Math.random() * ss;
              nextToken = candidates[co - 1].id;
              for (let i = 0; i < co; i++) { rr -= pr[i]; if (rr <= 0) { nextToken = candidates[i].id; break; } }
            }
          }
        }

        allTokens.push(nextToken);
        let generatedTokens = [nextToken];
        let genTokenCount = 1;

        textSpan.textContent = decodeToken(nextToken);

        // Auto-regressive generation
        for (let step = 1; step < maxTokens; step++) {
          if (nextToken === 1 || nextToken === 0 || nextToken === 106) break;
          if (FUNC_TOKENS['<end_function_call>'] && nextToken === FUNC_TOKENS['<end_function_call>']) {
            generatedTokens.push(nextToken);
            genTokenCount++;
            break;
          }

          const pos = inputTokens.length + step - 1;
          if (pos >= CONFIG.context_length - 1) break;

          nextToken = await forwardPassAndGetToken(nextToken, pos, temperature, topP, repPenalty, allTokens);

          if (nextToken === 1 || nextToken === 0 || nextToken === 106) break;
          if (FUNC_TOKENS['<end_function_call>'] && nextToken === FUNC_TOKENS['<end_function_call>']) {
            allTokens.push(nextToken);
            generatedTokens.push(nextToken);
            genTokenCount++;
            break;
          }

          allTokens.push(nextToken);
          generatedTokens.push(nextToken);
          genTokenCount++;

          textSpan.textContent = decodeTokens(generatedTokens);
          scrollToBottom();

          const elapsed = performance.now() - genStart;
          const tokPerSec = (genTokenCount / elapsed * 1000).toFixed(1);
          speedEl.textContent = `${tokPerSec} t/s`;
        }

        const totalGenTime = performance.now() - genStart;
        const finalTokPerSec = (genTokenCount / totalGenTime * 1000).toFixed(1);

        // Final display: parse function calls
        const rawOutput = decodeTokens(generatedTokens);
        const parsedOutput = formatFunctionCallOutput(rawOutput);
        textSpan.innerHTML = parsedOutput;
        cursorSpan.remove();

        metaDiv.innerHTML = `<span class="speed">${finalTokPerSec} t/s</span> &middot; ${genTokenCount} tokens &middot; prefill ${prefillSpeed} t/s (${inputTokens.length} tok)`;
        speedEl.textContent = `${finalTokPerSec} t/s`;

        scrollToBottom();

      } catch (err) {
        textSpan.textContent = `Error: ${err.message}`;
        cursorSpan.remove();
        console.error(err);
      } finally {
        generating = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('prompt-input').focus();
      }
    }

    // Expose debug interface
    window._debug = {
      forwardPassAndGetToken, forwardPassOnly, prefillBatched,
      encodeSimple, resetKVCaches,
      get device() { return device; },
      get workBuffers() { return workBuffers; },
      get kvCaches() { return kvCaches; },
      get CONFIG() { return CONFIG; },
      decodeToken, decodeTokens,
    };

    // =========================================================================
    // Main
    // =========================================================================
    async function main() {
      try {
        setStatus('Initializing WebGPU...');
        await initWebGPU();

        setStatus('Downloading model...');
        // Base Gemma 3 for chat, FunctionGemma for tool calling (use ?model=func to load FunctionGemma)
        const MODELS = {
          base: 'https://huggingface.co/unsloth/gemma-3-270m-it-GGUF/resolve/main/gemma-3-270m-it-Q8_0.gguf',
          func: 'https://huggingface.co/unsloth/functiongemma-270m-it-GGUF/resolve/main/functiongemma-270m-it-Q8_0.gguf',
        };
        const modelParam = new URLSearchParams(window.location.search).get('model');
        const modelFile = modelParam === 'func' ? MODELS.func : (modelParam || MODELS.base);

        const response = await fetch(modelFile);
        const contentLength = response.headers.get('content-length');
        const total = contentLength ? parseInt(contentLength) : 291543744;
        const reader = response.body.getReader();
        const chunks = [];
        let received = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          received += value.length;
          setProgress(received, total);
        }

        const buffer = new Uint8Array(received);
        let offset = 0;
        for (const chunk of chunks) {
          buffer.set(chunk, offset);
          offset += chunk.length;
        }

        setStatus('Parsing model...');
        document.getElementById('progress-text').textContent = 'Parsing GGUF...';
        parser = new GGUFParser(buffer);
        gguf = parser.parse();

        setStatus('Extracting tokenizer...');
        document.getElementById('progress-text').textContent = 'Tokenizer...';
        extractTokenizer();
        initFunctionTokens();

        setStatus('Creating pipelines...');
        document.getElementById('progress-text').textContent = 'GPU pipelines...';
        createPipelines();
        createUniformBuffers();

        setStatus('Uploading weights...');
        document.getElementById('progress-text').textContent = 'Uploading to GPU...';
        uploadWeightsToGPU();

        parser = null;
        gguf = null;

        createWorkBuffers();
        createBindGroups();

        // Transition to chat UI
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('app').classList.add('visible');
        document.getElementById('send-btn').disabled = false;
        document.getElementById('prompt-input').focus();

        // Settings toggle
        document.getElementById('settings-toggle').addEventListener('click', () => {
          document.getElementById('settings-panel').classList.toggle('open');
        });

        // Send on Enter (shift+enter for newline)
        document.getElementById('prompt-input').addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        });

        // Auto-resize textarea
        document.getElementById('prompt-input').addEventListener('input', function() {
          this.style.height = 'auto';
          this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Send button
        document.getElementById('send-btn').addEventListener('click', sendMessage);

        // iOS keyboard: resize app to visual viewport
        if (window.visualViewport) {
          const onViewportResize = () => {
            const app = document.getElementById('app');
            app.style.height = window.visualViewport.height + 'px';
            // Scroll chat to bottom when keyboard opens
            const chat = document.getElementById('chat-area');
            chat.scrollTop = chat.scrollHeight;
          };
          window.visualViewport.addEventListener('resize', onViewportResize);
          window.visualViewport.addEventListener('scroll', onViewportResize);
        }

      } catch (err) {
        console.error(err);
        document.getElementById('loading-status').textContent = `FAILED: ${err.message}`;
        document.getElementById('progress-text').textContent = 'Error';
        document.getElementById('progress-fill').style.background = 'var(--red)';
      }
    }

    main();
  </script>
</body>
</html>
